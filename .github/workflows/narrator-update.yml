name: Narrator Update (Daily)

# Arc Reader (weekly), Theme Finder (monthly), Chapter Generator (quarterly),
# Dream Detection (weekly), Manual Refresh (30d). Each module has its own
# skip-if-recent guard, so a daily trigger is safe and idempotent.
#
# Runs via Claude Code CLI on the flat-rate plan (no API billing).

on:
  schedule:
    # 09:00 JST = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@a26af69be951a213d495a4c3e4e4022e16d87065 # v4
        with:
          node-version: '20'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run narrator-update
        env:
          # Flat-rate plan auth (no API billing). Obtain via `claude setup-token`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_INGEST_KEY: ${{ secrets.SUPABASE_INGEST_KEY }}
        run: bash scripts/narrator/run.sh
