name: Morning Quote (Daily)

# 朝イチの一節を生成するバッチ。
# 前日の日記から Claude CLI + WebSearch で名言を1つ選び、
# user_quote_deliveries に INSERT する。
#
# コスト: Claude Code 定額 (API課金なし) - CLAUDE.md 準拠

on:
  schedule:
    # 06:30 JST = 21:30 UTC (前日)
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@a26af69be951a213d495a4c3e4e4022e16d87065 # v4
        with:
          node-version: '20'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run morning quote generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_INGEST_KEY: ${{ secrets.SUPABASE_INGEST_KEY }}
          FOCUS_YOU_USER_ID: ${{ secrets.FOCUS_YOU_USER_ID }}
        run: bash scripts/morning-quote/run.sh
