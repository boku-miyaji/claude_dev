name: Morning Quote (Daily)

# 朝イチの一節を生成するバッチ。
# 前日の日記から Claude CLI + WebSearch で名言を1つ選び、
# user_quote_deliveries に INSERT する。
#
# コスト: Claude Code 定額 (API課金なし) - CLAUDE.md 準拠

on:
  schedule:
    # 06:30 JST = 21:30 UTC (前日)
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run morning quote generation
        env:
          # Claude Code 定額プラン経由で実行（API課金ゼロ・CLAUDE.mdコスト原則準拠）
          # 取得: claude setup-token → GitHub Settings → Secrets に CLAUDE_CODE_OAUTH_TOKEN を登録
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_INGEST_KEY: ${{ secrets.SUPABASE_INGEST_KEY }}
          FOCUS_YOU_USER_ID: ${{ secrets.FOCUS_YOU_USER_ID }}
        run: bash scripts/morning-quote/run.sh
