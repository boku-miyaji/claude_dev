name: News Collection

on:
  schedule:
    # 06:00 JST = 21:00 UTC (前日)
    - cron: '0 21 * * *'
    # 18:00 JST = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify arxiv sync (sources.yaml must be subset of Edge Function keywords)
        run: bash scripts/intelligence/check-arxiv-sync.sh

      - name: Collect news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bash scripts/news/collect.sh

      - name: Enrich news (日本語タイトル・要約生成 / Claude CLI)
        env:
          # Flat-rate plan auth (no API billing). Obtain via `claude setup-token`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_INGEST_KEY: ${{ secrets.SUPABASE_INGEST_KEY }}
        run: bash scripts/news/enrich.sh

      - name: Verify rows were inserted (fail if zero)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # 直近15分以内に INSERT された件数を確認
          FIFTEEN_MIN_AGO=$(date -u -d '15 minutes ago' -Iseconds 2>/dev/null || date -u -v-15M +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(curl -sS -I "${SUPABASE_URL}/rest/v1/news_items?select=id&collected_at=gte.${FIFTEEN_MIN_AGO}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Prefer: count=exact" 2>/dev/null | grep -i '^content-range' | sed 's/.*\///' | tr -d '\r\n ')
          echo "Rows inserted in last 15 min: ${COUNT:-unknown}"
          if [ -z "${COUNT}" ] || [ "${COUNT}" = "0" ]; then
            echo "::error::news-collect finished but no rows were inserted. The LLM response, feed fetch, or INSERT likely failed."
            exit 1
          fi

      - name: Verify arxiv recovery rate (fail if arxiv items < 5)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # arxiv は毎日数百本投稿される。収集の下限を 5 件に設定。
          # 2026-04-19 に取りこぼし事象（max_results=8 ハードコード + キーワード無視）
          # が発生したため、回収率の床を個別に監視する。
          FIFTEEN_MIN_AGO=$(date -u -d '15 minutes ago' -Iseconds 2>/dev/null || date -u -v-15M +%Y-%m-%dT%H:%M:%SZ)
          ARXIV_COUNT=$(curl -sS -I "${SUPABASE_URL}/rest/v1/news_items?select=id&source_type=eq.arxiv&collected_at=gte.${FIFTEEN_MIN_AGO}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Prefer: count=exact" 2>/dev/null | grep -i '^content-range' | sed 's/.*\///' | tr -d '\r\n ')
          echo "arxiv rows inserted in last 15 min: ${ARXIV_COUNT:-unknown}"
          if [ -z "${ARXIV_COUNT}" ] || [ "${ARXIV_COUNT}" -lt 5 ]; then
            echo "::error::arxiv recovery rate too low. Expected >= 5, got ${ARXIV_COUNT}. Check fetchArxiv() / ARXIV_KEYWORDS / arxiv API availability."
            exit 1
          fi
