# ============================================================
# 学術論文（arXiv / 主要研究機関）
# ============================================================
academic_papers:
  # arXiv カテゴリ × キーワード検索
  # 検索URL: https://arxiv.org/search/?searchtype=all&query={keyword}
  arxiv:
    categories: ["cs.AI", "cs.CL", "cs.LG", "cs.MA", "cs.SE"]
    keywords:
      - term: "LLM agent"
        note: "エージェントアーキテクチャ全般"
        frequency: daily
      - term: "code generation LLM"
        note: "コード生成・自動プログラミング"
        frequency: daily
      - term: "multi-agent system LLM"
        note: "マルチエージェント協調"
        frequency: daily
      - term: "memory augmented LLM"
        note: "記憶拡張・長期記憶"
        frequency: daily
      - term: "agentic coding"
        note: "エージェント的コーディング"
        frequency: daily
      - term: "tool use LLM"
        note: "ツール使用・関数呼び出し"
        frequency: weekly
      - term: "self-improvement LLM"
        note: "自己改善・自己進化"
        frequency: weekly
      - term: "knowledge management AI"
        note: "ナレッジマネジメント・暗黙知"
        frequency: weekly
      - term: "personal AI assistant"
        note: "パーソナルAI・自己理解"
        frequency: weekly

  # 注目研究機関（著者名・所属で追跡）
  research_groups:
    - name: "Google DeepMind"
      note: "Gemini, AlphaCode, PaperOrchestra等"
    - name: "Stanford NLP"
      note: "エージェント評価、マルチエージェント研究"
    - name: "Anthropic"
      note: "安全性、解釈可能性"
    - name: "Meta FAIR"
      note: "オープンモデル、Llama"

# ============================================================
# セキュリティ（サプライチェーン攻撃・脆弱性動向）
# ============================================================
security:
  keywords:
    - term: "supply chain attack npm pypi"
      category: "security"
      frequency: daily
    - term: "GitHub Actions vulnerability"
      category: "security"
      frequency: daily
    - term: "npm malicious package"
      category: "security"
      frequency: daily
    - term: "PyPI malware"
      category: "security"
      frequency: weekly

  web_sources:
    - url: "https://github.blog/security/"
      category: "security"
      name: "GitHub Security Blog"
      frequency: daily
    - url: "https://socket.dev/blog"
      category: "security"
      name: "Socket.dev Blog"
      note: "npm/PyPI サプライチェーン攻撃検知"
      frequency: daily

  x_accounts:
    - handle: "@SocketDev"
      category: "security"
      note: "サプライチェーンセキュリティ速報"
      priority: high
    - handle: "@snaborofficial"
      category: "security"
      note: "Snyk 公式"
      priority: normal

