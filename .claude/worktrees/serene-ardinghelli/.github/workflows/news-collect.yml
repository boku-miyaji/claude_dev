name: News Collection

on:
  schedule:
    # 06:00 JST = 21:00 UTC (前日)
    - cron: '0 21 * * *'
    # 18:00 JST = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Collect news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bash scripts/news/collect.sh

      - name: Enrich news (日本語タイトル・要約生成)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🈯 Enriching news with Japanese summaries..."
          curl -sS -X POST "${SUPABASE_URL}/functions/v1/news-enrich" \
            -H "Content-Type: application/json" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --max-time 180

      - name: Verify rows were inserted (fail if zero)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # 直近15分以内に INSERT された件数を確認
          FIFTEEN_MIN_AGO=$(date -u -d '15 minutes ago' -Iseconds 2>/dev/null || date -u -v-15M +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(curl -sS -I "${SUPABASE_URL}/rest/v1/news_items?select=id&collected_at=gte.${FIFTEEN_MIN_AGO}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Prefer: count=exact" 2>/dev/null | grep -i '^content-range' | sed 's/.*\///' | tr -d '\r\n ')
          echo "Rows inserted in last 15 min: ${COUNT:-unknown}"
          if [ -z "${COUNT}" ] || [ "${COUNT}" = "0" ]; then
            echo "::error::news-collect finished but no rows were inserted. The LLM response, feed fetch, or INSERT likely failed."
            exit 1
          fi
