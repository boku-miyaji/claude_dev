        - generic: 新中期経営計画2025-2029の最重要施策。海外成長目標（年率8%）が国内成長目標（年率2%）の4倍に設定されており、経営トップの関与度が最も高い領域。
      - generic:
        - generic:
          - heading "確信度Lv2 実現したい姿" [level=3]:
            - generic "確信度Lv2"
            - text: 実現したい姿
          - generic: 新中期経営計画(2025-2029)の最重要施策。『お～いお茶』を現在の販売国（約30-40カ国）から60ヵ国以上に倍増。海外売上年率8%（国内2%の4倍）で差別化された成長ドライバー。米国ITO EN (North America) が既に事業基盤として存在するため、これを中核に東南アジア/欧州への横展開が想定される。
          - generic: "初期仮説: 『お～いお茶』を販売国60ヵ国以上に拡大し、海外売上を年平均8%以上で成長させる"
        - generic:
          - heading "確信度Lv2 ペインポイント" [level=3]:
            - generic "確信度Lv2"
            - text: ペインポイント
          - generic: 海外売上比率は約10%と国内依存構造が強い。(1)海外展開には現地パートナー/買収/販路確保の選択が必要だが、中計で『M&A活用』を明記している一方、過去の大型M&A実績は少ない、(2)米国以外の主要市場（中国/東南アジア/欧州）での知名度は低く、ブランディング投資が必要、(3)原料茶葉の安定調達・サプライチェーン構築、(4)為替変動が収益を圧迫するリスク、(5)海外事業のPL/BS管理の複雑化。
          - generic: "初期仮説: 海外売上比率は約10%と低く、成長のための投資・PMI・為替リスク管理が今後の課題"
