          - row "コスト削減 国内事業の構造改革 サプライチェーン最適化・収益性改善 🕐 更新 2026-04-15 📅 5月 3月決算企業の本決算発表 📅 4月 事業再構築補助金 公募開始 高 浅い 確信度Lv3 中計で『最初の2年間（2025-2026年）で構造改革を実施、収益性重視体制を構築』と明記。これは既存事業の抜本的見直しフェーズ。営業利益率8%は現状比+3pt程度のジャンプであり、(1)原材料調達の再交渉、(2)物流ネットワーク再編、(3)不採算SKUの廃止、(4)工場稼働率改善、(5)自販機チャネル効率化、などが想定される。 確信度Lv2 国内清涼飲料市場の成熟化＋人口減少による構造的需要減。加えて、(1)茶葉の国際価格上昇、(2)包材（PET/アルミ）の高騰、(3)物流費の継続的上昇、(4)人手不足による労務費上昇、が同時進行。短期的に価格転嫁を進めても、消費者の節約志向でボリュームが落ちるリスクあり。 確信度Lv2 中野 悦久（専務執行役員、生産本部長・物流担当・CSO） 神谷 茂（専務執行役員、総合企画・グループ経営・SCM戦略） — 確信度Lv2 設備投資ファイナンス、運転資金の効率化、サプライチェーンファイナンス、物流施設向け融資 確信度Lv2 設備投資ローン / 仕入ファイナンス / 物流施設向け融資 / コミットメントライン 確信度Lv1 —" [ref=e84]:
