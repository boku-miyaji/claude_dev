          - row "社会対応(SDGs) — ESG・サステナビリティ 茶産地支援・環境配慮・GHG削減 🕐 更新 2026-04-15 中 浅い 確信度Lv3 中計の 5 本柱の一つ「サステナビリティ経営の推進」。伊藤園は『茶産地育成事業』を1976年から展開し、契約栽培による茶葉調達モデルを構築してきた歴史を持つ。これは原料調達の安定化と環境配慮の両立モデル。次フェーズは(1)気候変動対応の強化、(2)GHG排出量 Scope 1-3 の削減ロードマップ策定、(3)環境配慮型包材（リサイクルPET、軽量化）への切替、(4)海外展開先の現地環境規制対応。 確信度Lv2 (1)茶産地の気候変動影響（霜害・高温・降雨パターン変化）による収量・品質リスク、(2)茶農家の高齢化と後継者不足で契約栽培面積の維持が困難に、(3)GHG Scope 3（原料・物流・販売）の大部分を占めるサプライチェーン排出量の削減は自社単独では不可能、(4)環境配慮型包材への切替は短期的にコスト増、(5)TCFD/ISSB 等の気候関連情報開示義務の拡大。 確信度Lv2 中野 悦久（専務執行役員、生産本部長・物流担当・CSO） 神谷 茂（専務執行役員、総合企画・SCM戦略） — 確信度Lv2 サステナビリティリンクローン / グリーンボンド / 茶産地向け環境投融資 / ESGレーティング対応支援 確信度Lv2 サステナビリティリンクローン / グリーンボンド / 環境配慮型設備投資ローン 確信度Lv1 —" [ref=e181]:
