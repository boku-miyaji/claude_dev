              - generic [ref=e99]:
                - generic "確信度Lv3" [ref=e100]
                - text: 中計で『人的資本経営、DX、リスクマネジメント』を経営基盤の3本柱と明記。機能別組織への移行は、従来の同族経営型（本庄家中心）から専門性重視の組織体制への転換を示唆。CHRO兼CFOという異例の役割をもつ平田氏がキーパーソン。
            - generic [ref=e101]:
              - generic [ref=e102]: ペイン
              - generic [ref=e103]:
                - generic "確信度Lv1" [ref=e104]
                - text: 伝統的な同族企業でDX・グローバル化対応は容易ではない。(1)既存人事制度の硬直性、(2)グローバル人材の不足、(3)DX投資の優先順位づけ、(4)事業承継（本庄家以外への権限移譲含む）、(5)女性管理職比率の向上（現状7.7%）など、複数の課題が並行する。
