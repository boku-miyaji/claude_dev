              - generic [ref=e39]:
                - generic "確信度Lv2" [ref=e40]
                - text: 新中期経営計画(2025-2029)の最重要施策。『お～いお茶』を現在の販売国（約30-40カ国）から60ヵ国以上に倍増。海外売上年率8%（国内2%の4倍）で差別化された成長ドライバー。米国ITO EN (North America) が既に事業基盤として存在するため、これを中核に東南アジア/欧州への横展開が想定される。
            - generic [ref=e41]:
              - generic [ref=e42]: ペイン
              - generic [ref=e43]:
                - generic "確信度Lv2" [ref=e44]
                - text: 海外売上比率は約10%と国内依存構造が強い。(1)海外展開には現地パートナー/買収/販路確保の選択が必要だが、中計で『M&A活用』を明記している一方、過去の大型M&A実績は少ない、(2)米国以外の主要市場（中国/東南アジア/欧州）での知名度は低く、ブランディング投資が必要、(3)原料茶葉の安定調達・サプライチェーン構築、(4)為替変動が収益を圧迫するリスク、(5)海外事業のPL/BS管理の複雑化。
