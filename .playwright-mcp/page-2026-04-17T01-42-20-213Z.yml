          - heading "資本政策・株主還元" [level=3] [ref=e115]
          - generic [ref=e116]:
            - generic [ref=e117]:
              - generic [ref=e118]: 実現したい姿
              - generic [ref=e119]:
                - generic "確信度Lv2" [ref=e120]
                - text: 中計で初めて ROE 10%・配当性向 30% という明示的な資本効率/還元目標を掲げた。これは従来の保守的な財務運営からの転換点。本庄家同族経営下で株主構成は比較的安定しているが、(1)東証プライム上場企業としての資本市場対話の強化、(2)機関投資家からのガバナンス・資本効率への要求、(3)成長投資との両立、が同時に求められるフェーズ。
            - generic [ref=e121]:
              - generic [ref=e122]: ペイン
              - generic [ref=e123]:
                - generic "確信度Lv1" [ref=e124]
                - text: 伊藤園の直近の資本政策は自社株買い実績が少なく、DOEベースの安定配当型が中心。(1)成長投資（海外M&A/設備投資）とのキャッシュアロケーションのせめぎ合い、(2)政策保有株式の縮減方針が未開示、(3)機関投資家向けIRの体制（IR専任役員の有無）が不明、(4)議決権行使助言会社からの推奨状況。CFO平田氏が2025年就任で、資本政策の方針が固まりきっていない可能性。
