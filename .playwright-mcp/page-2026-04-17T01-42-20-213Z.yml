                - text: 中計で『最初の2年間（2025-2026年）で構造改革を実施、収益性重視体制を構築』と明記。これは既存事業の抜本的見直しフェーズ。営業利益率8%は現状比+3pt程度のジャンプであり、(1)原材料調達の再交渉、(2)物流ネットワーク再編、(3)不採算SKUの廃止、(4)工場稼働率改善、(5)自販機チャネル効率化、などが想定される。
            - generic [ref=e61]:
              - generic [ref=e62]: ペイン
              - generic [ref=e63]:
                - generic "確信度Lv2" [ref=e64]
                - text: 国内清涼飲料市場の成熟化＋人口減少による構造的需要減。加えて、(1)茶葉の国際価格上昇、(2)包材（PET/アルミ）の高騰、(3)物流費の継続的上昇、(4)人手不足による労務費上昇、が同時進行。短期的に価格転嫁を進めても、消費者の節約志向でボリュームが落ちるリスクあり。
