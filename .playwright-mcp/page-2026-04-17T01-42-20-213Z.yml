                - text: M&Aは掲げているものの、直近10年で大型案件の実績は限定的。(1)社内M&Aチームの経験値、(2)本庄家同族経営のガバナンス下での意思決定スピード、(3)統合後の文化融合リスク、(4)買収プレミアムの妥当性判断。M&Aアドバイザリー/ファイナンスのパートナー選定はまだ固定化していない可能性。
