          - heading "茶産地支援・環境配慮・GHG削減" [level=3] [ref=e135]
          - generic [ref=e136]:
            - generic [ref=e137]:
              - generic [ref=e138]: 実現したい姿
              - generic [ref=e139]:
                - generic "確信度Lv3" [ref=e140]
                - text: 中計の 5 本柱の一つ「サステナビリティ経営の推進」。伊藤園は『茶産地育成事業』を1976年から展開し、契約栽培による茶葉調達モデルを構築してきた歴史を持つ。これは原料調達の安定化と環境配慮の両立モデル。次フェーズは(1)気候変動対応の強化、(2)GHG排出量 Scope 1-3 の削減ロードマップ策定、(3)環境配慮型包材（リサイクルPET、軽量化）への切替、(4)海外展開先の現地環境規制対応。
            - generic [ref=e141]:
              - generic [ref=e142]: ペイン
              - generic [ref=e143]:
                - generic "確信度Lv2" [ref=e144]
                - text: (1)茶産地の気候変動影響（霜害・高温・降雨パターン変化）による収量・品質リスク、(2)茶農家の高齢化と後継者不足で契約栽培面積の維持が困難に、(3)GHG Scope 3（原料・物流・販売）の大部分を占めるサプライチェーン排出量の削減は自社単独では不可能、(4)環境配慮型包材への切替は短期的にコスト増、(5)TCFD/ISSB 等の気候関連情報開示義務の拡大。
