<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5046e5"/>
      <stop offset="100%" stop-color="#7c6cff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ripple: 3 concentric circles, inner=bright, outer=fading -->
  <circle cx="256" cy="256" r="56" fill="none" stroke="#fff" stroke-width="8" opacity="1"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="#fff" stroke-width="5" opacity="0.55"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#fff" stroke-width="3" opacity="0.25"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="16" fill="#fff"/>
</svg>
