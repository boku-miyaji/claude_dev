      chartArea.appendChild(el('div', {style: 'color:var(--text3);font-size:12px;width:100%;text-align:center;padding:40px 0', textContent: 'AI分析後にグラフが表示されます。/company で「日記を分析して」と言ってください。'}));
    } else {
      wbiData.forEach(function(w) {
        var pct = (w.wbi / 10) * 100;
        var color = w.wbi >= 7 ? 'var(--green)' : w.wbi >= 4 ? 'var(--blue)' : 'var(--red)';
        var bar = el('div', {style: 'flex:1;display:flex;flex-direction:column;align-items:center;gap:2px'}, [
          el('div', {style: 'font-size:9px;color:var(--text3)', textContent: w.wbi.toFixed(1)}),
          el('div', {style: 'width:100%;background:' + color + '44;border-radius:4px 4px 0 0;height:' + pct + '%;min-height:4px;transition:height .3s', title: w.entry_date + ': WBI ' + w.wbi}),
          el('div', {style: 'font-size:8px;color:var(--text3);transform:rotate(-45deg);white-space:nowrap', textContent: w.entry_date.slice(5)})
        ]);
        chartArea.appendChild(bar);
      });
    }

    // Entries list (last 20)
    while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);
    var res = await sb.from('diary_entries').select('*').order('entry_date', {ascending: false}).order('created_at', {ascending: false}).limit(20);
    var entries = res.data || [];

    entries.forEach(function(e) {
      var dateStr = e.entry_date;
      var dow = new Date(e.entry_date + 'T00:00:00').toLocaleDateString('ja-JP', {weekday: 'short'});
      var time = new Date(e.created_at).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

      // Emotion badges
      var emotionBadges = [];
      if (e.emotions) {
        var sorted = Object.entries(e.emotions).sort(function(a,b) { return b[1] - a[1]; }).slice(0, 3);
        var emotionColors = {joy:'#fbbf24', trust:'#34d399', fear:'#a78bfa', surprise:'#f472b6', sadness:'#60a5fa', disgust:'#6b7280', anger:'#f87171', anticipation:'#fb923c'};
        sorted.forEach(function(pair) {
          if (pair[1] > 20) {
            emotionBadges.push(el('span', {style: 'font-size:10px;padding:1px 6px;border-radius:99px;background:' + (emotionColors[pair[0]] || 'var(--text3)') + '22;color:' + (emotionColors[pair[0]] || 'var(--text3)'), textContent: pair[0] + ' ' + pair[1]}));
          }
        });
      }

      // WBI badge
      var wbiBadge = e.wbi ? el('span', {style: 'font-size:10px;padding:1px 6px;border-radius:99px;background:var(--accent)22;color:var(--accent)', textContent: 'WBI ' + e.wbi}) : null;

      var typeBadge = e.entry_type === 'fragment'
        ? el('span', {style: 'font-size:10px;color:var(--text3);border:1px solid var(--border);padding:1px 6px;border-radius:99px', textContent: '断片'})
        : null;

      var header = el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap'}, [
        el('span', {style: 'font-weight:600;font-size:13px', textContent: dateStr + ' (' + dow + ')'}),
        el('span', {style: 'font-size:11px;color:var(--text3)', textContent: time}),
        typeBadge, wbiBadge
      ].concat(emotionBadges).filter(Boolean));

      var card = el('div', {className: 'card', style: 'margin-bottom:10px'}, [
        header,
        el('div', {style: 'font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow:hidden', textContent: e.body}),
        e.ai_summary ? el('div', {style: 'margin-top:8px;padding:8px;background:var(--accent)08;border-radius:6px;font-size:12px;color:var(--accent2)'}, [
          el('span', {style: 'font-weight:600', textContent: 'AI: '}),
          el('span', {textContent: e.ai_summary})
        ]) : null
      ].filter(Boolean));
      listContainer.appendChild(card);
    });
  }

  loadEntries();
}

// ============================================================
// Artifacts Page
// ============================================================
async function renderArtifacts(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Artifacts'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '成果物の確認・コメント。Claude Code で /register path/to/file.md で登録。'}));

  var companies = (await sb.from('companies').select('id,name').eq('status','active')).data || [];

  // Filter bar
  var filterCompany = el('select', {className: 'input'}, [
    el('option', {value: '', textContent: 'All'})
  ].concat(companies.map(function(c) { return el('option', {value: c.id, textContent: c.name}); })));
  filterCompany.onchange = function() { loadList(); };
  root.appendChild(el('div', {className: 'filter-bar'}, [filterCompany]));

  var listContainer = el('div', {});
  root.appendChild(listContainer);

  // Detail view container
  var detailContainer = el('div', {style: 'display:none'});
  root.appendChild(detailContainer);

  async function loadList() {
    listContainer.style.display = '';
    detailContainer.style.display = 'none';
    while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);

    var query = sb.from('artifacts').select('*,companies(name)').eq('status','active').order('updated_at',{ascending:false});
    if (filterCompany.value) query = query.eq('company_id', filterCompany.value);
    var res = await query;
    var arts = res.data || [];

    // Count open comments per artifact
    var commentRes = await sb.from('artifact_comments').select('artifact_id,id').eq('status','open');
    var commentCounts = {};
    (commentRes.data || []).forEach(function(c) {
      commentCounts[c.artifact_id] = (commentCounts[c.artifact_id] || 0) + 1;
    });

    if (arts.length === 0) {
      listContainer.appendChild(el('div', {className: 'card'}, [
        el('div', {className: 'empty', textContent: 'まだ成果物が登録されていません。上のフォームからファイルパスを登録してください。'})
      ]));
      return;
    }

    arts.forEach(function(a) {
      var coName = a.companies ? a.companies.name : 'HD';
      var synced = a.last_synced_at ? new Date(a.last_synced_at).toLocaleString('ja-JP') : '未同期';
      var openComments = commentCounts[a.id] || 0;
      var commentBadge = openComments > 0
        ? el('span', {style: 'background:var(--orange);color:#000;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600', textContent: openComments + ' コメント'})
        : el('span', {style: 'color:var(--text3);font-size:11px', textContent: 'コメントなし'});

      var card = el('div', {className: 'card', style: 'cursor:pointer;margin-bottom:12px'}, [
        el('div', {style: 'display:flex;justify-content:space-between;align-items:center'}, [
          el('div', {}, [
            el('div', {style: 'font-weight:600;margin-bottom:4px', textContent: a.title}),
            el('div', {style: 'font-size:12px;color:var(--text3);font-family:var(--mono)', textContent: a.file_path})
          ]),
          el('div', {style: 'text-align:right'}, [
            el('div', {}, [el('span', {className: 'tag tag-normal', textContent: coName}), commentBadge]),
            el('div', {style: 'font-size:11px;color:var(--text3);margin-top:4px', textContent: '同期: ' + synced})
          ])
        ])
      ]);
      card.onclick = function() { showDetail(a); };
      listContainer.appendChild(card);
    });
  }

  async function showDetail(artifact) {
    listContainer.style.display = 'none';
    detailContainer.style.display = '';
    while (detailContainer.firstChild) detailContainer.removeChild(detailContainer.firstChild);

    // Top bar: back + archive
    var backBtn = el('button', {className: 'btn', style: 'font-size:12px', textContent: '← 一覧に戻る'});
    backBtn.onclick = loadList;
    var archiveBtn = el('button', {className: 'btn', style: 'font-size:12px;color:var(--red)', textContent: 'アーカイブ（追跡停止）'});
    archiveBtn.onclick = async function() {
      if (!confirm('この成果物の追跡を停止しますか？')) return;
      await sb.from('artifacts').update({status: 'archived'}).eq('id', artifact.id);
      loadList();
    };
    detailContainer.appendChild(el('div', {style: 'display:flex;justify-content:space-between;margin-bottom:16px'}, [backBtn, archiveBtn]));

    // Title + meta
    var coName = artifact.companies ? artifact.companies.name : 'HD';
    detailContainer.appendChild(el('div', {className: 'page-title', style: 'font-size:1.2rem', textContent: artifact.title}));
    detailContainer.appendChild(el('div', {style: 'display:flex;gap:8px;align-items:center;margin-bottom:16px'}, [
      el('span', {className: 'tag tag-normal', textContent: coName}),
      el('span', {style: 'font-size:12px;font-family:var(--mono);color:var(--text3)', textContent: artifact.file_path}),
      el('span', {style: 'font-size:11px;color:var(--text3)', textContent: artifact.file_type.toUpperCase()})
    ]));

    // Content
    var contentCard = el('div', {className: 'card', style: 'margin-bottom:20px;max-height:600px;overflow:auto'});
    if (!artifact.content) {
      contentCard.appendChild(el('div', {className: 'empty', textContent: '未同期。次のセッション起動時に自動同期されます。'}));
    } else if (artifact.file_type === 'html') {
      var iframe = el('iframe', {style: 'width:100%;height:500px;border:none;background:#fff;border-radius:8px'});
      contentCard.appendChild(iframe);
      setTimeout(function() {
        iframe.contentDocument.open();
        iframe.contentDocument.write(artifact.content);
        iframe.contentDocument.close();
      }, 0);
    } else if (artifact.file_type === 'md') {
      contentCard.appendChild(el('div', {style: 'white-space:pre-wrap;font-size:13px;line-height:1.7;font-family:var(--mono)', textContent: artifact.content}));
    } else {
      contentCard.appendChild(el('pre', {style: 'font-size:12px;overflow:auto;max-height:500px', textContent: artifact.content}));
    }
    detailContainer.appendChild(contentCard);

    // Comments section
    detailContainer.appendChild(el('div', {className: 'section-title', textContent: 'コメント'}));
    var commentList = el('div', {});
    detailContainer.appendChild(commentList);

    // Add comment form
    var commentInput = el('textarea', {className: 'input', placeholder: 'コメントを追加...', style: 'min-height:60px;margin-top:12px;resize:vertical'});
    var commentBtn = el('button', {className: 'btn btn-primary', style: 'margin-top:8px', textContent: 'コメント投稿'});
    detailContainer.appendChild(commentInput);
    detailContainer.appendChild(commentBtn);

    async function loadComments() {
      while (commentList.firstChild) commentList.removeChild(commentList.firstChild);
      var res = await sb.from('artifact_comments').select('*').eq('artifact_id', artifact.id).order('created_at', {ascending: true});
      var comments = res.data || [];
      if (comments.length === 0) {
        commentList.appendChild(el('div', {style: 'color:var(--text3);font-size:13px;padding:8px 0', textContent: 'コメントなし'}));
        return;
      }
      comments.forEach(function(c) {
        var time = new Date(c.created_at).toLocaleString('ja-JP');
        var statusColor = c.status === 'open' ? 'var(--orange)' : 'var(--green)';
        var statusText = c.status === 'open' ? 'OPEN' : c.status.toUpperCase();
        var card = el('div', {className: 'card', style: 'margin-bottom:8px;padding:12px'}, [
          el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px'}, [
            el('div', {style: 'display:flex;gap:8px;align-items:center'}, [
              el('span', {style: 'font-size:10px;padding:2px 6px;border-radius:4px;background:' + statusColor + '22;color:' + statusColor + ';font-weight:600', textContent: statusText}),
              el('span', {style: 'font-size:11px;color:var(--text3)', textContent: c.source}),
              el('span', {style: 'font-size:11px;color:var(--text3)', textContent: time})
            ]),
            c.status === 'open' ? (function() {
              var resolveBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:3px 10px', textContent: '✓ 解決'});
              resolveBtn.onclick = async function(e) {
                e.stopPropagation();
                await sb.from('artifact_comments').update({status: 'resolved', resolved_by: 'manual', resolved_at: new Date().toISOString()}).eq('id', c.id);
                loadComments();
              };
              return resolveBtn;
            })() : el('span')
          ]),
          el('div', {style: 'font-size:13px;white-space:pre-wrap', textContent: c.body})
        ]);
        commentList.appendChild(card);
      });
    }

    commentBtn.onclick = async function() {
      var body = commentInput.value.trim();
      if (!body) return;
      await sb.from('artifact_comments').insert({artifact_id: artifact.id, body: body, source: 'dashboard'});
      commentInput.value = '';
      loadComments();
    };

    loadComments();
  }

  loadList();
}

  var catMeta = {

// --- Sources Tab ---
async function renderSourcesTab(root) {
  var res = await sb.from('intelligence_sources').select('*').order('source_type').order('priority', {ascending: true});
  var sources = res.data || [];

  if (sources.length === 0) {
    root.appendChild(el('div', {className: 'card empty', style: 'padding:40px;text-align:center'}, [
      el('div', {style: 'font-size:14px;color:var(--text2)', textContent: 'ソースが登録されていません。migration-019 を実行してください。'})
    ]));
    return;
  }

  // Group by source_type
  var groups = {};
  var typeLabels = {
    keyword: 'キーワード検索', web_source: '公式ブログ / ニュース',
    tech_article: '技術記事プラットフォーム', github_release: 'GitHub Releases', hacker_news: 'Hacker News',
    x_account: 'X アカウント（参考・制限あり）'
  };
  sources.forEach(function(s) {
    if (!groups[s.source_type]) groups[s.source_type] = [];
    groups[s.source_type].push(s);
  });

  // Add Source button
  var addBtn = el('button', {className: 'btn btn-p btn-sm', textContent: '+ ソース追加', style: 'margin-bottom:20px'});
  addBtn.addEventListener('click', function() { showAddSourceModal(root); });
  root.appendChild(addBtn);

  // Stats
  var enabledCount = sources.filter(function(s) { return s.enabled; }).length;
  root.appendChild(el('div', {style: 'font-size:12px;color:var(--text3);margin-bottom:16px', textContent: '合計 ' + sources.length + ' ソース（有効: ' + enabledCount + '）'}));

  // Render each group
  Object.keys(typeLabels).forEach(function(type) {
    var items = groups[type];
    if (!items || items.length === 0) return;

    root.appendChild(el('div', {className: 'section-title', style: 'margin-top:20px', textContent: typeLabels[type] + ' (' + items.length + ')'}));

    var card = el('div', {className: 'card'});
    items.forEach(function(src, idx) {
      var cfg = src.config || {};
      var detail = '';
      if (src.source_type === 'x_account') detail = 'site:x.com 検索';
      else if (src.source_type === 'keyword') detail = '検索語: "' + (cfg.term || '') + '"';
      else if (src.source_type === 'web_source') detail = cfg.url || '';
      else if (src.source_type === 'tech_article') detail = 'site:' + (cfg.site || '') + ' | キーワード: ' + (cfg.keywords || []).join(', ');
      else if (src.source_type === 'github_release') detail = cfg.repo || '';
      else if (src.source_type === 'hacker_news') detail = 'キーワード: ' + (cfg.keywords || []).join(', ') + ' (min: ' + (cfg.min_score || 0) + 'pt)';

      var priorityColor = src.priority === 'high' ? 'var(--red)' : src.priority === 'low' ? 'var(--text3)' : 'var(--blue)';

      var toggleBtn = el('button', {
        className: 'btn btn-g btn-sm',
        textContent: src.enabled ? 'ON' : 'OFF',
        style: 'font-size:10px;padding:2px 8px;min-width:36px;' + (src.enabled ? 'color:var(--green)' : 'color:var(--red)'),
        onClick: async function() {
          await sb.from('intelligence_sources').update({enabled: !src.enabled}).eq('id', src.id);
          src.enabled = !src.enabled;
          toggleBtn.textContent = src.enabled ? 'ON' : 'OFF';
          toggleBtn.style.color = src.enabled ? 'var(--green)' : 'var(--red)';
          toast((src.enabled ? '有効' : '無効') + 'にしました: ' + src.name);
        }
      });

      var deleteBtn = el('button', {
        className: 'btn btn-g btn-sm',
        textContent: '削除',
        style: 'font-size:10px;padding:2px 8px;color:var(--red)',
        onClick: async function() {
          if (!confirm(src.name + ' を削除しますか？')) return;
          await sb.from('intelligence_sources').delete().eq('id', src.id);
          row.remove();
          toast('削除しました: ' + src.name);
        }
      });

      // Score bar
      var scoreVal = (src.score || 1.0);
      var scorePercent = Math.round((scoreVal / 2.0) * 100);
      var scoreColor = scoreVal >= 1.3 ? 'var(--green)' : scoreVal <= 0.7 ? 'var(--red)' : 'var(--blue)';
      var scoreBar = el('div', {style: 'width:48px;flex-shrink:0;text-align:center'}, [
        el('div', {style: 'height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:2px'}, [
          el('div', {style: 'height:100%;width:' + scorePercent + '%;background:' + scoreColor + ';border-radius:2px'})
        ]),
        el('div', {style: 'font-size:9px;font-family:var(--mono);color:' + scoreColor, textContent: scoreVal.toFixed(1)})
      ]);

      var fbInfo = (src.useful_count || 0) + (src.noise_count || 0) > 0
        ? el('div', {style: 'font-size:9px;color:var(--text3);margin-top:1px', textContent: '+' + (src.useful_count||0) + ' / -' + (src.noise_count||0)})
        : null;

      var row = el('div', {style: 'display:flex;align-items:center;gap:10px;padding:10px 0;' + (idx < items.length - 1 ? 'border-bottom:1px solid var(--border)' : '')}, [
        el('div', {style: 'width:8px;height:8px;border-radius:50%;background:' + priorityColor + ';flex-shrink:0'}),
        el('div', {style: 'flex:1;min-width:0'}, [
          el('div', {style: 'font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px'}, [
            document.createTextNode(src.name),
            el('span', {className: 'tag tag-co', textContent: src.category})
          ]),
          el('div', {style: 'font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap', textContent: detail}),
          src.note ? el('div', {style: 'font-size:10px;color:var(--text3);margin-top:1px;font-style:italic', textContent: src.note}) : null,
          fbInfo
        ].filter(Boolean)),
        scoreBar,
        el('span', {style: 'font-size:10px;color:var(--text3);flex-shrink:0', textContent: src.frequency}),
        toggleBtn,
        deleteBtn
      ]);
      card.appendChild(row);
    });
    root.appendChild(card);
  });
}

function showAddSourceModal(parentRoot) {
  var typeSelect = el('select', {className: 'input', style: 'margin-bottom:10px'});
  [
    {v: 'x_account', l: 'X アカウント'},
    {v: 'keyword', l: 'キーワード検索'},
    {v: 'web_source', l: 'Web サイト / ブログ'},
    {v: 'tech_article', l: '技術記事プラットフォーム'},
    {v: 'github_release', l: 'GitHub リリース'},
  ].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o.v; opt.textContent = o.l;
    typeSelect.appendChild(opt);
  });

  var nameInput = el('input', {className: 'input', placeholder: '表示名（例: @AnthropicAI, Zenn, Claude Code）', style: 'margin-bottom:10px'});
  var valueInput = el('input', {className: 'input', placeholder: '値（handle / 検索語 / URL / site名 / owner/repo）', style: 'margin-bottom:10px'});
  var keywordsInput = el('input', {className: 'input', placeholder: 'キーワード（tech_article のみ、カンマ区切り）', style: 'margin-bottom:10px'});
  var categoryInput = el('input', {className: 'input', placeholder: 'カテゴリ（例: AI tools, 海外技術記事）', value: 'AI tools', style: 'margin-bottom:10px'});

  var prioritySelect = el('select', {className: 'input', style: 'margin-bottom:10px'});
  ['high', 'normal', 'low'].forEach(function(p) {
    var opt = document.createElement('option'); opt.value = p; opt.textContent = p;
    if (p === 'normal') opt.selected = true;
    prioritySelect.appendChild(opt);
  });

  var saveBtn = el('button', {className: 'btn btn-p', textContent: '追加', onClick: async function() {
    var type = typeSelect.value;
    var name = nameInput.value.trim();
    var value = valueInput.value.trim();
    if (!name || !value) { toast('名前と値は必須です'); return; }

    var config = {};
    if (type === 'x_account') config = {handle: value.replace('@', '')};
    else if (type === 'keyword') config = {term: value};
    else if (type === 'web_source') config = {url: value};
    else if (type === 'tech_article') {
      var kws = keywordsInput.value.split(',').map(function(k) { return k.trim(); }).filter(Boolean);
      config = {site: value, keywords: kws.length > 0 ? kws : [name]};
    }
    else if (type === 'github_release') config = {repo: value};

    await sb.from('intelligence_sources').insert({
      source_type: type, name: name, config: config,
      category: categoryInput.value.trim() || 'general',
      priority: prioritySelect.value
    });
    toast('追加しました: ' + name);
    // Re-render
    while (parentRoot.firstChild) parentRoot.removeChild(parentRoot.firstChild);
    renderSourcesTab(parentRoot);
  }});

  showModal('ソース追加', [typeSelect, nameInput, valueInput, keywordsInput, categoryInput, prioritySelect], [saveBtn]);
}

      el('div', {style: 'font-size:12px;color:var(--text3);margin-top:8px', textContent: 'スケジュール: 09:00 JST / 21:00 JST'})

        el('div', {style: 'font-size:12px;color:var(--text3);margin-top:2px', textContent: isJson ? totalSources + ' sources / ' + totalResults + ' results' : 'Markdown report'})
      ]),
      el('div', {className: 'badge ' + (source === 'auto' ? 'badge-blue' : 'badge-green'), textContent: source})

    card.appendChild(header);
    section.appendChild(card);
  });

function renderFeedbackSection() {
  var section = el('div', {style: 'margin-top:20px;padding-top:16px;border-top:1px solid var(--border)'});
  section.appendChild(el('div', {style: 'font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text2)', textContent: 'ソース評価（スコアに反映されます）'}));

  // Load sources and render feedback buttons
  (async function() {
    var res = await sb.from('intelligence_sources').select('id,name,source_type,score,category').eq('enabled', true).order('source_type');
    var sources = res.data || [];
    if (sources.length === 0) { section.appendChild(el('div', {style: 'font-size:11px;color:var(--text3)', textContent: 'ソースが未登録です'})); return; }

    var grid = el('div', {style: 'display:flex;flex-wrap:wrap;gap:6px'});
    sources.forEach(function(src) {
      var chip = el('div', {style: 'display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);font-size:11px;background:var(--surface)'}, [
        el('span', {textContent: src.name, style: 'color:var(--text2)'}),
        el('span', {style: 'font-family:var(--mono);font-size:9px;color:var(--text3)', textContent: (src.score||1).toFixed(1)}),
        el('button', {textContent: '+', style: 'background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);border-radius:4px;width:20px;height:20px;font-size:12px;cursor:pointer;font-weight:700;padding:0', onClick: async function() {
          await sb.rpc('apply_source_feedback', {p_source_id: src.id, p_feedback: 'useful'});
          src.score = Math.min((src.score||1) + 0.3, 2.0);
          chip.querySelector('span:nth-child(2)').textContent = src.score.toFixed(1);
          toast(src.name + ' +0.3');
        }}),
        el('button', {textContent: '-', style: 'background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:4px;width:20px;height:20px;font-size:12px;cursor:pointer;font-weight:700;padding:0', onClick: async function() {
          await sb.rpc('apply_source_feedback', {p_source_id: src.id, p_feedback: 'noise'});
          src.score = Math.max((src.score||1) - 0.3, 0.1);
          chip.querySelector('span:nth-child(2)').textContent = src.score.toFixed(1);
          toast(src.name + ' -0.3');
        }})
      ]);
      grid.appendChild(chip);
    });
    section.appendChild(grid);
    section.appendChild(el('div', {style: 'font-size:10px;color:var(--text3);margin-top:8px', textContent: '7日間FBなし → スコアが自動的にデフォルト(1.0)に戻ります'}));
  })();

  return section;
}

function toggleReportDetail(card, data) {
  var existing = card.querySelector('.report-detail');
  if (existing) { existing.remove(); return; }
  if (!data) return;

  // Markdown string (manual collection via /company)
  if (typeof data === 'string') {
    var detail = el('div', {className: 'report-detail md-body', style: 'margin-top:16px;border-top:1px solid var(--border);padding-top:16px;max-height:600px;overflow-y:auto'});
    // Render markdown (data is from owner-only Supabase table, not untrusted input)
    var _tmp = document.createElement('div');
    _tmp.innerHTML = (typeof marked !== 'undefined' && marked.parse) ? marked.parse(data) : data.replace(/\n/g, '<br>'); // eslint-disable-line
    _tmp.querySelectorAll('script').forEach(function(s) { s.remove(); }); // defense-in-depth
    _tmp.querySelectorAll('a').forEach(function(a) { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener'); });
    while (_tmp.firstChild) detail.appendChild(_tmp.firstChild);
    // Feedback section for markdown reports
    detail.appendChild(renderFeedbackSection());
    card.appendChild(detail);
    return;
  }

  // JSON data (auto collection via GitHub Actions)
  if (!data.collections) return;

  var detail = el('div', {className: 'report-detail', style: 'margin-top:16px;border-top:1px solid var(--border);padding-top:16px'});

  data.collections.forEach(function(coll) {
    var label = coll.type === 'keyword' ? '"' + coll.term + '"' : coll.handle;
    var tag = coll.is_exploration ? ' [探索]' : '';
    detail.appendChild(el('div', {style: 'font-size:13px;font-weight:600;margin-bottom:6px;margin-top:12px', textContent: label + tag}));

    if (coll.error) {
      detail.appendChild(el('div', {style: 'font-size:12px;color:var(--red)', textContent: 'Error: ' + coll.error}));
      return;
    }

    (coll.results || []).forEach(function(r) {
      var item = el('div', {style: 'margin-bottom:8px;padding-left:12px;border-left:2px solid var(--border)'}, [
        el('a', {href: r.url, target: '_blank', style: 'font-size:12px;font-weight:500;display:block', textContent: r.title || 'No title'}),
        el('div', {style: 'font-size:11px;color:var(--text3);margin-top:2px', textContent: (r.snippet || '').substring(0, 150)})
      ]);
      detail.appendChild(item);
    });
  });

  detail.appendChild(renderFeedbackSection());
  card.appendChild(detail);
}

async function renderSettings(root) {

  var userSettings = null;
  if (userId) {
    var usRes = await sb.from('user_settings').select('*').eq('user_id', userId).single();
    userSettings = usRes.data;
  }

  root.appendChild(el('div', {className: 'section-title', textContent: 'API Keys & Hook Config'}));
  var userCard = el('div', {className: 'card', style: 'margin-bottom:24px'});

  // Ingest Key

    keyInput,
    el('div', {style: 'display:flex;gap:8px;align-items:center'}, [genBtn, saveKeyBtn])
  ]));

  // SQL instruction
  userCard.appendChild(el('div', {style: 'margin-bottom:16px'}, [
    el('div', {style: 'font-weight:600;font-size:13px;margin-bottom:6px', textContent: 'Supabase SQL Editor で実行'}),
    el('div', {style: 'background:var(--surface2);padding:12px;border-radius:var(--r);font-family:var(--mono);font-size:11px;line-height:1.6;color:var(--text2);cursor:pointer;position:relative', onClick: function() {
      var sqlText = "ALTER DATABASE postgres SET app.ingest_api_key = '" + (keyInput.value.trim() || '<your-key>') + "';\nSELECT pg_reload_conf();";
      navigator.clipboard.writeText(sqlText).then(function() { toast('SQL をコピーしました'); });
    }, textContent: "-- クリックでコピー\nALTER DATABASE postgres SET app.ingest_api_key = '" + (currentKey || '<your-key>') + "';\nSELECT pg_reload_conf();"})
  ]));

  // Hook Config Copy
  userCard.appendChild(el('div', {style: 'margin-bottom:8px'}, [
    el('div', {style: 'font-weight:600;font-size:13px;margin-bottom:6px', textContent: 'Hook 設定ファイル（supabase.env）'}),
    el('div', {style: 'font-size:12px;color:var(--text3);margin-bottom:10px', textContent: '.claude/hooks/supabase.env にペーストしてください。'})
  ]));

  var copyEnvBtn = el('button', {className: 'btn btn-g btn-sm', textContent: 'supabase.env をコピー', style: 'margin-bottom:8px'});
  copyEnvBtn.addEventListener('click', function() {
    var envContent = '# Supabase connection for company-dashboard hooks\n'
      + 'SUPABASE_URL="' + SUPABASE_URL + '"\n'
      + 'SUPABASE_ANON_KEY="' + SUPABASE_ANON_KEY + '"\n\n'
      + '# Ingest API Key (migration-015)\n'
      + 'SUPABASE_INGEST_KEY="' + (keyInput.value.trim() || '') + '"\n';
    navigator.clipboard.writeText(envContent).then(function() { toast('supabase.env をコピーしました'); });
  });
  userCard.appendChild(copyEnvBtn);

  // GitHub Secrets
  userCard.appendChild(el('div', {style: 'margin-top:16px;padding-top:16px;border-top:1px solid var(--border)'}, [
    el('div', {style: 'font-weight:600;font-size:13px;margin-bottom:6px', textContent: 'GitHub Actions Secrets'}),
    el('div', {style: 'font-size:12px;color:var(--text3);margin-bottom:8px', textContent: 'Repository → Settings → Secrets → New:'}),
    el('div', {style: 'background:var(--surface2);padding:12px;border-radius:var(--r);font-family:var(--mono);font-size:11px;line-height:1.8;color:var(--text2)'}, [
      el('div', {}, [el('span', {style: 'color:var(--accent2)', textContent: 'SUPABASE_URL'}), document.createTextNode(' = ' + SUPABASE_URL)]),
      el('div', {}, [el('span', {style: 'color:var(--accent2)', textContent: 'SUPABASE_ANON_KEY'}), document.createTextNode(' = ' + SUPABASE_ANON_KEY)]),
      el('div', {}, [el('span', {style: 'color:var(--accent2)', textContent: 'SUPABASE_INGEST_KEY'}), document.createTextNode(' = ' + (keyInput.value.trim() || '<設定してから>'))])
    ])
  ]));

  root.appendChild(userCard);

  // ============================================================
  // Claude Code Settings (existing)
  // ============================================================
  root.appendChild(el('div', {className: 'gradient-line'}));
  root.appendChild(el('div', {className: 'section-title', textContent: 'Claude Code Settings'}));

  var res = await sb.from('claude_settings').select('*').order('scope');
  var settings = res.data || [];

  if (settings.length === 0) {
    root.appendChild(el('div', {className: 'card'}, [
      el('div', {className: 'empty'}, [
        el('div', {textContent: 'まだ設定が同期されていません'}),
        el('div', {style: 'margin-top:8px;font-size:12px;color:var(--text3)', textContent: 'ターミナルで /company を実行すると自動同期されます'})
      ])
    ]));
    return;
  }

  // --- Aggregate all data across scopes ---
  var allPlugins = {};
  var allPermissions = [];
  var allSkills = [];
  var allMcp = {};
  var scopes = [];

  settings.forEach(function(s) {
    // Parse scope: "hostname:path" or legacy "workspace"
    var hostName = '', dirPath = s.server_path || '';
    if (s.scope && s.scope.indexOf(':') > 0) {
      var parts = s.scope.split(':');
      hostName = parts[0];
      dirPath = parts.slice(1).join(':');
    }
    scopes.push({scope: s.scope, host: s.server_host || hostName, path: dirPath, updated: s.updated_at});

    if (s.plugins) Object.keys(s.plugins).forEach(function(p) {
      allPlugins[p] = {enabled: s.plugins[p], scope: s.scope};
    });
    if (s.permissions && s.permissions.allow) {
      s.permissions.allow.forEach(function(p) {
        allPermissions.push({rule: p, scope: s.scope});
      });
    }
    if (s.skills) {
      if (Array.isArray(s.skills)) {
        s.skills.forEach(function(sk) { allSkills.push(typeof sk === 'string' ? {name: sk, scope: s.scope} : Object.assign({scope: s.scope}, sk)); });
      } else {
        Object.keys(s.skills).forEach(function(sk) { allSkills.push({name: sk, scope: s.scope, detail: s.skills[sk]}); });
      }
    }
    if (s.mcp_servers) Object.keys(s.mcp_servers).forEach(function(m) {
      allMcp[m] = Object.assign({scope: s.scope}, s.mcp_servers[m]);
    });
  });

  // --- Scopes Overview ---
  root.appendChild(el('div', {className: 'section-title', textContent: 'Scopes (' + scopes.length + ')'}));
  var scopeGrid = el('div', {className: 'g3'});
  scopes.forEach(function(sc) {
    scopeGrid.appendChild(el('div', {className: 'card'}, [
      el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:4px'}, [
        sc.host ? el('span', {textContent: sc.host, style: 'font-weight:600;font-size:14px;letter-spacing:-.02em'}) : null,
        sc.host ? el('span', {textContent: '●', style: 'font-size:8px;color:#22c55e'}) : null
      ]),
      el('div', {style: 'font-size:11px;font-family:var(--mono);color:var(--text3)', textContent: sc.path || sc.scope}),
      el('div', {style: 'font-size:10px;color:var(--text3);margin-top:8px', textContent: sc.updated ? 'Synced: ' + new Date(sc.updated).toLocaleString('ja-JP') : ''})
    ]));
  });
  root.appendChild(scopeGrid);

  // --- Plugins ---
  root.appendChild(el('div', {className: 'gradient-line'}));
  var pluginKeys = Object.keys(allPlugins);
  root.appendChild(el('div', {className: 'section-title', textContent: 'Plugins (' + pluginKeys.length + ')'}));
  if (pluginKeys.length > 0) {
    var pluginCard = el('div', {className: 'card'});
    pluginKeys.sort().forEach(function(p) {
      var info = allPlugins[p];
      pluginCard.appendChild(el('div', {style: 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px'}, [
        el('span', {className: 'dot ' + (info.enabled ? 'dot-active' : 'dot-archived')}),
        el('span', {style: 'flex:1;font-weight:500', textContent: p}),
        el('span', {className: 'tag tag-co', textContent: info.scope})
      ]));
    });
    root.appendChild(pluginCard);
  }

  // --- Skills ---
  root.appendChild(el('div', {className: 'gradient-line'}));
  root.appendChild(el('div', {className: 'section-title', textContent: 'Skills (' + allSkills.length + ')'}));
  if (allSkills.length > 0) {
    var skillCard = el('div', {className: 'card'});
    allSkills.forEach(function(sk) {
      var row = el('div', {style: 'display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px'}, [
        el('span', {style: 'font-size:15px;opacity:.6', textContent: '⚡'}),
        el('span', {style: 'flex:1'}, [
          el('span', {style: 'font-weight:500', textContent: sk.name || ''}),
          sk.detail ? el('span', {style: 'font-size:11px;color:var(--text3);margin-left:8px', textContent: typeof sk.detail === 'string' ? sk.detail : ''}) : null
        ].filter(Boolean)),
        el('span', {className: 'tag tag-co', textContent: sk.scope})
      ]);
      skillCard.appendChild(row);
    });
    root.appendChild(skillCard);
  } else {
    root.appendChild(el('div', {className: 'card'}, [
      el('div', {className: 'empty', textContent: 'Skills 情報なし'})
    ]));
  }

  // --- MCP Servers ---
  root.appendChild(el('div', {className: 'gradient-line'}));
  var mcpKeys = Object.keys(allMcp);
  root.appendChild(el('div', {className: 'section-title', textContent: 'MCP Servers (' + mcpKeys.length + ')'}));
  if (mcpKeys.length > 0) {
    var mcpCard = el('div', {className: 'card'});
    mcpKeys.sort().forEach(function(m) {
      var info = allMcp[m];
      var toolCount = info.tools ? (Array.isArray(info.tools) ? info.tools.length : Object.keys(info.tools).length) : 0;
      mcpCard.appendChild(el('div', {style: 'padding:10px 0;border-bottom:1px solid var(--border)'}, [
        el('div', {style: 'display:flex;align-items:center;gap:10px;font-size:13px'}, [
          el('span', {style: 'font-size:15px;opacity:.6', textContent: '🔌'}),
          el('span', {style: 'flex:1;font-weight:500', textContent: m}),
          toolCount > 0 ? el('span', {style: 'font-size:11px;color:var(--text3)', textContent: toolCount + ' tools'}) : null,
          el('span', {className: 'tag tag-co', textContent: info.scope})
        ].filter(Boolean)),
        info.command ? el('div', {style: 'font-size:11px;font-family:var(--mono);color:var(--text3);margin:6px 0 0 30px', textContent: info.command + (info.args ? ' ' + (Array.isArray(info.args) ? info.args.join(' ') : info.args) : '')}) : null
      ].filter(Boolean)));
    });
    root.appendChild(mcpCard);
  } else {
    root.appendChild(el('div', {className: 'card'}, [
      el('div', {className: 'empty', textContent: 'MCP Server 情報なし'})
    ]));
  }

  // --- Permissions ---
  root.appendChild(el('div', {className: 'gradient-line'}));
  root.appendChild(el('div', {className: 'section-title', textContent: 'Permissions (' + allPermissions.length + ')'}));
  if (allPermissions.length > 0) {
    var permCard = el('div', {className: 'card', style: 'max-height:400px;overflow-y:auto'});
    // Group by type
    var permGroups = {};
    allPermissions.forEach(function(p) {
      var type = p.rule.split('(')[0] || 'Other';
      if (!permGroups[type]) permGroups[type] = [];
      permGroups[type].push(p);
    });
    Object.keys(permGroups).sort().forEach(function(type) {
      permCard.appendChild(el('div', {style: 'font-size:11px;color:var(--accent2);margin:12px 0 6px;font-weight:600', textContent: type + ' (' + permGroups[type].length + ')'}));
      permGroups[type].forEach(function(p) {
        var detail = p.rule.indexOf('(') > -1 ? p.rule.substring(p.rule.indexOf('(') + 1, p.rule.lastIndexOf(')')) : '';
        permCard.appendChild(el('div', {style: 'font-size:11px;font-family:var(--mono);color:var(--text3);padding:2px 0 2px 12px;display:flex;gap:8px'}, [
          el('span', {style: 'flex:1;word-break:break-all', textContent: detail || p.rule}),
          el('span', {className: 'tag tag-co', style: 'flex-shrink:0', textContent: p.scope})
        ]));
      });
    });
    root.appendChild(permCard);
  }

  // --- CLAUDE.md Viewer ---
  var claudeMdSettings = settings.filter(function(s) { return s.claude_md_content; });
  if (claudeMdSettings.length > 0) {
    root.appendChild(el('div', {className: 'gradient-line'}));
    root.appendChild(el('div', {className: 'section-title', textContent: 'CLAUDE.md (' + claudeMdSettings.length + ' scopes)'}));
    claudeMdSettings.forEach(function(s) {
      var isExpanded = false;
      var contentDiv = el('div', {style: 'display:none;margin-top:12px;padding:16px;background:var(--surface2);border-radius:var(--r);font-size:12px;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;color:var(--text2);line-height:1.7'});
      contentDiv.textContent = s.claude_md_content;
      var toggleBtn = el('button', {className: 'btn btn-g btn-sm', textContent: '展開'});
      toggleBtn.addEventListener('click', function() {
        isExpanded = !isExpanded;
        contentDiv.style.display = isExpanded ? 'block' : 'none';
        toggleBtn.textContent = isExpanded ? '閉じる' : '展開';
      });
      var lineCount = (s.claude_md_content.match(/\n/g) || []).length + 1;
      root.appendChild(el('div', {className: 'card', style: 'margin-bottom:14px'}, [
        el('div', {style: 'display:flex;align-items:center;gap:10px'}, [
          el('div', {style: 'font-weight:600;font-size:14px;flex:1', textContent: s.scope}),
          el('span', {style: 'font-size:11px;color:var(--text3);font-family:var(--mono)', textContent: lineCount + ' lines'}),
          toggleBtn
        ]),
        contentDiv
      ]));
    });
  }

  // --- Skills/MCP Cross-Company Matrix ---
  if (settings.length > 1) {
    root.appendChild(el('div', {className: 'gradient-line'}));
    root.appendChild(el('div', {className: 'section-title', textContent: 'Skills / Plugins Matrix (cross-scope)'}));

    // Build matrix data
    var allScopeNames = settings.map(function(s) { return s.scope; });
    var pluginMatrix = {};
    settings.forEach(function(s) {
      if (!s.plugins) return;
      Object.keys(s.plugins).forEach(function(p) {
        if (!pluginMatrix[p]) pluginMatrix[p] = {};
        pluginMatrix[p][s.scope] = s.plugins[p];
      });
    });

    if (Object.keys(pluginMatrix).length > 0) {
      var tbl = el('div', {className: 'card', style: 'overflow-x:auto'});
      var table = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});
      // Header
      var thead = el('tr', {style: 'border-bottom:2px solid var(--border)'}, [
        el('th', {style: 'text-align:left;padding:8px;font-weight:600;color:var(--text3)', textContent: 'Plugin'})
      ].concat(allScopeNames.map(function(sc) {
        return el('th', {style: 'text-align:center;padding:8px;font-weight:600;color:var(--text3);font-size:10px', textContent: sc});
      })));
      table.appendChild(thead);
      // Rows
      Object.keys(pluginMatrix).sort().forEach(function(p) {
        var row = el('tr', {style: 'border-bottom:1px solid var(--border)'}, [
          el('td', {style: 'padding:6px 8px;font-family:var(--mono);font-size:11px', textContent: p})
        ].concat(allScopeNames.map(function(sc) {
          var val = pluginMatrix[p][sc];
          var icon = val === true ? '●' : val === false ? '○' : '—';
          var color = val === true ? 'var(--green)' : val === false ? 'var(--red)' : 'var(--text3)';
          return el('td', {style: 'text-align:center;padding:6px 8px;color:' + color, textContent: icon});
        })));
        table.appendChild(row);
      });
      tbl.appendChild(table);
      root.appendChild(tbl);
    }
  }
}

// ============================================================
// Boot
// ============================================================
init();

})();
</script>
</body>
</html>
