<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus You</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5046E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Focus You">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // dev (http://localhost) では SW を登録しない（古いキャッシュで開発ループが詰まる）。
    // 既存の SW は unregister + Cache Storage もクリア。
    if ('serviceWorker' in navigator) {
      var isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'http:'
      if (isDev) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister() })
        })
        if ('caches' in window) {
          caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k) }) })
        }
      } else {
        window.addEventListener('load', function () { navigator.serviceWorker.register('/sw.js') })
      }
    }
  </script>
</body>
</html>
