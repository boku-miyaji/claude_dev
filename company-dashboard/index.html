      ['住民税', fmtYen(t.residentTax), ''],
      ['個人事業税', fmtYen(t.businessTax), t.businessTax === 0 ? 'color:var(--text3)' : ''],
      ['─', '─', 'color:var(--border)'],
      ['税金合計', fmtYen(t.totalTax), 'font-weight:600;color:#ef4444'],
      ['実効税率', effRate + '%', 'color:var(--text3)'],
      ['手取り', fmtYen(t.takeHome), 'font-weight:600;color:#22c55e']
    ];
    rows.forEach(function(r) {
      detailBox.appendChild(el('div', {style: 'display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);'+r[2]}, [
        el('span', {textContent: r[0]}),
        el('span', {textContent: r[1]})
      ]));
    });
    resultArea.appendChild(detailBox);
  }

  function updateSim() {
    var rev = parseInt(revInput.value) || 0;
    var exp = parseInt(expInput.value) || 0;
    expLabel.textContent = fmtYen(exp);
    var t = calcTax(rev, exp);
    renderResult(t);
    renderReserveCard(rev, exp);
    renderSchedule(rev, exp);
  }

  expSlider.addEventListener('input', function() { expInput.value = expSlider.value; updateSim(); });
  expInput.addEventListener('input', function() { expSlider.value = expInput.value; updateSim(); });
  revInput.addEventListener('input', function() { expSlider.max = Math.max(parseInt(revInput.value)||0, 5000000); updateSim(); });

  // Initial render
  updateSim();

  // ===== Payment Schedule container =====
  var scheduleContainer = el('div');
  root.appendChild(scheduleContainer);

  function renderSchedule(rev, exp) {
    while (scheduleContainer.firstChild) scheduleContainer.removeChild(scheduleContainer.firstChild);

    scheduleContainer.appendChild(el('div', {style: 'border-top:1px solid var(--border);margin-top:24px;padding-top:24px'}));
    scheduleContainer.appendChild(el('h3', {textContent: '納付スケジュール（自動計算）', style: 'font-size:15px;font-weight:600;margin:0 0 4px'}));
    scheduleContainer.appendChild(el('div', {textContent: '想定売上 '+fmtYen(rev)+' / 想定経費 '+fmtYen(exp)+' から算出。上の入力を変えると連動します。', style: 'font-size:11px;color:var(--text3);margin-bottom:16px'}));

    var projTax = calcTax(rev, exp);
    var estimatedPer = Math.round((projTax.incomeTax + projTax.reconstructionTax) / 3);

    var ny = year + 1;
    var schedule = [
      {label: '所得税 確定申告', sub: year+'年度分', due: ny+'-03-15', amount: projTax.incomeTax + projTax.reconstructionTax, type: 'income_tax'},
      {label: '住民税 1期', sub: year+'年度分', due: ny+'-06-30', amount: Math.ceil(projTax.residentTax / 4), type: 'resident_tax'},
      {label: '予定納税 1期', sub: (ny)+'年度前払い', due: ny+'-07-31', amount: estimatedPer, type: 'estimated_tax'},
      {label: '個人事業税 1期', sub: year+'年度分', due: ny+'-08-31', amount: Math.ceil(projTax.businessTax / 2), type: 'business_tax'},
      {label: '住民税 2期', sub: year+'年度分', due: ny+'-08-31', amount: Math.ceil(projTax.residentTax / 4), type: 'resident_tax'},
      {label: '住民税 3期', sub: year+'年度分', due: ny+'-10-31', amount: Math.ceil(projTax.residentTax / 4), type: 'resident_tax'},
      {label: '予定納税 2期', sub: (ny)+'年度前払い', due: ny+'-11-30', amount: estimatedPer, type: 'estimated_tax'},
      {label: '個人事業税 2期', sub: year+'年度分', due: ny+'-11-30', amount: Math.floor(projTax.businessTax / 2), type: 'business_tax'},
      {label: '住民税 4期', sub: year+'年度分', due: (ny+1)+'-01-31', amount: Math.floor(projTax.residentTax / 4), type: 'resident_tax'}
    ].filter(function(s) { return s.amount > 0; });

    var paidMap = {};
    payments.forEach(function(p) {
      if (p.status === 'paid') { paidMap[p.tax_type + '_' + p.due_date] = p; }
    });

    var schedTotal = schedule.reduce(function(s,p){return s+p.amount;},0);
    var schedPaid = 0;

    scheduleContainer.appendChild(el('div', {style: 'margin-bottom:12px;display:flex;justify-content:space-between;align-items:baseline'}, [
      el('h4', {textContent: year+'年度の所得に対する税金', style: 'font-size:14px;font-weight:600;margin:0'}),
      el('div', {textContent: '合計: '+fmtYen(schedTotal), style: 'font-size:13px;font-weight:600;color:#ef4444'})
    ]));

    var typeColors = {income_tax:'#ef4444', resident_tax:'#f59e0b', business_tax:'#8b5cf6', estimated_tax:'#3b82f6'};

    schedule.forEach(function(s) {
      var isPaid = !!paidMap[s.type + '_' + s.due];
      if (isPaid) schedPaid += s.amount;
      var sc = isPaid ? '#22c55e' : (new Date(s.due) < now ? '#ef4444' : typeColors[s.type] || '#3b82f6');
      var statusText = isPaid ? '支払済' : (new Date(s.due) < now ? '期限超過' : '予定');
      var daysLeft = Math.ceil((new Date(s.due) - now) / 86400000);

      scheduleContainer.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px'}, [
        el('div', {style: 'display:flex;flex-direction:column;gap:2px'}, [
          el('span', {textContent: s.label, style: 'font-weight:500'}),
          el('span', {textContent: s.sub, style: 'font-size:10px;color:var(--text3)'})
        ]),
        el('div', {style: 'display:flex;gap:16px;align-items:center'}, [
          el('span', {textContent: fmtDate(s.due) + (!isPaid && daysLeft > 0 ? ' ('+daysLeft+'日後)' : ''), style: 'color:var(--text3);font-size:12px'}),
          el('span', {textContent: fmtYen(s.amount), style: 'font-weight:600;min-width:100px;text-align:right'}),
          el('span', {textContent: statusText, style: 'font-size:11px;padding:2px 8px;border-radius:4px;background:'+sc+'20;color:'+sc+';min-width:55px;text-align:center'})
        ])
      ]));
    });

    scheduleContainer.appendChild(el('div', {style: 'margin-top:12px;padding:12px 16px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px'}, [
      el('span', {textContent: '支払済: '+fmtYen(schedPaid)+' / '+fmtYen(schedTotal), style: 'color:var(--text3)'}),
      el('span', {textContent: '残り: '+fmtYen(schedTotal - schedPaid), style: 'font-weight:600;color:#ef4444'})
    ]));
  }
}

async function renderDiary(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Diary'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '感じたことを書く。AIが感情・ウェルビーイング・パーソナリティを分析。'}));

  // --- Input Section ---
  var inputCard = el('div', {className: 'card', style: 'margin-bottom:20px'});
  var today = new Date().toISOString().slice(0,10);
  var dateInput = el('input', {type: 'date', className: 'input', value: today, style: 'width:160px;margin-bottom:8px'});
  var bodyInput = el('textarea', {className: 'input', placeholder: '今日感じたこと、考えたこと...', style: 'min-height:120px;resize:vertical;margin-bottom:8px;font-size:14px;line-height:1.7'});
  var saveBtn = el('button', {className: 'btn btn-primary', textContent: '記録する'});
  inputCard.appendChild(el('div', {style: 'display:flex;gap:8px;align-items:center;margin-bottom:8px'}, [dateInput]));
  inputCard.appendChild(bodyInput);
  inputCard.appendChild(saveBtn);
  root.appendChild(inputCard);

  // --- Stats ---
  var statsContainer = el('div', {className: 'g3', style: 'margin-bottom:20px'});
  root.appendChild(statsContainer);

  // --- WBI Chart ---
  var chartCard = el('div', {className: 'card', style: 'margin-bottom:20px'});
  chartCard.appendChild(el('div', {className: 'section-title', textContent: 'ウェルビーイング推移'}));
  var chartArea = el('div', {style: 'height:200px;display:flex;align-items:end;gap:4px;padding:8px 0'});
  chartCard.appendChild(chartArea);
  root.appendChild(chartCard);

  // --- Entries List ---
  var listContainer = el('div', {});
  root.appendChild(listContainer);

  saveBtn.onclick = async function() {
    var body = bodyInput.value.trim();
    if (!body) return;
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中...';
    await sb.from('diary_entries').insert({
      entry_date: dateInput.value,
      body: body,
      entry_type: 'fragment'
    });
    bodyInput.value = '';
    saveBtn.disabled = false;
    saveBtn.textContent = '記録する';
    loadEntries();
  };

  async function loadEntries() {
    // Stats
    var countRes = await sb.from('diary_entries').select('id', {count: 'exact', head: true});
    var totalCount = countRes.count || 0;
    var analyzedRes = await sb.from('diary_entries').select('id', {count: 'exact', head: true}).not('wbi', 'is', null);
    var analyzedCount = analyzedRes.count || 0;

    // Streak calculation
    var datesRes = await sb.from('diary_entries').select('entry_date').order('entry_date', {ascending: false}).limit(60);
    var dates = [...new Set((datesRes.data || []).map(function(d) { return d.entry_date; }))].sort().reverse();
    var streak = 0;
    var checkDate = new Date(); checkDate.setHours(0,0,0,0);
    for (var i = 0; i < dates.length; i++) {
      var d = new Date(dates[i] + 'T00:00:00');
      if (d.getTime() === checkDate.getTime()) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else if (i === 0 && (checkDate.getTime() - d.getTime()) <= 86400000) {
        // Today not yet written, check yesterday
        checkDate.setDate(checkDate.getDate() - 1);
        if (d.getTime() === checkDate.getTime()) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else break;
      } else break;
    }

    while (statsContainer.firstChild) statsContainer.removeChild(statsContainer.firstChild);
    statsContainer.appendChild(el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: totalCount}),
      el('div', {className: 'kpi-lbl', textContent: 'Total Entries'})
    ]));
    statsContainer.appendChild(el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: streak + '日'}),
      el('div', {className: 'kpi-lbl', textContent: 'Streak'})
    ]));
    statsContainer.appendChild(el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: analyzedCount}),
      el('div', {className: 'kpi-lbl', textContent: 'AI Analyzed'})
    ]));

    // WBI Chart (last 30 entries with WBI)
    var wbiRes = await sb.from('diary_entries').select('entry_date,wbi').not('wbi', 'is', null).order('entry_date', {ascending: true}).limit(30);
    while (chartArea.firstChild) chartArea.removeChild(chartArea.firstChild);
    var wbiData = wbiRes.data || [];
    if (wbiData.length === 0) {
      chartArea.appendChild(el('div', {style: 'color:var(--text3);font-size:12px;width:100%;text-align:center;padding:40px 0', textContent: 'AI分析後にグラフが表示されます。/company で「日記を分析して」と言ってください。'}));
    } else {
      wbiData.forEach(function(w) {
        var pct = (w.wbi / 10) * 100;
        var color = w.wbi >= 7 ? 'var(--green)' : w.wbi >= 4 ? 'var(--blue)' : 'var(--red)';
        var bar = el('div', {style: 'flex:1;display:flex;flex-direction:column;align-items:center;gap:2px'}, [
          el('div', {style: 'font-size:9px;color:var(--text3)', textContent: w.wbi.toFixed(1)}),
          el('div', {style: 'width:100%;background:' + color + '44;border-radius:4px 4px 0 0;height:' + pct + '%;min-height:4px;transition:height .3s', title: w.entry_date + ': WBI ' + w.wbi}),
          el('div', {style: 'font-size:8px;color:var(--text3);transform:rotate(-45deg);white-space:nowrap', textContent: w.entry_date.slice(5)})
        ]);
        chartArea.appendChild(bar);
      });
    }

    // Entries list (last 20)
    while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);
    var res = await sb.from('diary_entries').select('*').order('entry_date', {ascending: false}).order('created_at', {ascending: false}).limit(20);
    var entries = res.data || [];

    entries.forEach(function(e) {
      var dateStr = e.entry_date;
      var dow = new Date(e.entry_date + 'T00:00:00').toLocaleDateString('ja-JP', {weekday: 'short'});
      var time = new Date(e.created_at).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

      // Emotion badges
      var emotionBadges = [];
      if (e.emotions) {
        var sorted = Object.entries(e.emotions).sort(function(a,b) { return b[1] - a[1]; }).slice(0, 3);
        var emotionColors = {joy:'#fbbf24', trust:'#34d399', fear:'#a78bfa', surprise:'#f472b6', sadness:'#60a5fa', disgust:'#6b7280', anger:'#f87171', anticipation:'#fb923c'};
        sorted.forEach(function(pair) {
          if (pair[1] > 20) {
            emotionBadges.push(el('span', {style: 'font-size:10px;padding:1px 6px;border-radius:99px;background:' + (emotionColors[pair[0]] || 'var(--text3)') + '22;color:' + (emotionColors[pair[0]] || 'var(--text3)'), textContent: pair[0] + ' ' + pair[1]}));
          }
        });
      }

      // WBI badge
      var wbiBadge = e.wbi ? el('span', {style: 'font-size:10px;padding:1px 6px;border-radius:99px;background:var(--accent)22;color:var(--accent)', textContent: 'WBI ' + e.wbi}) : null;

      var typeBadge = e.entry_type === 'fragment'
        ? el('span', {style: 'font-size:10px;color:var(--text3);border:1px solid var(--border);padding:1px 6px;border-radius:99px', textContent: '断片'})
        : null;

      var header = el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap'}, [
        el('span', {style: 'font-weight:600;font-size:13px', textContent: dateStr + ' (' + dow + ')'}),
        el('span', {style: 'font-size:11px;color:var(--text3)', textContent: time}),
        typeBadge, wbiBadge
      ].concat(emotionBadges).filter(Boolean));

      var card = el('div', {className: 'card', style: 'margin-bottom:10px'}, [
        header,
        el('div', {style: 'font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow:hidden', textContent: e.body}),
        e.ai_summary ? el('div', {style: 'margin-top:8px;padding:8px;background:var(--accent)08;border-radius:6px;font-size:12px;color:var(--accent2)'}, [
          el('span', {style: 'font-weight:600', textContent: 'AI: '}),
          el('span', {textContent: e.ai_summary})
        ]) : null
      ].filter(Boolean));
      listContainer.appendChild(card);
    });
  }

  loadEntries();
}

async function renderArtifacts(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Artifacts'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '成果物の確認・コメント。Claude Code で /register path/to/file.md で登録。'}));

  var companies = (await sb.from('companies').select('id,name').eq('status','active')).data || [];

  // Filter bar
  var filterCompany = el('select', {className: 'input'}, [
    el('option', {value: '', textContent: 'All'})
  ].concat(companies.map(function(c) { return el('option', {value: c.id, textContent: c.name}); })));
  filterCompany.onchange = function() { loadList(); };
  root.appendChild(el('div', {className: 'filter-bar'}, [filterCompany]));

  var listContainer = el('div', {});
  root.appendChild(listContainer);

  // Detail view container
  var detailContainer = el('div', {style: 'display:none'});
  root.appendChild(detailContainer);

  async function loadList() {
    listContainer.style.display = '';
    detailContainer.style.display = 'none';
    while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);

    var query = sb.from('artifacts').select('*,companies(name)').eq('status','active').order('updated_at',{ascending:false});
    if (filterCompany.value) query = query.eq('company_id', filterCompany.value);
    var res = await query;
    var arts = res.data || [];

    // Count open comments per artifact
    var commentRes = await sb.from('artifact_comments').select('artifact_id,id').eq('status','open');
    var commentCounts = {};
    (commentRes.data || []).forEach(function(c) {
      commentCounts[c.artifact_id] = (commentCounts[c.artifact_id] || 0) + 1;
    });

    if (arts.length === 0) {
      listContainer.appendChild(el('div', {className: 'card'}, [
        el('div', {className: 'empty', textContent: 'まだ成果物が登録されていません。上のフォームからファイルパスを登録してください。'})
      ]));
      return;
    }

    arts.forEach(function(a) {
      var coName = a.companies ? a.companies.name : 'HD';
      var synced = a.last_synced_at ? new Date(a.last_synced_at).toLocaleString('ja-JP') : '未同期';
      var openComments = commentCounts[a.id] || 0;
      var commentBadge = openComments > 0
        ? el('span', {style: 'background:var(--orange);color:#000;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;position:relative', textContent: openComments + ' コメント'})
        : el('span', {style: 'color:var(--text3);font-size:11px;cursor:pointer;position:relative', textContent: 'コメントなし'});

      // Comment popover on badge click
      (function(art, badge) {
        badge.onclick = async function(e) {
          e.stopPropagation();
          // Close any existing popover
          var existing = document.querySelector('.comment-popover');
          if (existing) { existing.remove(); return; }

          var popover = el('div', {className: 'comment-popover', style: 'position:absolute;top:100%;right:0;margin-top:8px;z-index:999;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);width:320px;max-height:360px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.3)'});

          popover.appendChild(el('div', {style: 'padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2)', textContent: art.title + ' \u2014 \u30B3\u30E1\u30F3\u30C8'}));

          var loadingEl = el('div', {style: 'padding:16px;text-align:center;color:var(--text3);font-size:12px', textContent: '\u8AAD\u307F\u8FBC\u307F\u4E2D...'});
          popover.appendChild(loadingEl);
          badge.style.position = 'relative';
          badge.appendChild(popover);

          var res = await sb.from('artifact_comments').select('*').eq('artifact_id', art.id).order('created_at', {ascending: false});
          var comments = (res.data || []).filter(function(c) { return c.status === 'open'; });
          loadingEl.remove();

          if (comments.length === 0) {
            popover.appendChild(el('div', {style: 'padding:16px;text-align:center;color:var(--text3);font-size:12px', textContent: '\u30B3\u30E1\u30F3\u30C8\u306A\u3057'}));
          } else {
            comments.forEach(function(c) {
              var time = new Date(c.created_at).toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
              var srcLabel = c.source === 'dashboard' ? '\uD83C\uDF10' : c.source === 'claude' ? '\uD83E\uDD16' : '\uD83D\uDCF1';
              popover.appendChild(el('div', {style: 'padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5'}, [
                el('div', {style: 'display:flex;justify-content:space-between;margin-bottom:4px'}, [
                  el('span', {style: 'font-size:11px;color:var(--text3)', textContent: srcLabel + ' ' + c.source}),
                  el('span', {style: 'font-size:11px;color:var(--text3)', textContent: time})
                ]),
                el('div', {style: 'color:var(--text1);white-space:pre-wrap;word-break:break-word', textContent: c.body})
              ]));
            });
          }

          // Close on outside click
          setTimeout(function() {
            document.addEventListener('click', function closePopover(ev) {
              if (!popover.contains(ev.target)) { popover.remove(); document.removeEventListener('click', closePopover); }
            });
          }, 0);
        };
      })(a, commentBadge);

      var fsBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:3px 10px;flex-shrink:0', textContent: '\u26F6 全画面'});
      (function(art) { fsBtn.onclick = function(e) { e.stopPropagation(); openFullscreen(art); }; })(a);

      var card = el('div', {className: 'card', style: 'cursor:pointer;margin-bottom:12px'}, [
        el('div', {style: 'display:flex;justify-content:space-between;align-items:center;gap:12px'}, [
          el('div', {style: 'flex:1;min-width:0'}, [
            el('div', {style: 'font-weight:600;margin-bottom:4px', textContent: a.title}),
            el('div', {style: 'font-size:12px;color:var(--text3);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis', textContent: a.file_path})
          ]),
          el('div', {style: 'text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px'}, [
            el('div', {style: 'display:flex;gap:6px;align-items:center'}, [el('span', {className: 'tag tag-normal', textContent: coName}), commentBadge, fsBtn]),
            el('div', {style: 'font-size:11px;color:var(--text3)', textContent: '同期: ' + synced})
          ])
        ])
      ]);
      card.onclick = function() { window.location.hash = 'artifacts/' + a.id; showDetail(a); };
      listContainer.appendChild(card);
    });
  }

  async function showDetail(artifact) {
    listContainer.style.display = 'none';
    detailContainer.style.display = '';
    while (detailContainer.firstChild) detailContainer.removeChild(detailContainer.firstChild);

    // Top bar: back + reload + fullscreen + archive
    var backBtn = el('button', {className: 'btn', style: 'font-size:12px', textContent: '\u2190 \u4E00\u89A7\u306B\u623B\u308B'});
    backBtn.onclick = function() { window.location.hash = 'artifacts'; loadList(); };
    var reloadDetailBtn = el('button', {className: 'btn', style: 'font-size:12px', textContent: '\u21BB \u66F4\u65B0'});
    reloadDetailBtn.onclick = async function() {
      reloadDetailBtn.disabled = true;
      reloadDetailBtn.textContent = '\u66F4\u65B0\u4E2D...';
      var res = await sb.from('artifacts').select('*,companies(name)').eq('id', artifact.id).single();
      if (res.data) { artifact = res.data; showDetail(artifact); }
      reloadDetailBtn.disabled = false;
      reloadDetailBtn.textContent = '\u21BB \u66F4\u65B0';
      toast('Artifact \u3092\u66F4\u65B0\u3057\u307E\u3057\u305F');
    };
    var fullscreenBtn = el('button', {className: 'btn btn-primary', style: 'font-size:12px', textContent: '\u26F6 \u5168\u753B\u9762\u3067\u898B\u308B'});
    fullscreenBtn.onclick = function() { openFullscreen(artifact); };
    var archiveBtn = el('button', {className: 'btn', style: 'font-size:12px;color:var(--red)', textContent: '\u30A2\u30FC\u30AB\u30A4\u30D6\uFF08\u8FFD\u8DE1\u505C\u6B62\uFF09'});
    archiveBtn.onclick = function() {
      showConfirm('追跡を停止', 'この成果物の追跡を停止しますか？', async function() {
        await sb.from('artifacts').update({status: 'archived'}).eq('id', artifact.id);
        window.location.hash = 'artifacts';
        loadList();
      }, {label: '停止する'});
    };
    detailContainer.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'}, [backBtn, el('div', {style: 'display:flex;gap:8px'}, [reloadDetailBtn, fullscreenBtn, archiveBtn])]));

    // Title + meta
    var coName = artifact.companies ? artifact.companies.name : 'HD';
    detailContainer.appendChild(el('div', {className: 'page-title', style: 'font-size:1.2rem', textContent: artifact.title}));
    detailContainer.appendChild(el('div', {style: 'display:flex;gap:8px;align-items:center;margin-bottom:16px'}, [
      el('span', {className: 'tag tag-normal', textContent: coName}),
      el('span', {style: 'font-size:12px;font-family:var(--mono);color:var(--text3)', textContent: artifact.file_path}),
      el('span', {style: 'font-size:11px;color:var(--text3)', textContent: artifact.file_type.toUpperCase()})
    ]));

    // Content
    var contentCard = el('div', {className: 'card', style: 'margin-bottom:20px;overflow:auto'});
    if (!artifact.content) {
      contentCard.appendChild(el('div', {className: 'empty', textContent: '未同期。次のセッション起動時に自動同期されます。'}));
    } else if (artifact.file_type === 'html') {
      var iframe = el('iframe', {style: 'width:100%;height:calc(100vh - 280px);min-height:500px;border:none;background:#fff;border-radius:8px'});
      contentCard.appendChild(iframe);
      setTimeout(function() {
        iframe.contentDocument.open();
        iframe.contentDocument.write(artifact.content);
        iframe.contentDocument.close();
      }, 0);
    } else if (artifact.file_type === 'md') {
      contentCard.appendChild(el('div', {style: 'white-space:pre-wrap;font-size:13px;line-height:1.7;font-family:var(--mono)', textContent: artifact.content}));
    } else {
      contentCard.appendChild(el('pre', {style: 'font-size:12px;overflow:auto;max-height:calc(100vh - 280px)', textContent: artifact.content}));
    }
    detailContainer.appendChild(contentCard);

    // Comments section
    var showResolved = false;
    var commentHeader = el('div', {style: 'display:flex;justify-content:space-between;align-items:center'}, [
      el('div', {className: 'section-title', style: 'margin-bottom:0', textContent: 'コメント'}),
      (function() {
        var toggleLabel = el('label', {style: 'display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer'});
        var toggleCb = el('input', {type: 'checkbox', style: 'cursor:pointer'});
        toggleCb.onchange = function() { showResolved = toggleCb.checked; loadComments(); };
        toggleLabel.appendChild(toggleCb);
        toggleLabel.appendChild(document.createTextNode('解決済みを表示'));
        return toggleLabel;
      })()
    ]);
    detailContainer.appendChild(commentHeader);
    var commentList = el('div', {});
    detailContainer.appendChild(commentList);

    // Add comment form
    var commentInput = el('textarea', {className: 'input', placeholder: 'コメントを追加...', style: 'min-height:60px;margin-top:12px;resize:vertical'});
    var commentBtn = el('button', {className: 'btn btn-primary', style: 'margin-top:8px', textContent: 'コメント投稿'});
    detailContainer.appendChild(commentInput);
    detailContainer.appendChild(commentBtn);

    async function loadComments() {
      while (commentList.firstChild) commentList.removeChild(commentList.firstChild);
      var res = await sb.from('artifact_comments').select('*').eq('artifact_id', artifact.id).order('created_at', {ascending: true});
      var comments = res.data || [];
      var filtered = showResolved ? comments : comments.filter(function(c) { return c.status === 'open'; });
      if (comments.length === 0) {
        commentList.appendChild(el('div', {style: 'color:var(--text3);font-size:13px;padding:8px 0', textContent: 'コメントなし'}));
        return;
      }
      var resolvedCount = comments.filter(function(c) { return c.status !== 'open'; }).length;
      if (!showResolved && resolvedCount > 0 && filtered.length === 0) {
        commentList.appendChild(el('div', {style: 'color:var(--text3);font-size:13px;padding:8px 0', textContent: resolvedCount + '件の解決済みコメント（トグルで表示）'}));
        return;
      }
      filtered.forEach(function(c) {
        var time = new Date(c.created_at).toLocaleString('ja-JP');
        var statusColor = c.status === 'open' ? 'var(--orange)' : 'var(--green)';
        var statusText = c.status === 'open' ? 'OPEN' : c.status.toUpperCase();
        var bodyEl = el('div', {style: 'font-size:13px;white-space:pre-wrap', textContent: c.body});
        var actionBtns = el('div', {style: 'display:flex;gap:6px;align-items:center'});

        // Edit button
        (function(comment, bodyDiv, actionDiv) {
          var editBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:3px 10px', textContent: '✎ 編集'});
          editBtn.onclick = function(e) {
            e.stopPropagation();
            var editArea = el('textarea', {className: 'input', style: 'min-height:50px;resize:vertical;font-size:13px', value: comment.body});
            var saveBtn = el('button', {className: 'btn btn-primary', style: 'font-size:11px;padding:3px 10px;margin-top:6px', textContent: '保存'});
            var cancelBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:3px 10px;margin-top:6px', textContent: 'キャンセル'});
            var editActions = el('div', {style: 'display:flex;gap:6px;margin-top:4px'}, [saveBtn, cancelBtn]);
            bodyDiv.textContent = '';
            bodyDiv.appendChild(editArea);
            bodyDiv.appendChild(editActions);
            editArea.focus();
            saveBtn.onclick = async function() {
              var newBody = editArea.value.trim();
              if (!newBody) return;
              saveBtn.disabled = true; saveBtn.textContent = '保存中...';
              await sb.from('artifact_comments').update({body: newBody}).eq('id', comment.id);
              loadComments();
            };
            cancelBtn.onclick = function() { loadComments(); };
          };
          actionDiv.appendChild(editBtn);
        })(c, bodyEl, actionBtns);

        // Resolve button (open only)
        if (c.status === 'open') {
          (function(cid) {
            var resolveBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:3px 10px', textContent: '✓ 解決'});
            resolveBtn.onclick = async function(e) {
              e.stopPropagation();
              await sb.from('artifact_comments').update({status: 'resolved', resolved_by: 'manual', resolved_at: new Date().toISOString()}).eq('id', cid);
              loadComments();
            };
            actionBtns.appendChild(resolveBtn);
          })(c.id);
        }

        var card = el('div', {className: 'card', style: 'margin-bottom:8px;padding:12px' + (c.status !== 'open' ? ';opacity:0.6' : '')}, [
          el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px'}, [
            el('div', {style: 'display:flex;gap:8px;align-items:center'}, [
              el('span', {style: 'font-size:10px;padding:2px 6px;border-radius:4px;background:' + statusColor + '22;color:' + statusColor + ';font-weight:600', textContent: statusText}),
              el('span', {style: 'font-size:11px;color:var(--text3)', textContent: c.source}),
              el('span', {style: 'font-size:11px;color:var(--text3)', textContent: time})
            ]),
            actionBtns
          ]),
          bodyEl
        ]);
        commentList.appendChild(card);
      });
    }

    commentBtn.onclick = async function() {
      var body = commentInput.value.trim();
      if (!body) return;
      await sb.from('artifact_comments').insert({artifact_id: artifact.id, body: body, source: 'dashboard'});
      commentInput.value = '';
      loadComments();
    };

    loadComments();
  }

  // Check if hash points to a specific artifact (e.g. #artifacts/uuid)
  var hashParts = (window.location.hash || '').replace('#', '').split('/');
  if (hashParts[0] === 'artifacts' && hashParts[1]) {
    var artId = hashParts[1];
    var res = await sb.from('artifacts').select('*,companies(name)').eq('id', artId).single();
    if (res.data) {
      showDetail(res.data);
      return;
    }
  }
  loadList();
}

// ============================================================
// Growth Chronicle Page
// ============================================================
async function renderGrowth(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Growth Chronicle'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '失敗と進化の記録 — どう壊れ、どう直し、どう成長したか'}));

  var res = await sb.from('growth_events').select('*').order('event_date', {ascending: true}).order('created_at', {ascending: true});
  var events = res.data || [];

  if (events.length === 0) {
    root.appendChild(el('div', {className: 'card empty', textContent: 'まだ成長記録がありません。seed データを投入してください。'}));
    return;
  }

  // --- KPI Summary ---
  var totalCount = events.length;
  var failures = events.filter(function(e) { return e.event_type === 'failure'; });
  var countermeasures = events.filter(function(e) { return e.event_type === 'countermeasure'; });
  var milestones = events.filter(function(e) { return e.event_type === 'milestone'; });
  var resolved = events.filter(function(e) { return e.status === 'resolved'; });

  var summaryGrid = el('div', {className: 'growth-summary'}, [
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', style: 'color:var(--text)', textContent: String(totalCount)}),
      el('div', {className: 'kpi-lbl', textContent: 'Total Events'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val bad', textContent: String(failures.length)}),
      el('div', {className: 'kpi-lbl', textContent: 'Failures'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', style: 'color:var(--amber)', textContent: String(countermeasures.length)}),
      el('div', {className: 'kpi-lbl', textContent: 'Countermeasures'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val good', textContent: String(milestones.length)}),
      el('div', {className: 'kpi-lbl', textContent: 'Milestones'})
    ])
  ]);
  root.appendChild(summaryGrid);

  // --- Category Progress ---
  var categories = ['security', 'architecture', 'devops', 'automation', 'tooling', 'organization', 'process'];
  var catSection = el('div', {className: 'section', style: 'margin-bottom:28px'});
  catSection.appendChild(el('div', {className: 'section-title', textContent: 'Category Progress'}));
  var catGrid = el('div', {className: 'g2'});
  categories.forEach(function(cat) {
    var catEvents = events.filter(function(e) { return e.category === cat; });
    if (catEvents.length === 0) return;
    var catResolved = catEvents.filter(function(e) { return e.status === 'resolved'; });
    var pct = Math.round(catResolved.length / catEvents.length * 100);
    var catIcons = {security: '🛡', architecture: '🏗', devops: '⚙', automation: '🤖', tooling: '🔧', organization: '🏢', process: '📋'};
    catGrid.appendChild(el('div', {className: 'card', style: 'padding:14px 18px'}, [
      el('div', {style: 'display:flex;align-items:center;justify-content:space-between'}, [
        el('span', {style: 'font-size:13px;font-weight:600'}, [
          document.createTextNode((catIcons[cat] || '') + ' ' + cat)
        ]),
        el('span', {style: 'font-size:12px;font-family:var(--mono);color:var(--text2)', textContent: catResolved.length + '/' + catEvents.length})
      ]),
      el('div', {className: 'growth-cat-bar'}, [
        el('div', {className: 'growth-cat-fill', style: 'width:' + pct + '%;background:' + (pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)')})
      ])
    ]));
  });
  catSection.appendChild(catGrid);
  root.appendChild(catSection);

  // --- Filters ---
  var currentFilter = 'all';
  var filterBar = el('div', {className: 'growth-filters'});
  var filterOptions = [
    {key: 'all', label: 'All'},
    {key: 'failure', label: 'Failures'},
    {key: 'countermeasure', label: 'Countermeasures'},
    {key: 'milestone', label: 'Milestones'},
    {key: 'security', label: 'Security'},
    {key: 'architecture', label: 'Architecture'},
    {key: 'devops', label: 'DevOps'},
    {key: 'automation', label: 'Automation'},
    {key: 'tooling', label: 'Tooling'},
    {key: 'organization', label: 'Organization'}
  ];
  var timelineContainer;

  function renderTimeline() {
    if (timelineContainer) timelineContainer.parentNode.removeChild(timelineContainer);
    timelineContainer = el('div');

    var filtered = events;
    if (currentFilter !== 'all') {
      filtered = events.filter(function(e) {
        return e.event_type === currentFilter || e.category === currentFilter;
      });
    }

    // Group by phase
    var phases = [];
    var phaseMap = {};
    filtered.forEach(function(e) {
      var phaseName = e.phase || 'Other';
      if (!phaseMap[phaseName]) {
        phaseMap[phaseName] = [];
        phases.push(phaseName);
      }
      phaseMap[phaseName].push(e);
    });

    phases.forEach(function(phaseName) {
      var phaseEl = el('div', {className: 'growth-phase'});
      phaseEl.appendChild(el('div', {className: 'growth-phase-label', textContent: phaseName}));

      var timeline = el('div', {className: 'growth-timeline'});

      phaseMap[phaseName].forEach(function(evt) {
        var dotIcons = {failure: '✕', countermeasure: '◆', milestone: '★'};
        var typeLabels = {failure: 'FAILURE', countermeasure: 'COUNTERMEASURE', milestone: 'MILESTONE'};
        var typeColors = {failure: 'var(--red)', countermeasure: 'var(--amber)', milestone: 'var(--green)'};
        var sevColors = {critical: 'var(--red)', high: 'var(--amber)', medium: 'var(--blue)', low: 'var(--text3)'};

        var card = el('div', {className: 'growth-card'});
        var dot = el('div', {className: 'growth-dot ' + evt.event_type, textContent: dotIcons[evt.event_type] || '·'});

        // Header
        card.appendChild(el('div', {className: 'growth-card-header'}, [
          el('div', {className: 'growth-card-title', textContent: evt.title}),
          el('div', {className: 'growth-card-date', textContent: evt.event_date})
        ]));

        // Meta tags
        var metaRow = el('div', {className: 'growth-card-meta'});
        metaRow.appendChild(el('span', {
          className: 'tag',
          style: 'background:' + (typeColors[evt.event_type] || 'var(--text3)') + '11;color:' + (typeColors[evt.event_type] || 'var(--text3)') + ';border:1px solid ' + (typeColors[evt.event_type] || 'var(--text3)') + '33',
          textContent: typeLabels[evt.event_type] || evt.event_type
        }));
        metaRow.appendChild(el('span', {className: 'tag tag-co', textContent: evt.category}));
        if (evt.severity === 'critical' || evt.severity === 'high') {
          metaRow.appendChild(el('span', {
            className: 'tag',
            style: 'background:' + (sevColors[evt.severity]) + '11;color:' + sevColors[evt.severity] + ';border:1px solid ' + sevColors[evt.severity] + '33',
            textContent: evt.severity
          }));
        }
        if (evt.status === 'resolved') {
          metaRow.appendChild(el('span', {className: 'tag', style: 'background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)', textContent: 'resolved'}));
        }
        card.appendChild(metaRow);

        // What happened (always visible summary)
        card.appendChild(el('div', {style: 'margin-top:10px;font-size:13px;color:var(--text2);line-height:1.6', textContent: evt.what_happened}));

        // Detail (expandable)
        var detail = el('div', {className: 'growth-detail'});

        if (evt.root_cause) {
          detail.appendChild(el('div', {className: 'growth-detail-section'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Root Cause'}),
            el('div', {className: 'growth-detail-text', textContent: evt.root_cause})
          ]));
        }
        if (evt.countermeasure) {
          detail.appendChild(el('div', {className: 'growth-detail-section'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Countermeasure'}),
            el('div', {className: 'growth-detail-text', textContent: evt.countermeasure})
          ]));
        }
        if (evt.result) {
          detail.appendChild(el('div', {className: 'growth-detail-section'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Result / Learning'}),
            el('div', {className: 'growth-detail-text', textContent: evt.result})
          ]));
        }

        // Related commits
        if (evt.related_commits && evt.related_commits.length > 0) {
          var commitRow = el('div', {className: 'growth-detail-section'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Related Commits'})
          ]);
          var commitTags = el('div', {style: 'display:flex;gap:4px;flex-wrap:wrap'});
          evt.related_commits.forEach(function(c) {
            commitTags.appendChild(el('span', {className: 'tag', style: 'font-family:var(--mono);font-size:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)', textContent: c}));
          });
          commitRow.appendChild(commitTags);
          detail.appendChild(commitRow);
        }

        // Related migrations
        if (evt.related_migrations && evt.related_migrations.length > 0) {
          var migRow = el('div', {className: 'growth-detail-section'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Related Migrations'})
          ]);
          var migTags = el('div', {style: 'display:flex;gap:4px;flex-wrap:wrap'});
          evt.related_migrations.forEach(function(m) {
            migTags.appendChild(el('span', {className: 'tag', style: 'font-family:var(--mono);font-size:10px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)', textContent: m}));
          });
          migRow.appendChild(migTags);
          detail.appendChild(migRow);
        }

        // Tags
        if (evt.tags && evt.tags.length > 0) {
          var tagRow = el('div', {className: 'growth-detail-section', style: 'margin-bottom:0'}, [
            el('div', {className: 'growth-detail-label', textContent: 'Tags'})
          ]);
          var tagContainer = el('div', {style: 'display:flex;gap:4px;flex-wrap:wrap'});
          evt.tags.forEach(function(t) {
            tagContainer.appendChild(el('span', {className: 'tag', style: 'font-size:10px;background:var(--surface2);color:var(--text3);border:1px solid var(--border)', textContent: t}));
          });
          tagRow.appendChild(tagContainer);
          detail.appendChild(tagRow);
        }

        card.appendChild(detail);

        // Click to expand
        card.addEventListener('click', function() {
          card.classList.toggle('expanded');
        });

        var eventEl = el('div', {className: 'growth-event'}, [dot, card]);
        timeline.appendChild(eventEl);
      });

      phaseEl.appendChild(timeline);
      timelineContainer.appendChild(phaseEl);
    });

    root.appendChild(timelineContainer);
  }

  filterOptions.forEach(function(opt) {
    var btn = el('button', {
      className: 'growth-filter-btn' + (opt.key === 'all' ? ' active' : ''),
      textContent: opt.label,
      onClick: function() {
        currentFilter = opt.key;
        filterBar.querySelectorAll('.growth-filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderTimeline();
      }
    });
    filterBar.appendChild(btn);
  });
  root.appendChild(filterBar);

  renderTimeline();
}

// ============================================================
// How it Works Page (native)
// ============================================================
async function renderHowItWorks(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'How it Works'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '宮路HDの仮想カンパニーシステムがどう動いているか'}));

  function section(title, children) {
    var s = el('div', {style: 'margin-bottom:32px'});
    s.appendChild(el('div', {className: 'section-title', style: 'font-size:15px;margin-bottom:12px', textContent: title}));
    children.forEach(function(c) { s.appendChild(c); });
    return s;
  }
  function p(text) { return el('div', {style: 'font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:8px', textContent: text}); }
  function row(items) { return el('div', {className: 'g' + items.length, style: 'margin-bottom:12px'}, items); }
  function miniCard(title, body) {
    return el('div', {className: 'card', style: 'padding:14px'}, [
      el('div', {style: 'font-weight:600;font-size:13px;margin-bottom:4px', textContent: title}),
      el('div', {style: 'font-size:12px;color:var(--text3);line-height:1.6', textContent: body})
    ]);
  }
  function tbl(headers, rows) {
    var t = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px'});
    var thead = el('tr', {});
    headers.forEach(function(h) { thead.appendChild(el('th', {style: 'text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--accent);font-weight:600', textContent: h})); });
    t.appendChild(thead);
    rows.forEach(function(r) {
      var tr = el('tr', {});
      r.forEach(function(c) { tr.appendChild(el('td', {style: 'padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2)', textContent: c})); });
      t.appendChild(tr);
    });
    return t;
  }
  function flow(steps) {
    return el('div', {style: 'display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0'}, steps.map(function(s, i) {
      var items = [el('span', {style: 'background:var(--accent);color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600', textContent: s})];
      if (i < steps.length - 1) items.push(el('span', {style: 'color:var(--text3)', textContent: '→'}));
      return el('span', {style: 'display:flex;align-items:center;gap:8px'}, items);
    }));
  }

  // --- 1. Architecture ---
  root.appendChild(section('全体アーキテクチャ', [
    p('1人の社長が複数PJを横断管理する仮想持株会社構造。AIエージェント（Claude）が秘書として各社を運営。'),
    flow(['/company', 'HD秘書がPJ判断', 'PJ会社のCLAUDE.md読込', 'HD共通部署で作業', '成果物をPJリポジトリに']),
    row([
      miniCard('HD（.company/）', '秘書室 / 人事部 / 共通6部署（AI開発・システム開発・PM・資料制作・リサーチ・情報収集）'),
      miniCard('PJ会社（.company-*/）', 'PJ固有コンテキスト（クライアント情報・ドメイン知識）+ 秘書のみ。部署はHD共通を利用')
    ]),
    tbl(['PJ会社', '説明', 'ステータス'], [
      ['foundry', 'SOMPOケア Foundry移行PJT支援', 'active'],
      ['rikyu', 'りそな向け営業支援DX', 'active'],
      ['circuit', '電子回路設計DX', 'active']
    ])
  ]));

async function renderSlashCommands(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Slash Commands'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: 'カスタムスキル・スラッシュコマンドの一覧（カテゴリ別）'}));

  if (cmds.length === 0) {
    root.appendChild(el('div', {className: 'card'}, [
      el('div', {className: 'empty', textContent: 'コマンドが登録されていません。次のセッション起動時に自動同期されます。'})
    ]));
    return;
  }

  // KPIs
  var categories = {};
  cmds.forEach(function(c) {
    if (!categories[c.category]) categories[c.category] = [];
    categories[c.category].push(c);
  });
  var catKeys = Object.keys(categories);

  var kpiGrid = el('div', {className: 'g4', style: 'margin-bottom:28px'}, [
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val good', textContent: String(cmds.length)}),
      el('div', {className: 'kpi-lbl', textContent: 'Total Commands'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: String(catKeys.length)}),
      el('div', {className: 'kpi-lbl', textContent: 'Categories'})
    ])
  ]);
  root.appendChild(kpiGrid);

  // Category labels & colors
  var catMeta = {
    organization: {label: '組織・タスク管理', icon: '◫', color: 'var(--blue)'},
    permission:   {label: '権限・設定管理', icon: '⚙', color: 'var(--orange)'},
    utility:      {label: 'ユーティリティ', icon: '◇', color: 'var(--green)'},
    workflow:     {label: 'ワークフロー', icon: '▷', color: 'var(--purple, #8b5cf6)'},
    document:     {label: 'ドキュメント・資料', icon: '◆', color: 'var(--yellow, #eab308)'},
    analysis:     {label: '分析・可視化', icon: '◈', color: 'var(--cyan, #06b6d4)'},
    development:  {label: '開発支援', icon: '☐', color: 'var(--red)'},
    other:        {label: 'その他', icon: '○', color: 'var(--text3)'}
  };

  // Render by category
  catKeys.sort().forEach(function(cat) {
    var meta = catMeta[cat] || catMeta.other;
    var items = categories[cat];

    var section = el('div', {style: 'margin-bottom:24px'});
    section.appendChild(el('div', {className: 'section-title', style: 'color:' + meta.color}, [
      document.createTextNode(meta.icon + ' ' + meta.label + ' (' + items.length + ')')
    ]));

    var card = el('div', {className: 'card'});
    items.forEach(function(cmd) {
      var row = el('div', {style: 'padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px'});

      // Trigger badge
      var badge = el('code', {
        textContent: cmd.trigger,
        style: 'background:var(--accent-bg);color:var(--accent);padding:3px 10px;border-radius:4px;font-size:13px;font-weight:600;white-space:nowrap'
      });
      row.appendChild(badge);

      // Description + source
      var info = el('div', {style: 'flex:1;min-width:0'});
      if (cmd.description) {
        info.appendChild(el('div', {textContent: cmd.description, style: 'font-size:13px;color:var(--text);line-height:1.5'}));
      }
      var metaLine = el('div', {style: 'font-size:11px;color:var(--text3);margin-top:4px'});
      if (cmd.source) metaLine.appendChild(document.createTextNode(cmd.source));
      if (cmd.source_path) {
        metaLine.appendChild(document.createTextNode(' · '));
        metaLine.appendChild(el('span', {textContent: cmd.source_path, style: 'opacity:0.7'}));
      }
      info.appendChild(metaLine);
      row.appendChild(info);

      card.appendChild(row);
    });
    // Remove last border
    if (card.lastChild) card.lastChild.style.borderBottom = 'none';
    section.appendChild(card);
    root.appendChild(section);
  });
}

// --- Sources Tab ---
async function renderSourcesTab(root) {
  var res = await sb.from('intelligence_sources').select('*').order('source_type').order('priority', {ascending: true});
  var sources = res.data || [];

  if (sources.length === 0) {
    root.appendChild(el('div', {className: 'card empty', style: 'padding:40px;text-align:center'}, [
      el('div', {style: 'font-size:14px;color:var(--text2)', textContent: 'ソースが登録されていません。migration-019 を実行してください。'})
    ]));
    return;
  }

  // Group by source_type
  var groups = {};
  var typeLabels = {
    keyword: 'キーワード検索', web_source: '公式ブログ / ニュース',
    tech_article: '技術記事プラットフォーム', github_release: 'GitHub Releases', hacker_news: 'Hacker News',
    x_account: 'X アカウント（参考・制限あり）'
  };
  sources.forEach(function(s) {
    if (!groups[s.source_type]) groups[s.source_type] = [];
    groups[s.source_type].push(s);
  });

  // Add Source button
  var addBtn = el('button', {className: 'btn btn-p btn-sm', textContent: '+ ソース追加', style: 'margin-bottom:20px'});
  addBtn.addEventListener('click', function() { showAddSourceModal(root); });
  root.appendChild(addBtn);

  // Stats
  var enabledCount = sources.filter(function(s) { return s.enabled; }).length;
  root.appendChild(el('div', {style: 'font-size:12px;color:var(--text3);margin-bottom:16px', textContent: '合計 ' + sources.length + ' ソース（有効: ' + enabledCount + '）'}));

  // Render each group
  Object.keys(typeLabels).forEach(function(type) {
    var items = groups[type];
    if (!items || items.length === 0) return;

    root.appendChild(el('div', {className: 'section-title', style: 'margin-top:20px', textContent: typeLabels[type] + ' (' + items.length + ')'}));

    var card = el('div', {className: 'card'});
    items.forEach(function(src, idx) {
      var cfg = src.config || {};
      var detail = '';
      if (src.source_type === 'x_account') detail = 'site:x.com 検索';
      else if (src.source_type === 'keyword') detail = '検索語: "' + (cfg.term || '') + '"';
      else if (src.source_type === 'web_source') detail = cfg.url || '';
      else if (src.source_type === 'tech_article') detail = 'site:' + (cfg.site || '') + ' | キーワード: ' + (cfg.keywords || []).join(', ');
      else if (src.source_type === 'github_release') detail = cfg.repo || '';
      else if (src.source_type === 'hacker_news') detail = 'キーワード: ' + (cfg.keywords || []).join(', ') + ' (min: ' + (cfg.min_score || 0) + 'pt)';

      var priorityColor = src.priority === 'high' ? 'var(--red)' : src.priority === 'low' ? 'var(--text3)' : 'var(--blue)';

      var toggleBtn = el('button', {
        className: 'btn btn-g btn-sm',
        textContent: src.enabled ? 'ON' : 'OFF',
        style: 'font-size:10px;padding:2px 8px;min-width:36px;' + (src.enabled ? 'color:var(--green)' : 'color:var(--red)'),
        onClick: async function() {
          await sb.from('intelligence_sources').update({enabled: !src.enabled}).eq('id', src.id);
          src.enabled = !src.enabled;
          toggleBtn.textContent = src.enabled ? 'ON' : 'OFF';
          toggleBtn.style.color = src.enabled ? 'var(--green)' : 'var(--red)';
          toast((src.enabled ? '有効' : '無効') + 'にしました: ' + src.name);
        }
      });

      var deleteBtn = el('button', {
        className: 'btn btn-g btn-sm',
        textContent: '削除',
        style: 'font-size:10px;padding:2px 8px;color:var(--red)',
        onClick: function() {
          showConfirm('ソースを削除', '"' + src.name + '" を削除しますか？', async function() {
            await sb.from('intelligence_sources').delete().eq('id', src.id);
            row.remove();
            toast('"' + src.name + '" を削除しました');
          });
        }
      });

      // Score bar
      var scoreVal = (src.score || 1.0);
      var scorePercent = Math.round((scoreVal / 2.0) * 100);
      var scoreColor = scoreVal >= 1.3 ? 'var(--green)' : scoreVal <= 0.7 ? 'var(--red)' : 'var(--blue)';
      var scoreBar = el('div', {style: 'width:48px;flex-shrink:0;text-align:center'}, [
        el('div', {style: 'height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:2px'}, [
          el('div', {style: 'height:100%;width:' + scorePercent + '%;background:' + scoreColor + ';border-radius:2px'})
        ]),
        el('div', {style: 'font-size:9px;font-family:var(--mono);color:' + scoreColor, textContent: scoreVal.toFixed(1)})
      ]);

      var fbInfo = (src.useful_count || 0) + (src.noise_count || 0) > 0
        ? el('div', {style: 'font-size:9px;color:var(--text3);margin-top:1px', textContent: '+' + (src.useful_count||0) + ' / -' + (src.noise_count||0)})
        : null;

      var row = el('div', {style: 'display:flex;align-items:center;gap:10px;padding:10px 0;' + (idx < items.length - 1 ? 'border-bottom:1px solid var(--border)' : '')}, [
        el('div', {style: 'width:8px;height:8px;border-radius:50%;background:' + priorityColor + ';flex-shrink:0'}),
        el('div', {style: 'flex:1;min-width:0'}, [
          el('div', {style: 'font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px'}, [
            document.createTextNode(src.name),
            el('span', {className: 'tag tag-co', textContent: src.category})
          ]),
          el('div', {style: 'font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap', textContent: detail}),
          src.note ? el('div', {style: 'font-size:10px;color:var(--text3);margin-top:1px;font-style:italic', textContent: src.note}) : null,
          fbInfo
        ].filter(Boolean)),
        scoreBar,
        el('span', {style: 'font-size:10px;color:var(--text3);flex-shrink:0', textContent: src.frequency}),
        toggleBtn,
        deleteBtn
      ]);
      card.appendChild(row);
    });
    root.appendChild(card);
  });
}

function showAddSourceModal(parentRoot) {
  var typeSelect = el('select', {className: 'input', style: 'margin-bottom:10px'});
  [
    {v: 'x_account', l: 'X アカウント'},
    {v: 'keyword', l: 'キーワード検索'},
    {v: 'web_source', l: 'Web サイト / ブログ'},
    {v: 'tech_article', l: '技術記事プラットフォーム'},
    {v: 'github_release', l: 'GitHub リリース'},
  ].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o.v; opt.textContent = o.l;
    typeSelect.appendChild(opt);
  });

  var nameInput = el('input', {className: 'input', placeholder: '表示名（例: @AnthropicAI, Zenn, Claude Code）', style: 'margin-bottom:10px'});
  var valueInput = el('input', {className: 'input', placeholder: '値（handle / 検索語 / URL / site名 / owner/repo）', style: 'margin-bottom:10px'});
  var keywordsInput = el('input', {className: 'input', placeholder: 'キーワード（tech_article のみ、カンマ区切り）', style: 'margin-bottom:10px'});
  var categoryInput = el('input', {className: 'input', placeholder: 'カテゴリ（例: AI tools, 海外技術記事）', value: 'AI tools', style: 'margin-bottom:10px'});

  var prioritySelect = el('select', {className: 'input', style: 'margin-bottom:10px'});
  ['high', 'normal', 'low'].forEach(function(p) {
    var opt = document.createElement('option'); opt.value = p; opt.textContent = p;
    if (p === 'normal') opt.selected = true;
    prioritySelect.appendChild(opt);
  });

  var saveBtn = el('button', {className: 'btn btn-p', textContent: '追加', onClick: async function() {
    var type = typeSelect.value;
    var name = nameInput.value.trim();
    var value = valueInput.value.trim();
    if (!name || !value) { toast('名前と値は必須です'); return; }

    var config = {};
    if (type === 'x_account') config = {handle: value.replace('@', '')};
    else if (type === 'keyword') config = {term: value};
    else if (type === 'web_source') config = {url: value};
    else if (type === 'tech_article') {
      var kws = keywordsInput.value.split(',').map(function(k) { return k.trim(); }).filter(Boolean);
      config = {site: value, keywords: kws.length > 0 ? kws : [name]};
    }
    else if (type === 'github_release') config = {repo: value};

    await sb.from('intelligence_sources').insert({
      source_type: type, name: name, config: config,
      category: categoryInput.value.trim() || 'general',
      priority: prioritySelect.value
    });
    toast('追加しました: ' + name);
    // Re-render
    while (parentRoot.firstChild) parentRoot.removeChild(parentRoot.firstChild);
    renderSourcesTab(parentRoot);
  }});

  showModal('ソース追加', [typeSelect, nameInput, valueInput, keywordsInput, categoryInput, prioritySelect], [saveBtn]);
}

    var header = el('div', {style: 'display:flex;justify-content:space-between;align-items:center'}, [
