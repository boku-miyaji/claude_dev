// Tasks Page
// ============================================================
async function renderTasks(root) {
  // Skeleton
  var skelT = el('div', {}, [skeletonRows(6)]);
  root.appendChild(skelT);

  var [cosRes, tasksRes] = await Promise.all([
    sb.from('companies').select('id, name').eq('status', 'active'),
    sb.from('tasks').select('*, companies(name)').order('created_at', {ascending: false})
  ]);

  skelT.parentNode.removeChild(skelT);
  if (tasksRes.error) { root.appendChild(inlineError('タスクの取得に失敗しました: ' + tasksRes.error.message, function() { renderPage('tasks'); })); return; }

  var cos = cosRes.data || [];
  var allTasks = tasksRes.data || [];

  // ===== Inline add form (collapsed by default) =====
  var addFormVisible = false;
  var addFormContainer = el('div', {style: 'margin-bottom:20px'});

  var typeSelect = el('select', {className: 'input'});
  ['todo', 'task', 'request'].forEach(function(t) { typeSelect.appendChild(el('option', {value: t, textContent: t.charAt(0).toUpperCase() + t.slice(1)})); });
  var coSelect = el('select', {className: 'input'});
  coSelect.appendChild(el('option', {value: '', textContent: 'HD（全社）'}));
  cos.forEach(function(c) { coSelect.appendChild(el('option', {value: c.id, textContent: c.name})); });
  var priSelect = el('select', {className: 'input'});
  ['normal', 'high', 'low'].forEach(function(p) { priSelect.appendChild(el('option', {value: p, textContent: p})); });
  var titleInput = el('input', {className: 'input', placeholder: '何をする？'});
  var descInput = el('textarea', {className: 'input', placeholder: '詳細（任意）', style: 'min-height:50px'});

  var saveBtn = el('button', {className: 'btn btn-p', style: 'width:100%', textContent: '追加', onClick: async function() {
    var title = titleInput.value.trim();
    var coId = coSelect.value || null;
    if (!title) return;
    var res = await sb.from('tasks').insert({company_id: coId, type: typeSelect.value, title: title, description: descInput.value.trim() || null, priority: priSelect.value}).select('*, companies(name)');
    if (res.data && res.data[0]) { allTasks.unshift(res.data[0]); }
    titleInput.value = ''; descInput.value = '';
    toast('"' + title + '" を追加しました');
    renderTaskList();
  }});
  titleInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveBtn.click(); } });

  var addForm = el('div', {className: 'card', style: 'display:none'}, [
    el('div', {className: 'form-row', style: 'margin-bottom:8px'}, [typeSelect, coSelect, priSelect]),
    el('div', {style: 'margin-bottom:8px'}, [titleInput]),
    el('div', {style: 'margin-bottom:10px'}, [descInput]),
    saveBtn
  ]);
  addFormContainer.appendChild(addForm);

  // Quick comment (collapsed)
  var commentForm = el('div', {style: 'display:none;margin-top:12px'});
  var commentCoSelect = el('select', {className: 'input'});
  cos.forEach(function(c) { commentCoSelect.appendChild(el('option', {value: c.id, textContent: c.name})); });
  var commentInput = el('textarea', {className: 'input', placeholder: 'メモやコメントを残す...', style: 'min-height:50px'});
  var commentBtn = el('button', {className: 'btn btn-g', style: 'width:100%', textContent: 'コメント追加', onClick: async function() {
    var body = commentInput.value.trim();
    var coId = commentCoSelect.value;
    if (!body || !coId) return;
    await sb.from('comments').insert({company_id: coId, body: body, source: window.innerWidth <= 768 ? 'mobile' : 'web'});
    commentInput.value = '';
    toast('コメント追加しました');
  }});
  commentForm.appendChild(el('div', {className: 'card'}, [
    el('div', {style: 'font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px', textContent: 'Quick Comment'}),
    el('div', {className: 'form-row', style: 'margin-bottom:8px'}, [commentCoSelect]),
    el('div', {style: 'margin-bottom:10px'}, [commentInput]),
    commentBtn
  ]));
  addFormContainer.appendChild(commentForm);

  var filters = {status: 'open', company: '', priority: ''};

  function applyFilters() {
    return allTasks.filter(function(t) {
      if (filters.status && t.status !== filters.status) return false;
      if (filters.company && t.company_id !== filters.company) return false;
      if (filters.priority && t.priority !== filters.priority) return false;
      return true;
    });
  }

  function renderTaskList() {
    var listEl = document.getElementById('task-list-container');
    if (!listEl) return;
    while (listEl.firstChild) listEl.removeChild(listEl.firstChild);
    var filtered = applyFilters();
    if (filtered.length === 0) {
      listEl.appendChild(emptyState('☐', 'フィルターに一致するタスクはありません', 'フィルターをリセット', function() {
        filters.status = ''; filters.company = ''; filters.priority = '';
        renderPage('tasks');
      }));
      return;
    }
    filtered.forEach(function(t) {
      var isDone = t.status === 'done';
      var check = el('button', {className: 'task-check' + (isDone ? ' done' : ''), textContent: isDone ? '\u2713' : '', onClick: async function() {
        var newStatus = isDone ? 'open' : 'done';
        await sb.from('tasks').update({status: newStatus, completed_at: newStatus === 'done' ? new Date().toISOString() : null}).eq('id', t.id);
        t.status = newStatus;
        if (newStatus === 'done') { check.classList.add('check-anim'); }
        renderTaskList();
        toast('"' + t.title + '" を' + (newStatus === 'done' ? '完了' : '再オープン') + 'しました');
      }});
      var item = el('div', {className: 'task-item'}, [
        check,
        el('div', {className: 'task-body'}, [
          el('div', {className: 'task-title' + (isDone ? ' done' : ''), textContent: t.title}),
          t.description ? el('div', {style: 'font-size:12px;color:var(--text3);margin-top:3px', textContent: t.description.substring(0, 120)}) : null,
          el('div', {className: 'task-meta'}, [
            el('span', {className: 'tag tag-co', textContent: t.company_id || 'HD'}),
            el('span', {className: 'tag tag-' + t.priority, textContent: t.priority}),
            el('span', {className: 'tag tag-' + t.status, textContent: t.status}),
            t.due_date ? el('span', {style: 'font-size:10px;font-family:var(--mono);color:var(--text3)', textContent: t.due_date}) : null
          ])
        ]),
        el('div', {className: 'task-actions'}, [
          el('button', {className: 'task-act-btn', textContent: '\u270e', title: 'Edit', onClick: function() { showEditTask(t); }}),
          el('button', {className: 'task-act-btn', textContent: '\u00d7', title: 'Delete', onClick: function() {
            showConfirm('タスクを削除', '"' + t.title + '" を削除しますか？この操作は取り消せません。', async function() {
              await sb.from('tasks').delete().eq('id', t.id);
              allTasks = allTasks.filter(function(x) { return x.id !== t.id; });
              renderTaskList();
              toast('"' + t.title + '" を削除しました');
            });
          }})
        ])
      ]);
      listEl.appendChild(item);
    });
  }

  var addToggle = el('button', {className: 'btn btn-p btn-sm', textContent: '+ タスク追加', onClick: function() {
    addFormVisible = !addFormVisible;
    addForm.style.display = addFormVisible ? '' : 'none';
    commentForm.style.display = addFormVisible ? '' : 'none';
    addToggle.textContent = addFormVisible ? '- 閉じる' : '+ タスク追加';
    if (addFormVisible) titleInput.focus();
  }});

  root.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'}, [
    el('div', {}, [
      el('div', {className: 'page-title', textContent: 'Tasks'}),
      el('div', {className: 'page-desc', style: 'margin-bottom:0', textContent: '全PJ会社のタスク一覧・追加・コメント'})
    ]),
    addToggle
  ]));
  root.appendChild(addFormContainer);

  var statusSel = el('select', {className: 'input', onChange: function() { filters.status = statusSel.value; renderTaskList(); }});
  [{v:'',l:'すべて'},{v:'open',l:'Open'},{v:'in_progress',l:'In Progress'},{v:'done',l:'Done'},{v:'cancelled',l:'Cancelled'}].forEach(function(o) {
    var opt = el('option', {value: o.v, textContent: o.l}); if (o.v === 'open') opt.selected = true; statusSel.appendChild(opt);
  });
  var coSel = el('select', {className: 'input', onChange: function() { filters.company = coSel.value; renderTaskList(); }});
  coSel.appendChild(el('option', {value: '', textContent: 'すべての会社'}));
  cos.forEach(function(c) { coSel.appendChild(el('option', {value: c.id, textContent: c.name})); });
  var priSel = el('select', {className: 'input', onChange: function() { filters.priority = priSel.value; renderTaskList(); }});
  [{v:'',l:'すべての優先度'},{v:'high',l:'High'},{v:'normal',l:'Normal'},{v:'low',l:'Low'}].forEach(function(o) { priSel.appendChild(el('option', {value: o.v, textContent: o.l})); });

  root.appendChild(el('div', {className: 'filter-bar'}, [statusSel, coSel, priSel]));
  root.appendChild(el('div', {className: 'card', id: 'task-list-container'}));
  renderTaskList();
}

function showEditTask(t) {
  var titleInput = el('input', {className: 'input', value: t.title});
  var descInput = el('textarea', {className: 'input', value: t.description || ''});
  var priSel = el('select', {className: 'input'});
  ['high','normal','low'].forEach(function(p) { var o = el('option', {value: p, textContent: p}); if (p === t.priority) o.selected = true; priSel.appendChild(o); });
  var statusSel = el('select', {className: 'input'});
  ['open','in_progress','done','cancelled'].forEach(function(s) { var o = el('option', {value: s, textContent: s}); if (s === t.status) o.selected = true; statusSel.appendChild(o); });
  var dueDateInput = el('input', {className: 'input', type: 'date', value: t.due_date || ''});

  var close = showModal('タスクを編集', [
    el('label', {className: 'form-label', textContent: 'Title'}), titleInput,
    el('div', {style: 'height:10px'}),
    el('label', {className: 'form-label', textContent: 'Description'}), descInput,
    el('div', {style: 'height:10px'}),
    el('div', {className: 'form-row'}, [
      el('div', {style: 'flex:1'}, [el('label', {className: 'form-label', textContent: 'Priority'}), priSel]),
      el('div', {style: 'flex:1'}, [el('label', {className: 'form-label', textContent: 'Status'}), statusSel]),
      el('div', {style: 'flex:1'}, [el('label', {className: 'form-label', textContent: 'Due Date'}), dueDateInput])
    ])
  ], [
    el('button', {className: 'btn btn-g', textContent: 'キャンセル', onClick: function() { close(); }}),
    el('button', {className: 'btn btn-p', textContent: '保存', onClick: async function() {
      var newStatus = statusSel.value;
      await sb.from('tasks').update({
        title: titleInput.value.trim(),
        description: descInput.value.trim() || null,
        priority: priSel.value,
        status: newStatus,
        due_date: dueDateInput.value || null,
        completed_at: newStatus === 'done' ? new Date().toISOString() : null
      }).eq('id', t.id);
      close();
      toast('更新しました');
      navigate('tasks');
    }})
  ]);
}

  var cats = catRes.data || [];

  root.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'}, [
    el('div', {}, [
      el('div', {className: 'page-title', textContent: 'Companies'}),
      el('div', {className: 'page-desc', style: 'margin-bottom:0', textContent: 'PJ会社の管理'})
    ]),
    el('div', {style: 'display:flex;gap:8px'}, [

    root.appendChild(el('div', {className: 'card empty', textContent: 'まだPJ会社がありません。最初の会社を作成しましょう。'}));
    return;
  }

  var grouped = {};

  cos.forEach(function(c) {

      if (!grouped[c.category_id]) grouped[c.category_id] = [];
      grouped[c.category_id].push(c);
    } else {
      uncategorized.push(c);
    }
  });

  cats.forEach(function(cat) {
    var catCos = grouped[cat.id] || [];
    if (catCos.length === 0) return;
    root.appendChild(el('div', {className: 'section-title', style: 'margin-top:20px', textContent: cat.name + (cat.description ? ' \u2014 ' + cat.description : '')}));
    var grid = el('div', {className: 'g3', style: 'margin-bottom:16px'});
    catCos.forEach(function(co) { grid.appendChild(makeCompanyCard(co)); });

    root.appendChild(el('div', {className: 'section-title', style: 'margin-top:20px', textContent: 'その他'}));
    var grid2 = el('div', {className: 'g3'});
    uncategorized.forEach(function(co) { grid2.appendChild(makeCompanyCard(co)); });
    root.appendChild(grid2);
  }
}

  var cardStyle = 'background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px';

  var tagStyle = 'display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);margin-right:4px';

  // ===== How it works =====
  var howCard = el('div', {style: cardStyle});
  howCard.appendChild(el('div', {style: labelStyle, textContent: 'Architecture'}));
  howCard.appendChild(el('div', {style: 'font-size:13px;color:var(--text2);line-height:1.8', innerHTML:
    '<b>宮路HD</b> が全体を統括。共通部署はHDに集約し、子会社（PJ）が共有利用する。<br>' +
    '<b>秘書室</b>: 各PJ会社の窓口。社長の指示を受け、適切な部署に振り分けるオーケストレーター。<br>' +
    '<b>CLAUDE.md</b>: 各部署・PJ会社のルールブック。AI Agentがこれに従って動く。<br>' +
    '<b>スキル（/command）</b>: Claude Code の拡張コマンド。特定のワークフローを1コマンドで実行する。'
  }));
  root.appendChild(howCard);

  // ===== HD Shared Departments =====

        var period = '';

        var card = el('div', {className: 'card card-glow'});
        card.appendChild(el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:6px'}, [

        ]));
        if (p.client) card.appendChild(el('div', {style: 'font-size:11px;color:var(--text3);margin-bottom:4px', textContent: p.client}));
        if (p.description) card.appendChild(el('div', {style: 'font-size:12px;color:var(--text2);margin-bottom:8px', textContent: p.description}));
        if (p.outcome) card.appendChild(el('div', {style: 'font-size:12px;color:var(--green);margin-bottom:8px', textContent: '\u2713 ' + p.outcome}));
        if (p.notes) card.appendChild(el('div', {style: 'font-size:12px;color:var(--text2);background:var(--surface2);padding:8px 10px;border-radius:var(--r);margin-bottom:8px;white-space:pre-wrap;line-height:1.6', textContent: p.notes}));
        if (tags.length) card.appendChild(el('div', {style: 'display:flex;flex-wrap:wrap;gap:0'}, tags));
        if (period) card.appendChild(el('div', {style: 'font-size:10px;color:var(--text3);margin-top:8px;font-family:var(--mono)', textContent: period}));
        g.appendChild(card);
      });
      contentArea.appendChild(g);
    }

    // === Services (with CRUD) ===
    contentArea.appendChild(el('div', {className: 'section-title', style: 'display:flex;justify-content:space-between;align-items:center'}, [

    ]));

      contentArea.appendChild(el('div', {className: 'card'}, [el('div', {className: 'empty', textContent: '+ Add Service でサービスを登録'})]));

  // === Modal helper ===
  function showModal(title, fields, onSave, onDelete) {
    var modal = el('div', {style: 'position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)'});
    var box = el('div', {style: 'background:var(--surface);border-radius:var(--r2);padding:24px;max-width:520px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)'});
    box.appendChild(el('div', {style: 'font-size:16px;font-weight:700;margin-bottom:16px', textContent: title}));
    var inputs = {};
    fields.forEach(function(f) {
      box.appendChild(el('div', {style: 'font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;margin-top:12px', textContent: f.label}));
      var inp;
      if (f.type === 'select') {
        inp = el('select', {className: 'input', style: 'width:100%;font-size:13px'});
        f.options.forEach(function(o){inp.appendChild(el('option',{value:o[0],textContent:o[1]}));});
        inp.value = f.value || '';
      } else if (f.type === 'textarea') {
        inp = el('textarea', {className: 'input', placeholder: f.placeholder||'', style: 'width:100%;font-size:13px;min-height:80px;resize:vertical'});
        inp.value = f.value || '';
      } else {
        inp = el('input', {className: 'input', type: f.type||'text', placeholder: f.placeholder||'', style: 'width:100%;font-size:13px'});
        inp.value = f.value || '';
      }
      inputs[f.key] = inp;
      box.appendChild(inp);
    });
    var btnRow = el('div', {style: 'display:flex;gap:8px;margin-top:20px'});
    btnRow.appendChild(el('button', {className: 'btn btn-p', textContent: 'Save', onClick: function() { onSave(inputs); document.body.removeChild(modal); }}));
    btnRow.appendChild(el('button', {className: 'btn btn-g', textContent: 'Cancel', onClick: function() { document.body.removeChild(modal); }}));
    if (onDelete) {
      btnRow.appendChild(el('button', {className: 'btn btn-sm', style: 'margin-left:auto;color:var(--red)', textContent: 'Delete', onClick: function() {
        showConfirm('削除の確認', 'このアイテムを削除しますか？', function() { onDelete(); document.body.removeChild(modal); });
      }}));
    }
    box.appendChild(btnRow);
    modal.appendChild(box);
    modal.addEventListener('click', function(e){if(e.target===modal)document.body.removeChild(modal);});
    document.body.appendChild(modal);
  }

  // === Tech Stack Form ===
  function showTechForm(item) {
    var isEdit = !!item;
    showModal(isEdit ? 'Edit Skill' : 'New Skill', [
      {key:'name', label:'Name', placeholder:'e.g. TypeScript, PyTorch', value: item?item.name:''},
      {key:'category', label:'Category', type:'select', options: Object.keys(catLabels).map(function(k){return [k,catLabels[k]];}), value: item?item.category:'language'},
      {key:'proficiency', label:'Proficiency', type:'select', options: [['beginner','Beginner'],['intermediate','Intermediate'],['advanced','Advanced'],['expert','Expert']], value: item?item.proficiency:'intermediate'},
      {key:'years_experience', label:'Years', type:'number', placeholder:'e.g. 3', value: item?item.years_experience:''},
      {key:'learned_at', label:'Started Learning', type:'date', value: item?item.learned_at:''},
      {key:'notes', label:'Notes (what you studied, resources, etc.)', type:'textarea', value: item?item.notes:''},
    ], async function(inp) {
      var data = {name:inp.name.value.trim(),category:inp.category.value,proficiency:inp.proficiency.value,years_experience:parseInt(inp.years_experience.value)||null,learned_at:inp.learned_at.value||null,notes:inp.notes.value.trim()||null};
      if (!data.name) { toast('Name required'); return; }
      if (isEdit) await sb.from('tech_stack').update(data).eq('id',item.id);
      else await sb.from('tech_stack').insert(data);
      toast(isEdit?'Updated':'Added'); loadAll();
    }, isEdit ? async function() { await sb.from('tech_stack').delete().eq('id',item.id); toast('Deleted'); loadAll(); } : null);
  }

  // === Project Form ===
  function showProjectForm(item) {
    var isEdit = !!item;

async function renderCareer(root) {
  root.appendChild(el('div', {className: 'page-title', style:'display:flex;justify-content:space-between;align-items:center'}, [
    el('span', {textContent: 'Career'}),
    el('button', {className: 'btn btn-p', textContent: '+ 経歴を追加', onClick: function() { showCareerForm(null); }})
  ]));
  root.appendChild(el('div', {className: 'page-desc', textContent: '経歴の時系列と概要'}));

  var contentArea = el('div');
  root.appendChild(contentArea);

  async function loadAndRender() {
    while (contentArea.firstChild) contentArea.removeChild(contentArea.firstChild);
    var [histRes, invRes] = await Promise.all([
      sb.from('career_history').select('*').order('start_date', {ascending: false}),
      sb.from('invoices').select('client_name, invoice_date').order('invoice_date')
    ]);
    var items = histRes.data || [];
    var invoices = invRes.data || [];

    if (items.length === 0) {
      contentArea.appendChild(el('div', {className: 'card', style: 'text-align:center;padding:40px'}, [
        el('div', {style: 'font-size:28px;margin-bottom:12px', textContent: '☆'}),
        el('div', {style: 'font-size:14px;color:var(--text2);margin-bottom:8px', textContent: '経歴がまだ登録されていません'}),
        el('div', {style: 'font-size:12px;color:var(--text3)', textContent: '「+ 経歴を追加」から職歴・学歴・プロジェクト経験を登録してください'})
      ]));
      return;
    }

    // ===== Summary card =====
    var totalYears = 0;
    var orgSet = {};
    var allTags = {};
    items.forEach(function(item) {
      var end = item.end_date ? new Date(item.end_date) : new Date();
      var start = new Date(item.start_date);
      totalYears += (end - start) / (365.25 * 86400000);
      if (item.organization) orgSet[item.organization] = true;
      (item.tags || []).forEach(function(t) { allTags[t] = (allTags[t] || 0) + 1; });
    });
    var topTags = Object.keys(allTags).sort(function(a,b) { return allTags[b] - allTags[a]; }).slice(0, 10);
    var current = items.filter(function(i) { return !i.end_date; });

    var summaryCard = el('div', {style: 'background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px'});
    summaryCard.appendChild(el('div', {style: 'font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px', textContent: 'Summary'}));
    summaryCard.appendChild(el('div', {style: 'display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px'}, [
      el('div', {}, [el('div', {style: 'font-size:22px;font-weight:700', textContent: Math.round(totalYears * 10) / 10 + '年'}), el('div', {style: 'font-size:11px;color:var(--text3)', textContent: '経験年数'})]),
      el('div', {}, [el('div', {style: 'font-size:22px;font-weight:700', textContent: Object.keys(orgSet).length}), el('div', {style: 'font-size:11px;color:var(--text3)', textContent: '所属組織'})]),
      el('div', {}, [el('div', {style: 'font-size:22px;font-weight:700', textContent: items.length}), el('div', {style: 'font-size:11px;color:var(--text3)', textContent: '経歴数'})]),
      el('div', {}, [el('div', {style: 'font-size:22px;font-weight:700;color:var(--accent)', textContent: current.length}), el('div', {style: 'font-size:11px;color:var(--text3)', textContent: '現在進行中'})])
    ]));
    if (topTags.length > 0) {
      var tagRow = el('div', {style: 'display:flex;gap:4px;flex-wrap:wrap'});
      topTags.forEach(function(t) { tagRow.appendChild(el('span', {textContent: t, style: 'font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2)'})); });
      summaryCard.appendChild(tagRow);
    }
    contentArea.appendChild(summaryCard);

    // ===== Auto-detected from invoices =====
    var existingOrgs = {};
    items.forEach(function(i) { if (i.organization) existingOrgs[i.organization] = true; });
    var clientPeriods = {};
    invoices.forEach(function(inv) {
      var name = inv.client_name;
      if (!clientPeriods[name]) clientPeriods[name] = {first: inv.invoice_date, last: inv.invoice_date};
      if (inv.invoice_date < clientPeriods[name].first) clientPeriods[name].first = inv.invoice_date;
      if (inv.invoice_date > clientPeriods[name].last) clientPeriods[name].last = inv.invoice_date;
    });
    var suggestions = Object.keys(clientPeriods).filter(function(name) { return !existingOrgs[name]; });

    if (suggestions.length > 0) {
      var sugCard = el('div', {style: 'background:var(--surface);border:1px solid var(--accent);border-radius:10px;padding:16px 20px;margin-bottom:20px'});
      sugCard.appendChild(el('div', {style: 'font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px', textContent: '請求書データから検出（未登録）'}));
      suggestions.forEach(function(name) {
        var p = clientPeriods[name];
        var row = el('div', {style: 'display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)'});
        row.appendChild(el('div', {}, [
          el('span', {textContent: name, style: 'font-size:13px;font-weight:500'}),
          el('span', {textContent: '  ' + p.first.substring(0,7) + ' \u2014 ' + p.last.substring(0,7), style: 'font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:8px'})
        ]));
        row.appendChild(el('button', {className: 'btn btn-p btn-sm', style: 'font-size:11px', textContent: '+ 登録', onClick: function() {
          showCareerForm({title: '\u696D\u52D9\u59D4\u8A17', organization: name, role: '\u696D\u52D9\u59D4\u8A17', start_date: p.first, end_date: null, description: '', tags: []});
        }}));
        sugCard.appendChild(row);
      });
      contentArea.appendChild(sugCard);
    }

    // ===== What's auto / manual =====
    var infoCard = el('div', {style: 'background:var(--surface2);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:11px;color:var(--text3);line-height:1.7'});
    infoCard.appendChild(el('span', {style: 'color:var(--text2);font-weight:600', textContent: '\u81EA\u52D5'}));
    infoCard.appendChild(document.createTextNode(': Summary\uFF08\u7D4C\u9A13\u5E74\u6570\u30FB\u7D44\u7E54\u6570\u30FB\u30BF\u30B0\u96C6\u8A08\uFF09\u3001\u8ACB\u6C42\u66F8\u304B\u3089\u306E\u672A\u767B\u9332\u30AF\u30E9\u30A4\u30A2\u30F3\u30C8\u691C\u51FA\u3000|\u3000'));
    infoCard.appendChild(el('span', {style: 'color:var(--text2);font-weight:600', textContent: '\u624B\u52D5'}));
    infoCard.appendChild(document.createTextNode(': \u7D4C\u6B74\u306E\u8FFD\u52A0\u30FB\u7DE8\u96C6\u30FB\u524A\u9664\u3001\u8A73\u7D30\u3084\u5F79\u8077\u306E\u8A18\u5165'));
    contentArea.appendChild(infoCard);

    // ===== Timeline =====
    var tlCard = el('div', {style: 'position:relative;padding-left:20px'});
    tlCard.appendChild(el('div', {style: 'position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:var(--border)'}));

    items.forEach(function(item) {
      var isCurrent = !item.end_date;
      var startY = item.start_date.substring(0, 7).replace('-', '/');
      var endY = isCurrent ? '現在' : item.end_date.substring(0, 7).replace('-', '/');
      var dotColor = isCurrent ? 'var(--accent)' : 'var(--border2)';

      var row = el('div', {style: 'padding:14px 0;position:relative'});
      row.appendChild(el('div', {style: 'position:absolute;left:-17px;top:18px;width:10px;height:10px;border-radius:50%;background:'+dotColor+';border:2px solid var(--surface)'}));

      // Period
      row.appendChild(el('div', {style: 'font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:4px', textContent: startY + ' — ' + endY}));

      // Title + org
      var header = el('div', {style: 'display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap'});
      header.appendChild(el('span', {style: 'font-size:14px;font-weight:600', textContent: item.title}));
      if (item.organization) header.appendChild(el('span', {style: 'font-size:12px;color:var(--text3)', textContent: item.organization}));
      if (item.role) header.appendChild(el('span', {style: 'font-size:11px;color:var(--accent);font-weight:500', textContent: item.role}));
      if (isCurrent) header.appendChild(el('span', {style: 'font-size:9px;padding:1px 6px;border-radius:3px;background:var(--accent);color:#fff;font-weight:600', textContent: 'NOW'}));
      row.appendChild(header);

      // Description
      if (item.description) row.appendChild(el('div', {style: 'font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap', textContent: item.description}));

      // Tags
      if (item.tags && item.tags.length > 0) {
        var tags = el('div', {style: 'display:flex;gap:4px;flex-wrap:wrap;margin-top:6px'});
        item.tags.forEach(function(t) { tags.appendChild(el('span', {textContent: t, style: 'font-size:10px;padding:1px 6px;border-radius:3px;background:var(--surface2);color:var(--text3)'})); });
        row.appendChild(tags);
      }

      // Actions
      var actions = el('div', {style: 'display:flex;gap:6px;margin-top:8px'});
      actions.appendChild(el('button', {className: 'btn btn-g btn-sm', style: 'font-size:11px', textContent: '編集', onClick: function() { showCareerForm(item); }}));
      actions.appendChild(el('button', {className: 'btn btn-sm', style: 'font-size:11px;color:var(--red);background:transparent;border:none;cursor:pointer', textContent: '削除', onClick: function() {
        showConfirm('経歴を削除', '"' + item.title + '" を削除しますか？', async function() {
          await sb.from('career_history').delete().eq('id', item.id);
          toast('削除しました');
          loadAndRender();
        });
      }}));
      row.appendChild(actions);
      tlCard.appendChild(row);
    });

    contentArea.appendChild(tlCard);
  }

  function showCareerForm(item) {
    var isEdit = !!item;
    var overlay = el('div', {style: 'position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)'});
    var box = el('div', {style: 'background:var(--surface);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)'});
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });

    box.appendChild(el('div', {style: 'font-size:16px;font-weight:600;margin-bottom:16px', textContent: isEdit ? '経歴を編集' : '経歴を追加'}));

    var inputStyle = 'width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);box-sizing:border-box';

    function field(label, inputEl) {
      box.appendChild(el('div', {style: 'margin-bottom:12px'}, [
        el('label', {textContent: label, style: 'font-size:12px;color:var(--text3);display:block;margin-bottom:4px'}),
        inputEl
      ]));
      return inputEl;
    }

    var fTitle = field('タイトル（例: AI開発エンジニア、東京大学 工学部）', el('input', {style: inputStyle, placeholder: '何をしていたか', value: item ? item.title : ''}));
    var fOrg = field('組織名（例: 株式会社ACES）', el('input', {style: inputStyle, placeholder: '所属先', value: item ? (item.organization || '') : ''}));
    var fRole = field('役職・立場（例: テックリード、業務委託）', el('input', {style: inputStyle, placeholder: '任意', value: item ? (item.role || '') : ''}));

    var dateRow = el('div', {style: 'display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px'});
    var fStart = el('input', {type: 'date', style: inputStyle, value: item ? item.start_date : ''});
    var fEnd = el('input', {type: 'date', style: inputStyle, value: item ? (item.end_date || '') : ''});
    dateRow.appendChild(el('div', {}, [el('label', {textContent: '開始日', style: 'font-size:12px;color:var(--text3);display:block;margin-bottom:4px'}), fStart]));
    dateRow.appendChild(el('div', {}, [el('label', {textContent: '終了日（空欄 = 現在）', style: 'font-size:12px;color:var(--text3);display:block;margin-bottom:4px'}), fEnd]));
    box.appendChild(dateRow);

    var fDesc = field('詳細（やったこと・経験・成果）', el('textarea', {style: inputStyle + ';min-height:100px;resize:vertical', placeholder: '自由に記述', value: item ? (item.description || '') : ''}));
    var fTags = field('タグ（カンマ区切り: AI, Python, マネジメント）', el('input', {style: inputStyle, placeholder: 'AI, LLM, Python', value: item ? (item.tags || []).join(', ') : ''}));

    var statusMsg = el('div', {style: 'font-size:12px;min-height:16px;margin-bottom:8px'});
    box.appendChild(statusMsg);

    var btnRow = el('div', {style: 'display:flex;gap:8px;justify-content:flex-end'});
    btnRow.appendChild(el('button', {textContent: 'キャンセル', style: 'padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:13px', onClick: function() { overlay.remove(); }}));
    btnRow.appendChild(el('button', {textContent: isEdit ? '更新' : '追加', style: 'padding:8px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600', onClick: async function() {
      var title = fTitle.value.trim();
      if (!title) { statusMsg.textContent = 'タイトルは必須です'; statusMsg.style.color = '#ef4444'; return; }
      if (!fStart.value) { statusMsg.textContent = '開始日は必須です'; statusMsg.style.color = '#ef4444'; return; }
      var tags = fTags.value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
      var data = {title: title, organization: fOrg.value.trim() || null, role: fRole.value.trim() || null, start_date: fStart.value, end_date: fEnd.value || null, description: fDesc.value.trim() || null, tags: tags.length > 0 ? tags : null};
      if (isEdit) { await sb.from('career_history').update(data).eq('id', item.id); toast('更新しました'); }
      else { await sb.from('career_history').insert(data); toast('追加しました'); }
      overlay.remove();
      loadAndRender();
    }}));
    box.appendChild(btnRow);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    fTitle.focus();
  }

  loadAndRender();
}

// Knowledge Page

async function renderKnowledge(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Knowledge Base'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: 'LLMデフォルトとの差分ルール — 毎回指示しなくても適用される知識'}));

  var skelK = skeletonRows(5);
  root.appendChild(skelK);
  var res = await sb.from('knowledge_base').select('*,companies(name)').order('confidence', {ascending: false});
  skelK.parentNode.removeChild(skelK);
  if (res.error) { root.appendChild(inlineError('ナレッジの取得に失敗しました: ' + res.error.message, function() { renderPage('knowledge'); })); return; }
  var items = res.data || [];
  var active = items.filter(function(i){return i.status === 'active'});
  var promoted = items.filter(function(i){return i.status === 'promoted'});

  // Stats
  root.appendChild(el('div', {className: 'g4', style: 'margin-bottom:24px'}, [
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: active.length}),
      el('div', {className: 'kpi-lbl', textContent: 'Active Rules'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val good', textContent: active.filter(function(i){return i.confidence>=3}).length}),
      el('div', {className: 'kpi-lbl', textContent: 'High Confidence'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: active.filter(function(i){return i.scope==='global'}).length}),
      el('div', {className: 'kpi-lbl', textContent: 'Global'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: promoted.length}),
      el('div', {className: 'kpi-lbl', textContent: 'Promoted to CLAUDE.md'})
    ])
  ]));

  if (items.length === 0) {
    root.appendChild(el('div', {className: 'card'}, [
      el('div', {className: 'empty'}, [
        el('div', {textContent: 'ナレッジなし'}),
        el('div', {style: 'margin-top:8px;font-size:12px;color:var(--text3)', textContent: '社長が修正指示や好みを伝えると、自動的にナレッジとして蓄積されます'})
      ])
    ]));
    return;
  }

  // Category config
  var catLabels = {
    coding: 'Coding', documentation: 'Documentation', communication: 'Communication',
    design: 'Design', process: 'Process', quality: 'Quality',
    tools: 'Tools', domain: 'Domain', other: 'Other'
  };

  // Group by category
  var grouped = {};
  active.forEach(function(i) {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  Object.keys(catLabels).forEach(function(cat) {
    var catItems = grouped[cat];
    if (!catItems || catItems.length === 0) return;

    root.appendChild(el('div', {className: 'section-title', textContent: catLabels[cat] + ' (' + catItems.length + ')'}));
    var card = el('div', {className: 'card', style: 'margin-bottom:20px'});

    catItems.forEach(function(item) {
      var scopeLabel = item.scope === 'global' ? '全社' : (item.companies ? item.companies.name : item.company_id || '');
      var confDots = '';
      for (var i = 0; i < Math.min(item.confidence, 5); i++) confDots += '●';
      for (var j = item.confidence; j < 5; j++) confDots += '○';

      card.appendChild(el('div', {style: 'padding:12px 0;border-bottom:1px solid var(--border)'}, [
        el('div', {style: 'display:flex;align-items:flex-start;gap:10px'}, [
          el('div', {style: 'flex:1'}, [
            el('div', {style: 'font-size:13px;font-weight:500;margin-bottom:4px', textContent: item.rule}),
            item.reason ? el('div', {style: 'font-size:11px;color:var(--text3)', textContent: item.reason}) : null
          ].filter(Boolean)),
          el('div', {style: 'flex-shrink:0;text-align:right'}, [
            el('div', {style: 'font-size:11px;color:var(--accent2);letter-spacing:2px', textContent: confDots}),
            el('span', {className: 'tag tag-co', style: 'margin-top:4px', textContent: scopeLabel})
          ])
        ])
      ]));
    });
    root.appendChild(card);
  });

  // Promoted section
  if (promoted.length > 0) {
    root.appendChild(el('div', {className: 'gradient-line'}));
    root.appendChild(el('div', {className: 'section-title', textContent: 'Promoted to CLAUDE.md (' + promoted.length + ')'}));
    var proCard = el('div', {className: 'card'});
    promoted.forEach(function(item) {
      proCard.appendChild(el('div', {style: 'padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:8px;align-items:center'}, [
        el('span', {style: 'color:var(--green)', textContent: '✓'}),
        el('span', {style: 'flex:1;color:var(--text2)', textContent: item.rule}),
        el('span', {style: 'font-size:10px;color:var(--text3);font-family:var(--mono)', textContent: item.promoted_to || 'CLAUDE.md'})
      ]));
    });
    root.appendChild(proCard);
  }
}

async function renderPrompts(root) {

  root.appendChild(el('div', {className: 'page-desc', textContent: '社長の入力プロンプト履歴（会社別）'}));

  // Filters
  var companies = (await sb.from('companies').select('id,name').eq('status', 'active')).data || [];
  var filterCompany = el('select', {className: 'input'}, [
    el('option', {value: '', textContent: 'All Companies'}),
  ].concat(companies.map(function(c) { return el('option', {value: c.id, textContent: c.name}); })));
  var filterBar = el('div', {className: 'filter-bar'}, [filterCompany]);
  root.appendChild(filterBar);

  var PAGE_SIZE = 50;
  var currentPage = 0;
  var totalPromptCount = 0;

  var listContainer = el('div', {});
  root.appendChild(listContainer);

  // Pagination controls
  var pagBar = el('div', {style: 'display:flex;align-items:center;gap:12px;margin-top:16px;justify-content:center'});
  var pagInfo = el('span', {style: 'font-size:12px;color:var(--text3)'});
  var btnPrev = el('button', {className: 'btn', textContent: '← 前', style: 'font-size:12px;padding:6px 14px'});
  var btnNext = el('button', {className: 'btn', textContent: '次 →', style: 'font-size:12px;padding:6px 14px'});
  btnPrev.onclick = function() { if (currentPage > 0) { currentPage--; loadPrompts(); } };
  btnNext.onclick = function() { currentPage++; loadPrompts(); };
  pagBar.appendChild(btnPrev);
  pagBar.appendChild(pagInfo);
  pagBar.appendChild(btnNext);
  root.appendChild(pagBar);

  async function loadPrompts() {
    // Get total count
    var countRes = await sb.from('prompt_log').select('id', {count: 'exact', head: true});
    totalPromptCount = countRes.count || 0;

    var offset = currentPage * PAGE_SIZE;
    var query = sb.from('prompt_log').select('*,companies(name)').order('created_at', {ascending: false}).range(offset, offset + PAGE_SIZE - 1);
    var compVal = filterCompany.value;
    if (compVal) query = query.eq('company_id', compVal);
    var res = await query;
    var prompts = res.data || [];

    // Update pagination
    var totalPages = Math.ceil(totalPromptCount / PAGE_SIZE);
    pagInfo.textContent = (currentPage + 1) + ' / ' + totalPages + ' (' + totalPromptCount + '件)';
    btnPrev.disabled = currentPage <= 0;
    btnNext.disabled = offset + PAGE_SIZE >= totalPromptCount;
    btnPrev.style.opacity = btnPrev.disabled ? '0.3' : '1';
    btnNext.style.opacity = btnNext.disabled ? '0.3' : '1';

    while (listContainer.firstChild) listContainer.removeChild(listContainer.firstChild);

    if (prompts.length === 0) {
      listContainer.appendChild(el('div', {className: 'card'}, [
        el('div', {className: 'empty', textContent: 'プロンプト履歴なし。/company でやりとりすると自動記録されます'})
      ]));
      return;
    }

    // Group by date
    var grouped = {};
    prompts.forEach(function(p) {
      var d = new Date(p.created_at).toLocaleDateString('ja-JP');
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(p);
    });

    Object.keys(grouped).forEach(function(date) {
      listContainer.appendChild(el('div', {className: 'section-title', style: 'margin-top:20px', textContent: date + ' (' + grouped[date].length + ')'}));
      var card = el('div', {className: 'card'});
      grouped[date].forEach(function(p) {
        var time = new Date(p.created_at).toLocaleTimeString('ja-JP', {hour: '2-digit', minute: '2-digit'});
        var coName = p.companies ? p.companies.name : (p.context || 'HD');
        var tags = (p.tags || []).map(function(t) { return el('span', {className: 'tag tag-co', style: 'margin-right:4px', textContent: t}); });
        card.appendChild(el('div', {style: 'padding:10px 0;border-bottom:1px solid var(--border)'}, [
          el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:6px'}, [
            el('span', {style: 'font-size:11px;font-family:var(--mono);color:var(--text3)', textContent: time}),
            el('span', {className: 'tag tag-normal', textContent: coName})
          ].concat(tags)),
          el('div', {style: 'font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden', textContent: p.prompt})
        ]));
      });
      listContainer.appendChild(card);
    });

    // Stats
    listContainer.insertBefore(el('div', {className: 'g3', style: 'margin-bottom:20px'}, [
      el('div', {className: 'card kpi'}, [
        el('div', {className: 'kpi-val', textContent: totalPromptCount}),
        el('div', {className: 'kpi-lbl', textContent: 'Total Prompts'})
      ]),
      el('div', {className: 'card kpi'}, [
        el('div', {className: 'kpi-val', textContent: Object.keys(grouped).length}),
        el('div', {className: 'kpi-lbl', textContent: 'Days (this page)'})
      ]),
      el('div', {className: 'card kpi'}, [
        el('div', {className: 'kpi-val', textContent: companies.length}),
        el('div', {className: 'kpi-lbl', textContent: 'Companies'})
      ])
    ]), listContainer.firstChild);
  }

  filterCompany.addEventListener('change', loadPrompts);
  await loadPrompts();
}

async function renderInsights(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'CEO Insights'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '社長分析 — 行動パターン・好み・傾向'}));

  var skelI = skeletonGrid(2, 4, 'skeleton-card');
  root.appendChild(skelI);
  var res = await sb.from('ceo_insights').select('*,companies(name)').order('created_at', {ascending: false});
  skelI.parentNode.removeChild(skelI);
  if (res.error) { root.appendChild(inlineError('インサイトの取得に失敗しました: ' + res.error.message, function() { renderPage('insights'); })); return; }
  var insights = res.data || [];

  if (insights.length === 0) {
    root.appendChild(emptyState('◇', 'インサイトはまだありません。プロンプトが10件以上蓄積されると、社長分析部が自動で分析を開始します。'));
    return;
  }

  // Category config
  // --- Work Rhythm Chart (from prompt_log timestamps) ---
  var logRes = await sb.from('prompt_log').select('created_at');
  var logs = logRes.data || [];
  if (logs.length >= 5) {
    root.appendChild(el('div', {className: 'section-title', textContent: '⏰ 稼働リズム'}));
    var rhythmCard = el('div', {className: 'card', style: 'margin-bottom:24px'});

    // Hour distribution (JST = UTC+9)
    var hourCounts = new Array(24).fill(0);
    var dowCounts = new Array(7).fill(0);
    var dowLabels = ['日','月','火','水','木','金','土'];
    logs.forEach(function(l) {
      var d = new Date(l.created_at);
      var jstHour = (d.getUTCHours() + 9) % 24;
      hourCounts[jstHour]++;
      var jstDay = new Date(d.getTime() + 9*60*60*1000).getDay();
      dowCounts[jstDay]++;
    });

    var maxHour = Math.max.apply(null, hourCounts) || 1;
    var maxDow = Math.max.apply(null, dowCounts) || 1;

    // Hour chart
    rhythmCard.appendChild(el('div', {textContent: '時間帯別アクティビティ', style: 'font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)'}));
    var hourBar = el('div', {style: 'display:flex;align-items:flex-end;gap:2px;height:60px;margin-bottom:16px'});
    for (var h = 0; h < 24; h++) {
      var pct = Math.round(hourCounts[h] / maxHour * 100);
      var isLate = h >= 22 || h < 6;
      hourBar.appendChild(el('div', {
        title: h + ':00 — ' + hourCounts[h] + '件',
        style: 'flex:1;min-width:0;background:' + (isLate ? 'var(--red)' : 'var(--accent)') + ';opacity:' + (pct > 0 ? Math.max(0.3, pct/100) : 0.05) + ';height:' + Math.max(2, pct) + '%;border-radius:2px 2px 0 0;cursor:default'
      }));
    }
    rhythmCard.appendChild(hourBar);
    var hourLabels = el('div', {style: 'display:flex;gap:2px;font-size:9px;color:var(--text3);font-family:var(--mono)'});
    for (var h2 = 0; h2 < 24; h2++) {
      hourLabels.appendChild(el('div', {style: 'flex:1;min-width:0;text-align:center', textContent: h2 % 3 === 0 ? h2+'' : ''}));
    }
    rhythmCard.appendChild(hourLabels);

    // Day of week chart
    rhythmCard.appendChild(el('div', {textContent: '曜日別アクティビティ', style: 'font-size:12px;font-weight:600;margin:20px 0 8px;color:var(--text2)'}));
    var dowBar = el('div', {style: 'display:flex;gap:4px;height:40px;align-items:flex-end'});
    for (var dw = 0; dw < 7; dw++) {
      var dpct = Math.round(dowCounts[dw] / maxDow * 100);
      var isWeekend = dw === 0 || dw === 6;
      dowBar.appendChild(el('div', {style: 'flex:1;display:flex;flex-direction:column;align-items:center;gap:4px'}, [
        el('div', {style: 'width:100%;background:' + (isWeekend ? 'var(--amber)' : 'var(--accent)') + ';height:' + Math.max(2, dpct) + '%;border-radius:3px;opacity:' + (dpct > 0 ? Math.max(0.3, dpct/100) : 0.1)}),
        el('div', {textContent: dowLabels[dw], style: 'font-size:10px;color:var(--text3)'})
      ]));
    }
    rhythmCard.appendChild(dowBar);

    // Stats summary
    var peakHour = hourCounts.indexOf(maxHour);
    var peakDow = dowCounts.indexOf(maxDow);
    var lateNight = hourCounts.slice(22).reduce(function(a,b){return a+b;},0) + hourCounts.slice(0,6).reduce(function(a,b){return a+b;},0);
    var lateRate = logs.length > 0 ? Math.round(lateNight / logs.length * 100) : 0;

    rhythmCard.appendChild(el('div', {style: 'display:flex;gap:24px;margin-top:16px;font-size:12px;color:var(--text2)'}, [
      el('span', {}, [el('span', {textContent: 'ピーク時間: ', style: 'color:var(--text3)'}), el('span', {textContent: peakHour+':00', style: 'font-weight:600'})]),
      el('span', {}, [el('span', {textContent: '最活発曜日: ', style: 'color:var(--text3)'}), el('span', {textContent: dowLabels[peakDow], style: 'font-weight:600'})]),
      el('span', {}, [el('span', {textContent: '深夜率: ', style: 'color:var(--text3)'}), el('span', {textContent: lateRate+'%', style: 'font-weight:600;color:' + (lateRate > 20 ? 'var(--red)' : 'var(--text)')})])
    ]));

    root.appendChild(rhythmCard);
  }

  var catConfig = {
    pattern: {label: 'パターン', icon: '◎', color: 'var(--accent2)'},
    preference: {label: '好み', icon: '♡', color: 'var(--green)'},
    strength: {label: '得意分野', icon: '★', color: 'var(--amber)'},
    tendency: {label: '傾向', icon: '→', color: 'var(--blue)'},
    feedback: {label: 'フィードバック', icon: '↩', color: 'var(--red)'},
    work_rhythm: {label: '稼働リズム', icon: '⏰', color: 'var(--accent)'}
  };

  var confColors = {high: 'var(--green)', medium: 'var(--amber)', low: 'var(--text3)'};

  // Group by category
  var grouped = {};
  insights.forEach(function(i) {
    if (!grouped[i.category]) grouped[i.category] = [];
    grouped[i.category].push(i);
  });

  // Stats
  root.appendChild(el('div', {className: 'g4', style: 'margin-bottom:24px'}, [
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: insights.length}),
      el('div', {className: 'kpi-lbl', textContent: 'Total Insights'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val good', textContent: insights.filter(function(i){return i.confidence==='high'}).length}),
      el('div', {className: 'kpi-lbl', textContent: 'High Confidence'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: Object.keys(grouped).length}),
      el('div', {className: 'kpi-lbl', textContent: 'Categories'})
    ]),
    el('div', {className: 'card kpi'}, [
      el('div', {className: 'kpi-val', textContent: insights.filter(function(i){return i.company_id}).length}),
      el('div', {className: 'kpi-lbl', textContent: 'Company-Specific'})
    ])
  ]));

  // Render by category
  Object.keys(catConfig).forEach(function(cat) {
    var items = grouped[cat] || [];
    if (items.length === 0) return;
    var cfg = catConfig[cat];

    root.appendChild(el('div', {className: 'section-title', textContent: cfg.icon + ' ' + cfg.label + ' (' + items.length + ')'}));
    var card = el('div', {className: 'card', style: 'margin-bottom:20px'});

    items.forEach(function(item) {
      var coName = item.companies ? item.companies.name : '全社';
      card.appendChild(el('div', {style: 'padding:12px 0;border-bottom:1px solid var(--border)'}, [
        el('div', {style: 'display:flex;align-items:center;gap:8px;margin-bottom:6px'}, [
          el('span', {style: 'width:8px;height:8px;border-radius:50%;background:' + (confColors[item.confidence] || 'var(--text3)'), className: 'dot'}),
          el('span', {style: 'font-weight:500;font-size:13px;flex:1', textContent: item.insight}),
          el('span', {className: 'tag tag-co', textContent: coName})
        ]),
        item.evidence ? el('div', {style: 'font-size:11px;color:var(--text3);margin-left:20px;font-style:italic', textContent: '根拠: ' + item.evidence}) : null,
        el('div', {style: 'font-size:10px;color:var(--text3);margin-left:20px;margin-top:4px;font-family:var(--mono)', textContent: item.confidence + ' · ' + new Date(item.created_at).toLocaleDateString('ja-JP')})
      ].filter(Boolean)));
    });

    root.appendChild(card);
  });
}

async function renderFinance(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'Finance'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: '売上・経費・稼働時間・税金の管理'}));

  root.appendChild(skelF);

  // Tabs
  var tabs = ['overview', 'projects', 'invoices', 'expenses', 'time', 'tax'];
  var tabLabels = {overview:'概要',projects:'案件',invoices:'請求書',expenses:'経費',time:'稼働時間',tax:'税金'};
  var tabBar = el('div', {style: 'display:flex;gap:2px;margin:24px 0 20px;border-bottom:1px solid var(--border)'});

  root.appendChild(tabContent);

  function switchTab(tab) {
    tabBar.querySelectorAll('button').forEach(function(b) { b.style.borderBottom = b.dataset.tab === tab ? '2px solid var(--accent)' : '2px solid transparent'; b.style.color = b.dataset.tab === tab ? 'var(--text)' : 'var(--text3)'; });
    while (tabContent.firstChild) tabContent.removeChild(tabContent.firstChild);
    var renderers = {overview: finOverview, projects: finProjects, invoices: finInvoices, expenses: finExpenses, time: finTime, tax: finTax};

      onClick: function() { switchTab(t); }
    }));
  });
  switchTab('overview');
}

// --- Finance: Overview ---
async function finOverview(root) {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth()+1;
  var ym = year + '-' + String(month).padStart(2,'0');
  var startOfMonth = ym + '-01';
  var lastDay = new Date(year, month, 0).getDate();
  var endOfMonth = ym + '-' + String(lastDay).padStart(2,'0');
  var startOfYear = year + '-01-01';
  var endOfYear = year + '-12-31';

  var [invMonthRes, expMonthRes, timeMonthRes, projRes, invYearRes, expYearRes, timeYearRes] = await Promise.all([
    sb.from('invoices').select('*').gte('invoice_date', startOfMonth).lte('invoice_date', endOfMonth),
    sb.from('expenses').select('*').gte('expense_date', startOfMonth).lte('expense_date', endOfMonth),
    sb.from('time_entries').select('*').gte('work_date', startOfMonth).lte('work_date', endOfMonth),
    sb.from('projects').select('*').eq('status', 'active'),
    sb.from('invoices').select('*').gte('invoice_date', startOfYear).lte('invoice_date', endOfYear),
    sb.from('expenses').select('*').gte('expense_date', startOfYear).lte('expense_date', endOfYear),
    sb.from('time_entries').select('*').gte('work_date', startOfYear).lte('work_date', endOfYear)
  ]);

  var skelEl = document.querySelector('.fin-skeleton');
  if (skelEl) skelEl.remove();

  var invoices = invMonthRes.data || [];
  var expenses = expMonthRes.data || [];
  var entries = timeMonthRes.data || [];
  var projects = projRes.data || [];
  var allInv = invYearRes.data || [];
  var allExp = expYearRes.data || [];
  var allTime = timeYearRes.data || [];

  var totalRev = invoices.reduce(function(s,i){return s+i.amount;}, 0);
  var totalExp = expenses.reduce(function(s,e){return s+e.amount;}, 0);
  var totalHrs = entries.reduce(function(s,t){return s+parseFloat(t.hours);}, 0);
  var grossProfit = totalRev - totalExp;
  var hourlyRate = totalHrs > 0 ? Math.round(totalRev / totalHrs) : 0;
  var yearRev = allInv.reduce(function(s,i){return s+i.amount;}, 0);
  var yearExp = allExp.reduce(function(s,e){return s+e.amount;}, 0);
  var yearHrs = allTime.reduce(function(s,t){return s+parseFloat(t.hours);}, 0);

  // Count months with actual invoice data
  var ovMonthSet = {};
  allInv.forEach(function(i) { ovMonthSet[i.invoice_date.substring(0,7)] = true; });
  var dataMonths = Math.max(Object.keys(ovMonthSet).length, 1);

  // ===== Title =====
  root.appendChild(el('h3', {textContent: year+'年'+(now.getMonth()+1)+'月', style: 'margin:0 0 16px;font-size:16px;font-weight:600'}));

  // ===== KPI Cards =====
  var cards = el('div', {style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px'});
  [{l:'売上',v:fmtYen(totalRev),c:'var(--accent)',sub:'年計 '+fmtYen(yearRev)},
   {l:'経費',v:fmtYen(totalExp),c:'var(--text3)',sub:'年計 '+fmtYen(yearExp)},
   {l:'粗利',v:fmtYen(grossProfit),c:grossProfit>=0?'#22c55e':'#ef4444',sub:(totalRev>0?Math.round(grossProfit/totalRev*100):0)+'%'},
   {l:'稼働',v:totalHrs.toFixed(1)+'h',c:'var(--text)',sub:'年計 '+yearHrs.toFixed(1)+'h'},
   {l:'実質時給',v:fmtYen(hourlyRate),c:'var(--accent2)',sub:yearHrs>0?'年平均 '+fmtYen(Math.round(yearRev/yearHrs)):'-'}
  ].forEach(function(d) {
    cards.appendChild(el('div', {style: 'background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px'}, [
      el('div', {textContent: d.l, style: 'font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px'}),
      el('div', {textContent: d.v, style: 'font-size:22px;font-weight:600;color:'+d.c}),
      el('div', {textContent: d.sub, style: 'font-size:10px;color:var(--text3);margin-top:4px'})
    ]));
  });
  root.appendChild(cards);

  // ===== Build project data structures =====
  var projMap = {};
  projects.forEach(function(p) { projMap[p.id] = p; });
  var projColors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#14b8a6'];

  // Gather unique clients from invoices (keyed by client_name to avoid duplicates)
  var clientSet = {};
  allInv.forEach(function(inv) {
    var name = projMap[inv.project_id] ? projMap[inv.project_id].client_name : (inv.client_name || '未割当');
    clientSet[name] = name;
  });
  var clientKeys = Object.keys(clientSet);

  // ===== Monthly Revenue Stacked Bar Chart (by client) =====
  var monthlyByClient = {};
  for (var m = 1; m <= 12; m++) {
    monthlyByClient[m] = {total: 0, exp: 0, hrs: 0, clients: {}};
    clientKeys.forEach(function(ck) { monthlyByClient[m].clients[ck] = 0; });
  }
  allInv.forEach(function(inv) {
    var mon = parseInt(inv.invoice_date.substring(5, 7));
    var name = projMap[inv.project_id] ? projMap[inv.project_id].client_name : (inv.client_name || '未割当');
    if (!monthlyByClient[mon].clients[name]) monthlyByClient[mon].clients[name] = 0;
    monthlyByClient[mon].clients[name] += inv.amount;
    monthlyByClient[mon].total += inv.amount;
  });
  allExp.forEach(function(exp) {
    var mon = parseInt(exp.expense_date.substring(5, 7));
    monthlyByClient[mon].exp += exp.amount;
  });
  allTime.forEach(function(te) {
    var mon = parseInt(te.work_date.substring(5, 7));
    monthlyByClient[mon].hrs += parseFloat(te.hours);
  });

  var maxMonthly = 0;
  for (var mk = 1; mk <= 12; mk++) { maxMonthly = Math.max(maxMonthly, monthlyByClient[mk].total); }
  if (maxMonthly === 0) maxMonthly = 1;
  var curMonth = now.getMonth() + 1;
  var avgRev = yearRev / dataMonths;

  var chartCard = el('div', {style: 'background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px'});
  // Header with legend
  var legendItems = clientKeys.map(function(ck, i) {
    return el('span', {style: 'display:flex;align-items:center;gap:3px'}, [
      el('span', {style: 'display:inline-block;width:8px;height:8px;border-radius:2px;background:'+projColors[i%projColors.length]}),
      document.createTextNode(ck)
    ]);
  });
  chartCard.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px'}, [
    el('div', {textContent: year+'年 月別売上推移（クライアント別）', style: 'font-size:13px;font-weight:600;color:var(--text2)'}),
    el('div', {style: 'display:flex;gap:10px;font-size:10px;color:var(--text3);flex-wrap:wrap'}, legendItems)
  ]));

  // Y-axis + stacked bars
  var fmtAxis = function(v) { return v >= 10000 ? Math.round(v/10000)+'万' : fmtYen(v); };
  var chartBody = el('div', {style: 'display:flex;gap:4px'});

// PDF text extraction using PDF.js
async function extractPdfText(file) {
  if (!window.pdfjsLib) throw new Error('PDF.js not loaded');
  var arrayBuffer = await file.arrayBuffer();
  var pdf = await window.pdfjsLib.getDocument({
    data: arrayBuffer,
    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/cmaps/',
    cMapPacked: true
  }).promise;
  var lines = [];
  for (var i = 1; i <= pdf.numPages; i++) {
    var page = await pdf.getPage(i);
    var content = await page.getTextContent();
    var items = content.items.filter(function(it) { return it.str && it.str.trim(); });
    if (items.length === 0) continue;

    // Group items by Y coordinate (same line detection)
    // transform[5] = Y position; items on same line share similar Y
    var lineMap = {};
    items.forEach(function(item) {
      var y = Math.round(item.transform[5] * 10) / 10; // round to 0.1
      // Find existing line within threshold (±2 units)
      var lineKey = null;
      var keys = Object.keys(lineMap);
      for (var k = 0; k < keys.length; k++) {
        if (Math.abs(parseFloat(keys[k]) - y) < 2) { lineKey = keys[k]; break; }
      }
      if (!lineKey) lineKey = String(y);
      if (!lineMap[lineKey]) lineMap[lineKey] = [];
      lineMap[lineKey].push({str: item.str, x: item.transform[4], w: item.width || 0});
    });

    // Sort lines by Y descending (PDF Y=0 is bottom), then items by X ascending
    var sortedYs = Object.keys(lineMap).sort(function(a, b) { return parseFloat(b) - parseFloat(a); });
    sortedYs.forEach(function(yKey) {
      var lineItems = lineMap[yKey].sort(function(a, b) { return a.x - b.x; });
      // Join items: no space if items are adjacent, space if gap > threshold
      var lineStr = '';
      for (var j = 0; j < lineItems.length; j++) {
        if (j > 0) {
          var gap = lineItems[j].x - (lineItems[j-1].x + lineItems[j-1].w);
          if (gap > 5) lineStr += ' ';
        }
        lineStr += lineItems[j].str;
      }
      lines.push(lineStr.trim());
    });
  }
  var fullText = lines.join('\n');
  console.log('[Invoice Parser] Extracted text:\n' + fullText);
  return fullText;
}

// Parse invoice metadata from PDF text + filename
function parseInvoice(pdfText, filename) {
  var result = {client_name:'', amount:0, tax_amount:0, invoice_date:'', invoice_number:'', company_id:''};

  // --- Filename parsing (date fallback only) ---
  var fnMatch = filename.match(/請求書_(\d{4})-?(\d{1,2})月?分/);
  if (fnMatch) {
    var y = fnMatch[1], m = fnMatch[2].padStart(2,'0');
    var lastDay = new Date(parseInt(y), parseInt(m), 0).getDate();
    result.invoice_date = y + '-' + m + '-' + String(lastDay).padStart(2,'0');
  }

  // Prepare two versions of text for regex matching
  var text = pdfText;
  var norm = pdfText.replace(/[\s\u3000]+/g, '');
  console.log('[Invoice Parser] Normalized text:\n' + norm);

  // --- Client name: extract from PDF (御中/様/宛 patterns, or "請求先") ---
  var clientMatch = text.match(/(.+?)\s*(?:御中|様|殿)\s*$/m) ||
                    norm.match(/(.+?)(?:御中|様|殿)/) ||
                    text.match(/(?:請求先|宛先)\s*[:：]?\s*(.+)/);
  if (clientMatch) {
    // Clean up: remove leading markers like "〒", address fragments, whitespace
    var raw = clientMatch[1].trim();
    // Take last meaningful segment if multiple lines captured
    var segments = raw.split(/[\n\r]+/);
    var candidate = segments[segments.length - 1].trim();
    // Remove common prefixes (〒, 住所っぽいもの)
    candidate = candidate.replace(/^[〒\d\-]+/, '').replace(/^[都道府県].+?[市区町村].*/,'').trim();
    if (candidate.length >= 2 && candidate.length <= 50) {
      result.client_name = candidate;
    }
  }

  // Fallback: filename prefix if PDF extraction failed
  if (!result.client_name) {
    var fnClientMatch = filename.match(/^(.+?)_.*?請求書/);
    if (fnClientMatch) result.client_name = fnClientMatch[1];
  }

  // --- Amount (tax-inclusive total) ---
  var amtMatch = text.match(/(?:合計|請求金額|ご請求額|総額|請求額|御請求額)\s*[¥￥]?\s*([0-9,]+)/) ||
                 norm.match(/(?:合計|請求金額|ご請求額|総額|請求額|御請求額)[¥￥]?([0-9,]+)/) ||
                 norm.match(/[¥￥]([0-9,]{4,})/) ||
                 text.match(/[¥￥]\s*([0-9,]{4,})/);
  if (amtMatch) result.amount = parseInt(amtMatch[1].replace(/,/g, ''), 10);

  // --- Tax amount ---
  var taxMatch = text.match(/(?:消費税|税額|うち税|内消費税)\s*[¥￥]?\s*([0-9,]+)/) ||
                 norm.match(/(?:消費税|税額|うち税|内消費税)[¥￥]?([0-9,]+)/);
  if (taxMatch) result.tax_amount = parseInt(taxMatch[1].replace(/,/g, ''), 10);

  // --- Invoice date ---
  var dateMatch = text.match(/(?:請求日|発行日|日付)\s*[:：]?\s*(\d{4})\s*[年\/\-]\s*(\d{1,2})\s*[月\/\-]\s*(\d{1,2})/) ||
                  norm.match(/(?:請求日|発行日|日付)[:：]?(\d{4})[年\/\-](\d{1,2})[月\/\-](\d{1,2})/) ||
                  norm.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (dateMatch) {
    result.invoice_date = dateMatch[1] + '-' + dateMatch[2].padStart(2,'0') + '-' + dateMatch[3].padStart(2,'0');
  }

  // --- Invoice number ---
  var numMatch = text.match(/(?:請求書番号|請求番号|No\.?|番号)\s*[:：]?\s*([A-Za-z0-9\-_]+)/) ||
                 norm.match(/(?:請求書番号|請求番号|No\.?|番号)[:：]?([A-Za-z0-9\-_]+)/);
  if (numMatch) result.invoice_number = numMatch[1];

  // --- Company ID mapping ---
  var clientLower = (result.client_name || '').toLowerCase();
  if (clientLower.match(/aces/i)) result.company_id = '';
  if (clientLower.match(/polaris/i)) result.company_id = 'polaris';
  if (clientLower.match(/sompo|scotch|foundry/i)) result.company_id = 'foundry';
  if (clientLower.match(/りそな|rikyu|risona/i)) result.company_id = 'rikyu';
  if (clientLower.match(/denso|circuit|回路/i)) result.company_id = 'circuit';

  console.log('[Invoice Parser] Parsed result:', JSON.stringify(result));
  return result;
}

// Upload PDF to Supabase Storage
async function uploadInvoicePdf(file) {
  var timestamp = Date.now();
  var path = timestamp + '.pdf';
  var res = await sb.storage.from('invoices').upload(path, file, {contentType: 'application/pdf'});
  if (res.error) throw new Error(res.error.message);
  return path;
}

// Invoice modal (shared for create + edit)
function openInvoiceModal(existingInv, onSaved) {
  var isEdit = !!existingInv;
  var inv = existingInv || {client_name:'',amount:0,invoice_date:'',company_id:'',file_url:'',notes:''};

  // Overlay
  var overlay = el('div', {style: 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center'});
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });

  var modal = el('div', {style: 'background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)'});

  // Title
  modal.appendChild(el('div', {style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'}, [
    el('div', {textContent: isEdit ? '請求書を編集' : '請求書アップロード', style: 'font-size:16px;font-weight:600'}),
    el('button', {textContent: '×', style: 'background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:0 4px', onClick: function() { overlay.remove(); }})
  ]));

  // PDF upload area (only for new)
  var pdfStatus = el('div', {style: 'font-size:12px;color:var(--text3);margin-top:8px'});
  if (!isEdit) {
    var fileInput = el('input', {type: 'file', accept: '.pdf', style: 'display:none'});
    var uploadArea = el('div', {style: 'border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;margin-bottom:16px;transition:border-color .2s'});
    uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent)'; });
    uploadArea.addEventListener('dragleave', function() { uploadArea.style.borderColor = 'var(--border)'; });
    uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.style.borderColor = 'var(--border)'; if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    uploadArea.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
    uploadArea.appendChild(el('div', {textContent: '📄 PDFファイルをドロップ、またはクリックして選択', style: 'color:var(--text2);font-size:13px'}));
    uploadArea.appendChild(pdfStatus);
    modal.appendChild(uploadArea);
    modal.appendChild(fileInput);
  } else if (inv.file_url) {
    var dlBtn = el('button', {textContent: '📄 PDF を表示', style: 'background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;margin-bottom:16px;color:var(--text2)', onClick: async function() {
      var res = await sb.storage.from('invoices').createSignedUrl(inv.file_url, 300);
      if (res.data) window.open(res.data.signedUrl, '_blank');
    }});
    modal.appendChild(dlBtn);
  }

  // Form fields
  var fields = [
    {key:'client_name', label:'請求先', type:'text', required:true},
    {key:'amount', label:'請求額（税込・円）', type:'number', required:true},
    {key:'invoice_date', label:'請求日', type:'date', required:true},
    {key:'paid_date', label:'入金日', type:'date'},
    {key:'company_id', label:'PJ会社', type:'select', options:['','foundry','rikyu','circuit','polaris'], optionLabels:{'':'(なし)',foundry:'Foundry',rikyu:'りきゅう',circuit:'回路設計',polaris:'Polaris'}},
    {key:'notes', label:'メモ', type:'textarea'}
  ];
  var inputs = {};
  var form = el('div', {style: 'display:flex;flex-direction:column;gap:12px'});
  fields.forEach(function(f) {
    var label = el('label', {textContent: f.label, style: 'font-size:11px;color:var(--text3);margin-bottom:2px;display:block'});
    var inputStyle = 'width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);box-sizing:border-box';
    var input;
    if (f.type === 'select') {
      input = el('select', {style: inputStyle});
      f.options.forEach(function(o) {
        var opt = el('option', {value: o, textContent: f.optionLabels[o] || o});
        if (String(inv[f.key] || '') === o) opt.selected = true;
        input.appendChild(opt);
      });
    } else if (f.type === 'textarea') {
      input = el('textarea', {style: inputStyle + ';min-height:48px;resize:vertical', value: inv[f.key] || ''});
    } else {
      input = el('input', {type: f.type, style: inputStyle, value: inv[f.key] || ''});
    }
    inputs[f.key] = input;
    var wrapper = el('div', {}, [label, input]);
    form.appendChild(wrapper);
  });
  modal.appendChild(form);

  // Saving indicator
  var saveStatus = el('div', {style: 'font-size:12px;color:var(--text3);margin-top:8px;min-height:18px'});

  // Buttons
  var btnRow = el('div', {style: 'display:flex;justify-content:' + (isEdit ? 'space-between' : 'flex-end') + ';gap:8px;margin-top:20px'});

  if (isEdit) {
    var delBtn = el('button', {textContent: '削除', style: 'background:none;border:1px solid #ef4444;color:#ef4444;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--font)', onClick: function() {
      showConfirm('請求書を削除', 'この請求書を削除しますか？', async function() {
        delBtn.disabled = true;
        saveStatus.textContent = '削除中...';
        if (inv.file_url) await sb.storage.from('invoices').remove([inv.file_url]);
        await sb.from('invoices').delete().eq('id', inv.id);
        overlay.remove();
        if (onSaved) onSaved();
      });
    }});
    btnRow.appendChild(delBtn);
  }

  var rightBtns = el('div', {style: 'display:flex;gap:8px'});
  rightBtns.appendChild(el('button', {textContent: 'キャンセル', style: 'background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--font)', onClick: function() { overlay.remove(); }}));

  var selectedFile = null;
  var uploadedPath = null;

  var saveBtn = el('button', {textContent: '保存', style: 'background:var(--accent);border:none;color:#fff;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:500;font-family:var(--font)', onClick: async function() {
    var clientName = inputs.client_name.value.trim();
    var amount = parseInt(inputs.amount.value, 10);
    var invoiceDate = inputs.invoice_date.value;
    if (!clientName || !amount || !invoiceDate) { saveStatus.textContent = '請求先・金額・請求日は必須です'; saveStatus.style.color = '#ef4444'; return; }

    saveBtn.disabled = true;
    saveStatus.textContent = '保存中...';
    saveStatus.style.color = 'var(--text3)';

    // Upload PDF if new file selected
    if (selectedFile && !uploadedPath) {
      try {
        saveStatus.textContent = 'PDF アップロード中...';
        uploadedPath = await uploadInvoicePdf(selectedFile);
      } catch (e) {
        saveStatus.textContent = 'アップロード失敗: ' + e.message;
        saveStatus.style.color = '#ef4444';
        saveBtn.disabled = false;
        return;
      }
    }

    // Auto-calculate paid_date if not manually set
    var paidDate = inputs.paid_date.value || null;
    if (!paidDate && invoiceDate) {
      var cl = clientName.toLowerCase();
      if (cl.match(/polaris/i)) {
        // Polaris: 25th of invoice month
        paidDate = invoiceDate.substring(0, 8) + '25';
      } else if (cl.match(/aces/i)) {
        // ACES: last day of invoice month
        var parts = invoiceDate.split('-');
        var ld = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
        paidDate = parts[0] + '-' + parts[1] + '-' + String(ld).padStart(2,'0');
      }
    }

    var row = {
      client_name: clientName,
      amount: amount,
      invoice_date: invoiceDate,
      status: 'sent',
      paid_date: paidDate,
      company_id: inputs.company_id.value || null,
      notes: inputs.notes.value.trim() || null
    };
    if (uploadedPath) row.file_url = uploadedPath;

    var res;
    if (isEdit) {
      res = await sb.from('invoices').update(row).eq('id', inv.id);
    } else {
      res = await sb.from('invoices').insert(row);
    }
    if (res.error) {
      saveStatus.textContent = 'エラー: ' + res.error.message;
      saveStatus.style.color = '#ef4444';
      saveBtn.disabled = false;
      return;
    }
    overlay.remove();
    if (onSaved) onSaved();
  }});
  rightBtns.appendChild(saveBtn);
  btnRow.appendChild(rightBtns);
  modal.appendChild(saveStatus);
  modal.appendChild(btnRow);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Handle file selection (PDF parse)
  async function handleFile(file) {
    if (file.type !== 'application/pdf') { pdfStatus.textContent = 'PDFファイルのみ対応しています'; pdfStatus.style.color = '#ef4444'; return; }
    selectedFile = file;
    pdfStatus.textContent = '📄 ' + file.name + ' — 解析中...';
    pdfStatus.style.color = 'var(--accent)';
    try {
      var text = await extractPdfText(file);
      var parsed = parseInvoice(text, file.name);
      // Fill form with parsed values (only if field is empty or zero)
      if (parsed.client_name && !inputs.client_name.value) inputs.client_name.value = parsed.client_name;
      if (parsed.amount && !parseInt(inputs.amount.value)) inputs.amount.value = parsed.amount;
      if (parsed.invoice_date && !inputs.invoice_date.value) inputs.invoice_date.value = parsed.invoice_date;
      if (parsed.company_id) inputs.company_id.value = parsed.company_id;
      // Auto-calculate paid_date from client + invoice_date
      if (parsed.invoice_date && !inputs.paid_date.value) {
        var cl = (parsed.client_name || '').toLowerCase();
        if (cl.match(/polaris/i)) {
          inputs.paid_date.value = parsed.invoice_date.substring(0, 8) + '25';
        } else if (cl.match(/aces/i)) {
          var dp = parsed.invoice_date.split('-');
          var ld = new Date(parseInt(dp[0]), parseInt(dp[1]), 0).getDate();
          inputs.paid_date.value = dp[0] + '-' + dp[1] + '-' + String(ld).padStart(2,'0');
        }
      }
      pdfStatus.textContent = '📄 ' + file.name + ' — 解析完了 ✓';
      pdfStatus.style.color = '#22c55e';
    } catch (e) {
      pdfStatus.textContent = '📄 ' + file.name + ' — 解析失敗（手動入力してください）';
      pdfStatus.style.color = '#f59e0b';
    }
  }
}

// --- Finance: Tax ---
function calcTax(revenue, expense) {
  var income = revenue - expense;
  var blueDeduction = 650000;
  var basicDeduction = 480000;
  var taxableBase = Math.max(0, income - blueDeduction);
  var taxableIncome = Math.max(0, taxableBase - basicDeduction);

  // Income tax (progressive)
  var brackets = [
    [1950000, 0.05, 0],
    [3300000, 0.10, 97500],
    [6950000, 0.20, 427500],
    [9000000, 0.23, 636000],
    [18000000, 0.33, 1536000],
    [40000000, 0.40, 2796000],
    [Infinity, 0.45, 4796000]
  ];
  var incomeTax = 0;
  for (var i = 0; i < brackets.length; i++) {
    if (taxableIncome <= brackets[i][0]) {
      incomeTax = Math.floor(taxableIncome * brackets[i][1] - brackets[i][2]);
      break;
    }
  }
  var reconstructionTax = Math.floor(incomeTax * 0.021);
  var residentTax = Math.floor(taxableIncome * 0.10) + 5000;
  var businessTax = income > 2900000 ? Math.floor((income - 2900000) * 0.05) : 0;
  var totalTax = incomeTax + reconstructionTax + residentTax + businessTax;
  var takeHome = revenue - expense - totalTax;

  return {
    revenue: revenue, expense: expense, income: income,
    taxableBase: taxableBase, taxableIncome: taxableIncome,
    incomeTax: incomeTax, reconstructionTax: reconstructionTax,
    residentTax: residentTax, businessTax: businessTax,
    totalTax: totalTax, takeHome: takeHome
  };
}

    var size = canvas.width / (window.devicePixelRatio || 1);
    var dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    var cx = size / 2, cy = size / 2, r = size / 2 - 8, lineW = size * 0.18;
    var total = segments.reduce(function(s, seg) { return s + seg.value; }, 0);
    if (total === 0) return;
    var startAngle = -Math.PI / 2;
    segments.forEach(function(seg) {
      var sliceAngle = (seg.value / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
      ctx.arc(cx, cy, r - lineW, startAngle + sliceAngle, startAngle, true);
