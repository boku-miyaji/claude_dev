/** Render markdown string to a safe DOM fragment (strips scripts, event handlers, dangerous protocols) */
function renderMarkdownSafe(md) {
  var wrapper = document.createElement('div');
  if (typeof marked !== 'undefined' && marked.parse) {
    var parsed = marked.parse(md);
    var tpl = document.createElement('template');
    tpl.innerHTML = parsed; // eslint-disable-line -- owner-only data, sanitized below
    var frag = tpl.content;
    frag.querySelectorAll('script,iframe,object,embed,math,svg[onload],form').forEach(function(s) { s.remove(); });
    // Strip all on* event handler attributes
    frag.querySelectorAll('*').forEach(function(node) {
      Array.from(node.attributes).forEach(function(attr) {
        if (attr.name.startsWith('on')) node.removeAttribute(attr.name);
      });
    });
    frag.querySelectorAll('a').forEach(function(a) {
      var href = (a.getAttribute('href') || '').trim().toLowerCase();
      if (href.startsWith('javascript:') || href.startsWith('data:') || href.startsWith('vbscript:')) { a.removeAttribute('href'); a.textContent = '[link removed]'; }
      a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener noreferrer');
    });
    wrapper.appendChild(frag);
  } else {
    wrapper.textContent = md;
  }
  return wrapper;
}

/** Track intelligence interaction (link click or like) via activity_log */
function trackIntelligence(action, itemId, url, category) {
  sb.from('activity_log').insert({
    action: action,
    description: action === 'intelligence_like' ? 'Liked: ' + itemId : 'Clicked: ' + (url || '').substring(0, 120),
    metadata: {item_id: itemId || null, url: url || null, category: category || null}
  }).then(function() {});
}

/** Extract item ID from a text node, e.g. "[kw-Claude-1]" -> "kw-Claude-1" */
function extractItemId(text) {
  var m = text.match(/\[([a-zA-Z]+-[a-zA-Z]+-?\d+)\]/);
  return m ? m[1] : null;
}

/** Guess category from item ID prefix */
function guessCategory(itemId) {
  if (!itemId) return null;
  if (itemId.startsWith('kw-')) return 'keyword';
  if (itemId.startsWith('x-')) return 'x_account';
  if (itemId.startsWith('cc-')) return 'claude_code';
  if (itemId.startsWith('cursor-')) return 'cursor';
  if (itemId.startsWith('mcp-')) return 'mcp';
  if (itemId.startsWith('art-')) return 'article';
  if (itemId.startsWith('hn-')) return 'hacker_news';
  if (itemId.startsWith('agent-')) return 'ai_agent';
  if (itemId.startsWith('ALERT-')) return 'alert';
  return null;
}

/** Create a like button for a report item */
function createLikeBtn(itemId, category) {
  var liked = false;
  var btn = el('button', {
    textContent: '\u2661',
    title: 'いいね',
    style: 'background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;padding:1px 5px;margin-left:6px;color:var(--text3);vertical-align:middle;line-height:1;transition:all .15s'
  });
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (liked) return;
    liked = true;
    btn.textContent = '\u2665';
    btn.style.color = 'var(--red, #e53e3e)';
    btn.style.borderColor = 'var(--red, #e53e3e)';
    trackIntelligence('intelligence_like', itemId, null, category);
    toast('\u2665 ' + (itemId || 'item'));
  });
  return btn;
}

/** Enhance rendered markdown: add like buttons to items, track link clicks */
function enhanceReportItems(container) {
  container.querySelectorAll('li').forEach(function(li) {
    var text = li.textContent || '';
    var itemId = extractItemId(text);
    if (!itemId) return;
    var category = guessCategory(itemId);
    li.style.position = 'relative';
    li.appendChild(createLikeBtn(itemId, category));
    li.querySelectorAll('a[href]').forEach(function(a) {
      a.addEventListener('click', function() {
        trackIntelligence('intelligence_click', itemId, a.href, category);
      });
    });
  });
  container.querySelectorAll('a[href]').forEach(function(a) {
    if (a._tracked) return;
    a._tracked = true;
    a.addEventListener('click', function() {
      var li = a.closest('li');
      if (li && extractItemId(li.textContent || '')) return;
      trackIntelligence('intelligence_click', null, a.href, null);
    });
  });
}

function toggleReportDetail(card, data) {
  var existing = card.querySelector('.report-detail');
  if (existing) { existing.remove(); return; }
  if (!data) return;

  // Markdown string (manual collection via /company)
  if (typeof data === 'string') {
    var detail = el('div', {className: 'report-detail md-body', style: 'margin-top:16px;border-top:1px solid var(--border);padding-top:16px;max-height:600px;overflow-y:auto'});
    // Render markdown — data is from owner-only Supabase table (authenticated writes only)
    detail.appendChild(renderMarkdownSafe(data));
    enhanceReportItems(detail);
    card.appendChild(detail);
    return;
  }

  // JSON data (auto collection via GitHub Actions)
  if (!data.collections) return;

  var detail = el('div', {className: 'report-detail', style: 'margin-top:16px;border-top:1px solid var(--border);padding-top:16px'});

  data.collections.forEach(function(coll) {
    var label = coll.type === 'keyword' ? '"' + coll.term + '"' : coll.handle;
    var tag = coll.is_exploration ? ' [探索]' : '';
    detail.appendChild(el('div', {style: 'font-size:13px;font-weight:600;margin-bottom:6px;margin-top:12px', textContent: label + tag}));

    if (coll.error) {
      detail.appendChild(el('div', {style: 'font-size:12px;color:var(--red)', textContent: 'Error: ' + coll.error}));
      return;
    }

    (coll.results || []).forEach(function(r, idx) {
      var itemId = (coll.type === 'keyword' ? 'kw' : 'x') + '-' + (coll.term || coll.handle || '').replace(/[^a-zA-Z]/g, '').substring(0, 5) + '-' + (idx + 1);
      var category = coll.type === 'keyword' ? 'keyword' : 'x_account';
      var link = el('a', {href: r.url, target: '_blank', style: 'font-size:12px;font-weight:500;display:inline', textContent: r.title || 'No title'});
      link.addEventListener('click', function() { trackIntelligence('intelligence_click', itemId, r.url, category); });
      var item = el('div', {style: 'margin-bottom:8px;padding-left:12px;border-left:2px solid var(--border)'}, [
        el('div', {}, [link, createLikeBtn(itemId, category)]),
        el('div', {style: 'font-size:11px;color:var(--text3);margin-top:2px', textContent: (r.snippet || '').substring(0, 150)})
      ]);
      detail.appendChild(item);
    });
  });

  card.appendChild(detail);
}

// ============================================================
// API Costs Page
// ============================================================

async function renderApiCosts(root) {
  root.appendChild(el('div', {className: 'page-title', textContent: 'API Costs'}));
  root.appendChild(el('div', {className: 'page-desc', textContent: 'AI Chat のAPI利用コストをモデル別・日別に集計'}));

  // Period selector
  var periodDays = 30;
  var periodSelect = el('select', {className: 'input', style: 'font-size:12px;width:auto;margin-bottom:16px'}, [
    el('option', {value: '7', textContent: '過去7日'}),
    el('option', {value: '30', textContent: '過去30日', selected: true}),
    el('option', {value: '90', textContent: '過去90日'}),
    el('option', {value: '365', textContent: '過去1年'})
  ]);
  root.appendChild(periodSelect);

  var contentArea = el('div');
  root.appendChild(contentArea);

  async function loadCosts(days) {
    while (contentArea.firstChild) contentArea.removeChild(contentArea.firstChild);
    contentArea.appendChild(skeletonGrid(3, 3, 'skeleton-kpi'));
    contentArea.appendChild(el('div', {style:'height:14px'}));
    contentArea.appendChild(skeletonRows(4));
    var since = new Date(Date.now() - days * 86400000).toISOString();

    // Fetch all messages with cost data
    var res = await sb.from('messages')
      .select('role,model,tokens_input,tokens_output,cost_usd,created_at')
      .eq('role', 'assistant')
      .gte('created_at', since)
      .not('cost_usd', 'is', null)
      .order('created_at', {ascending: false});

    while (contentArea.firstChild) contentArea.removeChild(contentArea.firstChild);

    if (res.error) { contentArea.appendChild(inlineError('APIコストの取得に失敗しました: ' + res.error.message, function() { loadCosts(days); })); return; }
    var msgs = res.data || [];

    if (msgs.length === 0) {
      contentArea.appendChild(emptyState('$', 'この期間のAPI利用データはありません'));
      return;
    }

    // === Summary cards ===
    var totalCost = 0, totalIn = 0, totalOut = 0, totalRequests = 0;
    var byModel = {};
    var byDay = {};

    msgs.forEach(function(m) {
      var cost = parseFloat(m.cost_usd) || 0;
      var tokIn = m.tokens_input || 0;
      var tokOut = m.tokens_output || 0;
      var model = m.model || 'unknown';
      var day = m.created_at.substring(0, 10);

      totalCost += cost;
      totalIn += tokIn;
      totalOut += tokOut;
      totalRequests++;

      if (!byModel[model]) byModel[model] = {cost: 0, tokIn: 0, tokOut: 0, count: 0};
      byModel[model].cost += cost;
      byModel[model].tokIn += tokIn;
      byModel[model].tokOut += tokOut;
      byModel[model].count++;

      if (!byDay[day]) byDay[day] = {cost: 0, tokIn: 0, tokOut: 0, count: 0};
      byDay[day].cost += cost;
      byDay[day].tokIn += tokIn;
      byDay[day].tokOut += tokOut;
      byDay[day].count++;
    });

    var avgPerDay = totalCost / Math.max(1, Object.keys(byDay).length);
    var projectedMonthly = avgPerDay * 30;

    // KPI cards
    var kpiGrid = el('div', {className: 'g4', style: 'margin-bottom:24px'});
    function kpiCard(label, value, sub) {
      return el('div', {className: 'card', style: 'padding:16px'}, [
        el('div', {style: 'font-size:11px;color:var(--text3);margin-bottom:4px', textContent: label}),
        el('div', {style: 'font-size:22px;font-weight:700;letter-spacing:-0.5px', textContent: value}),
        sub ? el('div', {style: 'font-size:11px;color:var(--text3);margin-top:4px', textContent: sub}) : null
      ].filter(Boolean));
    }
    kpiGrid.appendChild(kpiCard('Total Cost', '$' + totalCost.toFixed(4), days + ' days'));
    kpiGrid.appendChild(kpiCard('Projected Monthly', '$' + projectedMonthly.toFixed(2), '$' + avgPerDay.toFixed(4) + '/day avg'));
    kpiGrid.appendChild(kpiCard('Requests', totalRequests.toLocaleString(), (totalRequests / Math.max(1, Object.keys(byDay).length)).toFixed(1) + '/day avg'));
    kpiGrid.appendChild(kpiCard('Total Tokens', ((totalIn + totalOut) / 1000).toFixed(1) + 'K', 'In:' + (totalIn/1000).toFixed(1) + 'K Out:' + (totalOut/1000).toFixed(1) + 'K'));
    contentArea.appendChild(kpiGrid);

    // === Model breakdown ===
    contentArea.appendChild(el('div', {className: 'section-title', textContent: 'Model Breakdown'}));
    var modelCard = el('div', {className: 'card', style: 'margin-bottom:24px;overflow-x:auto'});
    var modelTable = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});

    var thead = el('tr', {style: 'border-bottom:2px solid var(--border)'});
    ['Model', 'Requests', 'Input Tokens', 'Output Tokens', 'Cost', 'Avg/Req', 'Share'].forEach(function(h) {
      thead.appendChild(el('th', {style: 'text-align:left;padding:8px 12px;font-weight:600;white-space:nowrap', textContent: h}));
    });
    modelTable.appendChild(thead);

    // Sort by cost descending
    var modelKeys = Object.keys(byModel).sort(function(a, b) { return byModel[b].cost - byModel[a].cost; });
    modelKeys.forEach(function(model) {
      var d = byModel[model];
      var share = totalCost > 0 ? (d.cost / totalCost * 100) : 0;
      var tr = el('tr', {style: 'border-bottom:1px solid var(--border)'});
      var cells = [
        model,
        d.count.toLocaleString(),
        d.tokIn.toLocaleString(),
        d.tokOut.toLocaleString(),
        '$' + d.cost.toFixed(4),
        '$' + (d.cost / Math.max(1, d.count)).toFixed(6),
        share.toFixed(1) + '%'
      ];
      cells.forEach(function(val, i) {
        tr.appendChild(el('td', {style: 'padding:8px 12px;white-space:nowrap' + (i >= 4 ? ';font-family:var(--mono)' : ''), textContent: val}));
      });
      modelTable.appendChild(tr);
    });

    modelCard.appendChild(modelTable);
    contentArea.appendChild(modelCard);

    // === Cost bar chart (daily) ===
    contentArea.appendChild(el('div', {className: 'section-title', textContent: 'Daily Cost'}));
    var chartCard = el('div', {className: 'card', style: 'margin-bottom:24px;padding:16px'});

    // Get sorted days
    var dayKeys = Object.keys(byDay).sort();
    var maxDayCost = Math.max.apply(null, dayKeys.map(function(k) { return byDay[k].cost; }));
    if (maxDayCost === 0) maxDayCost = 1;

    var chartContainer = el('div', {style: 'display:flex;align-items:flex-end;gap:2px;height:120px;overflow-x:auto'});
    dayKeys.forEach(function(day) {
      var d = byDay[day];
      var pct = (d.cost / maxDayCost) * 100;
      var barWrap = el('div', {style: 'flex:1;min-width:' + Math.max(8, Math.floor(600 / dayKeys.length)) + 'px;display:flex;flex-direction:column;align-items:center;gap:2px'});
      var bar = el('div', {
        style: 'width:100%;background:var(--accent2);border-radius:3px 3px 0 0;min-height:2px;height:' + Math.max(2, pct) + '%;transition:height .3s',
        title: day + ': $' + d.cost.toFixed(4) + ' (' + d.count + ' req)'
      });
      barWrap.appendChild(bar);
      // Show label for every Nth day
      if (dayKeys.length <= 14 || dayKeys.indexOf(day) % Math.ceil(dayKeys.length / 10) === 0) {
        barWrap.appendChild(el('div', {style: 'font-size:9px;color:var(--text3);white-space:nowrap;transform:rotate(-45deg);transform-origin:top left;margin-top:2px', textContent: day.substring(5)}));
      }
      chartContainer.appendChild(barWrap);
    });

    chartCard.appendChild(chartContainer);

    // Y-axis labels
    var yLabel = el('div', {style: 'display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:24px'}, [
      el('span', {textContent: '$0'}),
      el('span', {textContent: '$' + maxDayCost.toFixed(4)})
    ]);
    chartCard.appendChild(yLabel);
    contentArea.appendChild(chartCard);

    // === Recent requests ===
    contentArea.appendChild(el('div', {className: 'section-title', textContent: 'Recent Requests (last 20)'}));
    var recentCard = el('div', {className: 'card', style: 'overflow-x:auto'});
    var recentTable = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});

    var rHead = el('tr', {style: 'border-bottom:2px solid var(--border)'});
    ['Time', 'Model', 'In', 'Out', 'Cost'].forEach(function(h) {
      rHead.appendChild(el('th', {style: 'text-align:left;padding:8px 12px;font-weight:600', textContent: h}));
    });
    recentTable.appendChild(rHead);

    msgs.slice(0, 20).forEach(function(m) {
      var tr = el('tr', {style: 'border-bottom:1px solid var(--border)'});
      var t = new Date(m.created_at);
      var timeStr = (t.getMonth()+1) + '/' + t.getDate() + ' ' + t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
      [
        timeStr,
        m.model || '-',
        (m.tokens_input || 0).toLocaleString(),
        (m.tokens_output || 0).toLocaleString(),
        '$' + (parseFloat(m.cost_usd) || 0).toFixed(6)
      ].forEach(function(val, i) {
        tr.appendChild(el('td', {style: 'padding:8px 12px;white-space:nowrap' + (i >= 2 ? ';font-family:var(--mono)' : ''), textContent: val}));
      });
      recentTable.appendChild(tr);
    });

    recentCard.appendChild(recentTable);
    contentArea.appendChild(recentCard);

    // === Execution Metrics Analysis ===
    var metricsRes = await sb.from('execution_metrics')
      .select('*').gte('created_at', since).order('created_at', {ascending: false}).limit(500);
    var metrics = metricsRes.data || [];

    if (metrics.length > 0) {
      // --- TTFT Analysis ---
      var chatMetrics = metrics.filter(function(m) { return m.source === 'ai_chat' && m.time_to_first_token_ms; });
      if (chatMetrics.length > 0) {
        contentArea.appendChild(el('div', {className: 'section-title', textContent: 'TTFT Analysis (Time to First Token)'}));
        var ttftCard = el('div', {className: 'card', style: 'margin-bottom:24px'});

        // Group by model
        var ttftByModel = {};
        chatMetrics.forEach(function(m) {
          var mod = m.model || 'unknown';
          if (!ttftByModel[mod]) ttftByModel[mod] = [];
          ttftByModel[mod].push(m.time_to_first_token_ms);
        });

        var ttftTable = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});
        var ttftHead = el('tr', {style: 'border-bottom:2px solid var(--border)'});
        ['Model', 'Avg TTFT', 'Min', 'Max', 'P50', 'Samples'].forEach(function(h) {
          ttftHead.appendChild(el('th', {style: 'text-align:left;padding:8px 12px;font-weight:600', textContent: h}));
        });
        ttftTable.appendChild(ttftHead);

        Object.keys(ttftByModel).sort().forEach(function(mod) {
          var vals = ttftByModel[mod].sort(function(a,b){return a-b;});
          var avg = Math.round(vals.reduce(function(s,v){return s+v;},0) / vals.length);
          var p50 = vals[Math.floor(vals.length/2)];
          var tr = el('tr', {style: 'border-bottom:1px solid var(--border)'});
          [mod, avg+'ms', vals[0]+'ms', vals[vals.length-1]+'ms', p50+'ms', vals.length].forEach(function(v,i) {
            tr.appendChild(el('td', {style: 'padding:8px 12px;font-family:var(--mono);font-size:11px', textContent: v}));
          });
          ttftTable.appendChild(tr);
        });
        ttftCard.appendChild(ttftTable);
        contentArea.appendChild(ttftCard);
      }

      // --- Tool Usage Analysis (AI Chat) ---
      var toolMetrics = metrics.filter(function(m) { return m.tools_used && m.tools_used.length; });
      if (toolMetrics.length > 0) {
        contentArea.appendChild(el('div', {className: 'section-title', textContent: 'AI Chat Tool Usage'}));
        var toolCard = el('div', {className: 'card', style: 'margin-bottom:24px'});

        var toolStats = {};
        toolMetrics.forEach(function(m) {
          (m.tools_used || []).forEach(function(t) {
            if (!toolStats[t.name]) toolStats[t.name] = {count: 0, totalMs: 0, durations: []};
            toolStats[t.name].count++;
            if (t.duration_ms) { toolStats[t.name].totalMs += t.duration_ms; toolStats[t.name].durations.push(t.duration_ms); }
          });
        });

        var toolTable = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});
        var tHead = el('tr', {style: 'border-bottom:2px solid var(--border)'});
        ['Tool', 'Calls', 'Avg Duration', 'Total Time', 'Share'].forEach(function(h) {
          tHead.appendChild(el('th', {style: 'text-align:left;padding:8px 12px;font-weight:600', textContent: h}));
        });
        toolTable.appendChild(tHead);

        var totalCalls = Object.keys(toolStats).reduce(function(s,k){return s+toolStats[k].count;},0);
        Object.keys(toolStats).sort(function(a,b){return toolStats[b].count-toolStats[a].count;}).forEach(function(name) {
          var s = toolStats[name];
          var avgMs = s.durations.length ? Math.round(s.totalMs / s.durations.length) : '-';
          var tr = el('tr', {style: 'border-bottom:1px solid var(--border)'});
          [name, s.count, avgMs === '-' ? '-' : avgMs+'ms', s.totalMs ? (s.totalMs/1000).toFixed(1)+'s' : '-', (s.count/totalCalls*100).toFixed(1)+'%'].forEach(function(v) {
            tr.appendChild(el('td', {style: 'padding:8px 12px;font-family:var(--mono);font-size:11px', textContent: v}));
          });
          toolTable.appendChild(tr);
        });
        toolCard.appendChild(toolTable);
        contentArea.appendChild(toolCard);
      }

      // --- Response Time Distribution ---
      var withTime = chatMetrics.filter(function(m) { return m.total_time_ms; });
      if (withTime.length > 0) {
        contentArea.appendChild(el('div', {className: 'section-title', textContent: 'Response Time Distribution'}));
        var rtCard = el('div', {className: 'card', style: 'margin-bottom:24px;padding:16px'});
        // Buckets: <1s, 1-3s, 3-5s, 5-10s, 10s+
        var buckets = {'<1s':0, '1-3s':0, '3-5s':0, '5-10s':0, '10s+':0};
        withTime.forEach(function(m) {
          var s = m.total_time_ms / 1000;
          if (s < 1) buckets['<1s']++;
          else if (s < 3) buckets['1-3s']++;
          else if (s < 5) buckets['3-5s']++;
          else if (s < 10) buckets['5-10s']++;
          else buckets['10s+']++;
        });
        var maxBucket = Math.max.apply(null, Object.values(buckets)) || 1;
        var barContainer = el('div', {style: 'display:flex;align-items:flex-end;gap:12px;height:80px'});
        Object.keys(buckets).forEach(function(label) {
          var pct = (buckets[label] / maxBucket) * 100;
          var col = el('div', {style: 'flex:1;display:flex;flex-direction:column;align-items:center;gap:4px'});
          col.appendChild(el('div', {style: 'font-size:10px;font-family:var(--mono);color:var(--text2)', textContent: buckets[label]}));
          col.appendChild(el('div', {style: 'width:100%;background:var(--accent2);border-radius:4px 4px 0 0;height:'+Math.max(2,pct)+'%'}));
          col.appendChild(el('div', {style: 'font-size:10px;color:var(--text3)', textContent: label}));
          barContainer.appendChild(col);
        });
        rtCard.appendChild(barContainer);
        contentArea.appendChild(rtCard);
      }
    }

    // === Claude Code Tool Usage (from prompt_log) ===
    var plRes = await sb.from('prompt_log').select('tools_used,tool_count,created_at')
      .gte('created_at', since).not('tools_used', 'is', null).order('created_at', {ascending: false}).limit(200);
    var promptLogs = plRes.data || [];

    if (promptLogs.length > 0) {
      contentArea.appendChild(el('div', {className: 'section-title', textContent: 'Claude Code Tool Usage'}));
      var ccCard = el('div', {className: 'card', style: 'margin-bottom:24px'});

      // Aggregate tool counts
      var ccToolStats = {};
      var totalPrompts = promptLogs.length;
      var totalTools = 0;
      promptLogs.forEach(function(p) {
        var tu = p.tools_used || {};
        Object.keys(tu).forEach(function(name) {
          if (!ccToolStats[name]) ccToolStats[name] = 0;
          ccToolStats[name] += tu[name];
          totalTools += tu[name];
        });
      });

      // KPI row
      ccCard.appendChild(el('div', {className: 'g3', style: 'margin-bottom:16px'}, [
        el('div', {style: 'text-align:center'}, [
          el('div', {style: 'font-size:20px;font-weight:700', textContent: totalPrompts}),
          el('div', {style: 'font-size:11px;color:var(--text3)', textContent: 'Prompts w/ Tools'})
        ]),
        el('div', {style: 'text-align:center'}, [
          el('div', {style: 'font-size:20px;font-weight:700', textContent: totalTools}),
          el('div', {style: 'font-size:11px;color:var(--text3)', textContent: 'Total Tool Calls'})
        ]),
        el('div', {style: 'text-align:center'}, [
          el('div', {style: 'font-size:20px;font-weight:700', textContent: totalPrompts > 0 ? (totalTools / totalPrompts).toFixed(1) : '0'}),
          el('div', {style: 'font-size:11px;color:var(--text3)', textContent: 'Avg Tools/Prompt'})
        ])
      ]));

      // Tool frequency table
      var ccTable = el('table', {style: 'width:100%;border-collapse:collapse;font-size:12px'});
      var ccHead = el('tr', {style: 'border-bottom:2px solid var(--border)'});
      ['Tool', 'Total Calls', 'Share', 'Bar'].forEach(function(h) {
        ccHead.appendChild(el('th', {style: 'text-align:left;padding:8px 12px;font-weight:600', textContent: h}));
      });
      ccTable.appendChild(ccHead);

      var maxToolCount = Math.max.apply(null, Object.values(ccToolStats)) || 1;
      Object.keys(ccToolStats).sort(function(a,b){return ccToolStats[b]-ccToolStats[a];}).forEach(function(name) {
        var cnt = ccToolStats[name];
        var tr = el('tr', {style: 'border-bottom:1px solid var(--border)'});
        tr.appendChild(el('td', {style: 'padding:8px 12px;font-weight:500', textContent: name}));
        tr.appendChild(el('td', {style: 'padding:8px 12px;font-family:var(--mono);font-size:11px', textContent: cnt}));
        tr.appendChild(el('td', {style: 'padding:8px 12px;font-family:var(--mono);font-size:11px', textContent: (cnt/totalTools*100).toFixed(1)+'%'}));
        var barTd = el('td', {style: 'padding:8px 12px'});
        barTd.appendChild(el('div', {style: 'height:8px;border-radius:4px;background:var(--accent2);width:'+Math.round(cnt/maxToolCount*100)+'%'}));
        tr.appendChild(barTd);
        ccTable.appendChild(tr);
      });
      ccCard.appendChild(ccTable);
      contentArea.appendChild(ccCard);
    }
  }

  periodSelect.onchange = function() { loadCosts(parseInt(periodSelect.value)); };
  loadCosts(periodDays);
}

// ============================================================
// AI Chat Page (Agent-loop, OpenCode-inspired)
// ============================================================

var chatState = { conversationId: null, conversations: [], model: 'auto', contextMode: 'full', companyId: null, streaming: false, directMode: false, reasoningEffort: 'auto', precisionMode: false };

/** Get stored OpenAI API key for direct mode */
function getChatApiKey() { return localStorage.getItem('hd-chat-api-key') || ''; }
function setChatApiKey(key) { localStorage.setItem('hd-chat-api-key', key); }

async function renderChat(root) {
  root.style.padding = '0';
  root.style.maxWidth = 'none';

  var edgeFnUrl = SUPABASE_URL + '/functions/v1/ai-agent';

  // Auto-detect Edge Function
  if (!chatState.directMode && !getChatApiKey()) {
    try {
      await sb.auth.refreshSession();
      var session = (await sb.auth.getSession()).data.session;
      var testRes = await fetch(edgeFnUrl, {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?session.access_token:''),'apikey':SUPABASE_ANON_KEY},body:JSON.stringify({message:'ping',model:'gpt-5-nano',context_mode:'none'})});
      if (!testRes.ok) chatState.directMode = true;
    } catch(e) { chatState.directMode = true; }
  }
  if (getChatApiKey()) chatState.directMode = true;

  // === ChatGPT-style layout ===
  var layout = el('div', {className: 'chat-layout'});

  // --- Sidebar ---
  var chatSidebar = el('div', {className: 'chat-sidebar'});
  var sidebarHeader = el('div', {className: 'chat-sidebar-header'});
  var newChatBtn = el('button', {className: 'btn btn-primary', style: 'width:100%;font-size:13px;border-radius:var(--r2)', textContent: '+ New Chat'});
  newChatBtn.onclick = function() { chatState.conversationId = null; renderChatMain(chatMain, edgeFnUrl, renderConvList); };
  sidebarHeader.appendChild(newChatBtn);
  chatSidebar.appendChild(sidebarHeader);
  var convListEl = el('div', {className: 'chat-sidebar-list'});
  chatSidebar.appendChild(convListEl);

  // --- Main ---
  var chatMain = el('div', {className: 'chat-main'});

  layout.appendChild(chatSidebar);
  layout.appendChild(chatMain);

  // Direct Mode API key banner (inside main if needed)
  if (chatState.directMode && !getChatApiKey()) {
    var banner = el('div', {style: 'margin:24px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2)'});
    banner.appendChild(el('div', {style: 'font-weight:600;font-size:14px;margin-bottom:8px', textContent: 'OpenAI API Key Required'}));
    banner.appendChild(el('div', {style: 'font-size:13px;color:var(--text2);margin-bottom:12px', textContent: 'Edge Function unavailable. Enter your OpenAI API key to use Direct Mode.'}));
    var keyInput = el('input', {className: 'input', type: 'password', placeholder: 'sk-...', style: 'max-width:400px;margin-bottom:8px'});
    var saveBtn = el('button', {className: 'btn btn-p', textContent: 'Save & Start'});
    saveBtn.addEventListener('click', function() { if(keyInput.value.trim()) { setChatApiKey(keyInput.value.trim()); navigate('chat'); } });
    banner.appendChild(keyInput);
    banner.appendChild(el('div', {}, [saveBtn]));
    chatMain.appendChild(banner);
  }

  root.appendChild(layout);

  // Load conversations
  var res = await sb.from('conversations').select('id,title,model,company_id,updated_at').eq('archived', false).order('updated_at', {ascending: false}).limit(50);
  chatState.conversations = (res.data || []);

  function renderConvList() {
    while (convListEl.firstChild) convListEl.removeChild(convListEl.firstChild);
    // Group: Today, Yesterday, Older
    var now = new Date(); var today = now.toISOString().substring(0,10);
    var yesterday = new Date(now - 86400000).toISOString().substring(0,10);
    var groups = {today:[], yesterday:[], older:[]};
    chatState.conversations.forEach(function(c) {
      var d = (c.updated_at||'').substring(0,10);
      if (d === today) groups.today.push(c);
      else if (d === yesterday) groups.yesterday.push(c);
      else groups.older.push(c);
    });
    function addGroup(label, items) {
      if (items.length === 0) return;
      convListEl.appendChild(el('div', {style: 'font-size:11px;color:var(--text3);font-weight:600;padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.05em', textContent: label}));
      items.forEach(function(c) {
        var item = el('div', {className: 'chat-conv-item' + (c.id === chatState.conversationId ? ' active' : ''), textContent: c.title || 'Untitled'});
        item.onclick = function() { chatState.conversationId = c.id; renderConvList(); renderChatMain(chatMain, edgeFnUrl, renderConvList); };
        convListEl.appendChild(item);
      });
    }
    addGroup('Today', groups.today);
    addGroup('Yesterday', groups.yesterday);
    addGroup('Older', groups.older);
  }
  renderConvList();

  var hashParts = (window.location.hash || '').replace('#', '').split('/');
  if (hashParts[0] === 'chat' && hashParts[1]) chatState.conversationId = hashParts[1];

  renderChatMain(chatMain, edgeFnUrl, renderConvList);
}

function renderChatMain(container, edgeFnUrl, onConvUpdate) {
  while (container.firstChild) container.removeChild(container.firstChild);

  // Messages area
  var messagesArea = el('div', {className: 'chat-messages'});
  var messagesInner = el('div', {className: 'chat-messages-inner'});
  messagesArea.appendChild(messagesInner);
  container.appendChild(messagesArea);

  // Load existing messages
  if (chatState.conversationId) {
    window.location.hash = 'chat/' + chatState.conversationId;
    (async function() {
      var res = await sb.from('messages').select('*').eq('conversation_id', chatState.conversationId).order('created_at', {ascending: true});
      (res.data || []).forEach(function(m) {
        if (m.role === 'user') appendUserMsg(messagesInner, m.content);
        else if (m.role === 'assistant') appendAssistantMsg(messagesInner, m.content, m.model, m.tokens_input, m.tokens_output, m.cost_usd, m.step);
        else if (m.role === 'tool') appendToolMsg(messagesInner, m.tool_name, m.tool_input, m.content);
      });
      messagesArea.scrollTop = messagesArea.scrollHeight;
    })();
  } else {
    window.location.hash = 'chat';
    messagesInner.appendChild(el('div', {className: 'chat-welcome'}, [
      el('div', {className: 'chat-welcome-icon', textContent: '\u25C6'}),
      el('div', {className: 'chat-welcome-title', textContent: 'What can I help with?'}),
      el('div', {className: 'chat-welcome-sub', textContent: 'Tasks, artifacts, knowledge, diary, web search \u2014 11 tools available'})
    ]));
  }

  // === Input area ===
  var inputArea = el('div', {className: 'chat-input-area'});
  var inputWrap = el('div', {className: 'chat-input-wrap'});

  // Controls (pill selectors)
  var controlsRow = el('div', {className: 'chat-controls'});
  function makePillSelect(opts, stateKey) {
    var sel = el('select', {className: ''}, opts.map(function(o) { return el('option', {value: o[0], textContent: o[1]}); }));
    sel.value = chatState[stateKey];
    sel.dataset.stateKey = stateKey;
    sel.onchange = function() { chatState[stateKey] = sel.value; };
    return sel;
  }
  controlsRow.appendChild(makePillSelect([['auto','Auto'],['gpt-5-nano','GPT-5 nano'],['gpt-5-mini','GPT-5 mini'],['gpt-5','GPT-5']], 'model'));
  controlsRow.appendChild(makePillSelect([['auto','Thinking: Auto'],['none','Thinking: None'],['low','Thinking: Low'],['medium','Thinking: Med'],['high','Thinking: High']], 'reasoningEffort'));
  controlsRow.appendChild(makePillSelect([['full','Context: Full'],['supabase','Context: DB'],['none','Context: None']], 'contextMode'));

  // Precision Mode toggle
  var precBtn = el('button', {style: 'font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:' + (chatState.precisionMode ? 'var(--accent)' : 'var(--surface)') + ';color:' + (chatState.precisionMode ? '#fff' : 'var(--text2)') + ';cursor:pointer;font-family:var(--font);font-weight:600;transition:all .15s', textContent: chatState.precisionMode ? 'Precision ON' : 'Precision'});
  precBtn.addEventListener('click', function() {
    chatState.precisionMode = !chatState.precisionMode;
    precBtn.style.background = chatState.precisionMode ? 'var(--accent)' : 'var(--surface)';
    precBtn.style.color = chatState.precisionMode ? '#fff' : 'var(--text2)';
    precBtn.textContent = chatState.precisionMode ? 'Precision ON' : 'Precision';
    if (chatState.precisionMode) {
      // Override settings for precision
      chatState.model = 'gpt-5'; chatState.reasoningEffort = 'high'; chatState.contextMode = 'full';
      controlsRow.querySelectorAll('select').forEach(function(s) { s.value = chatState[s.dataset.stateKey || '']; });
    }
  });
  controlsRow.appendChild(precBtn);
  inputWrap.appendChild(controlsRow);

  // Attachment preview
  var pendingAttachments = [];
  var previewArea = el('div', {className: 'chat-attach-preview'});
  inputWrap.appendChild(previewArea);

  function renderPreviews() {
    while (previewArea.firstChild) previewArea.removeChild(previewArea.firstChild);
    pendingAttachments.forEach(function(att, idx) {
      var pill = el('div', {className: 'chat-attach-pill'});
      if (att.type.startsWith('image/')) { var t = el('img'); t.src = att.dataUrl; pill.appendChild(t); }
      pill.appendChild(el('span', {textContent: att.name.length > 18 ? att.name.substring(0,15)+'...' : att.name}));
      var rm = el('span', {className: 'remove', textContent: '\u00D7'});
      rm.addEventListener('click', function() { pendingAttachments.splice(idx,1); renderPreviews(); });
      pill.appendChild(rm);
      previewArea.appendChild(pill);
    });
  }

  // File input (hidden)
  var fileInput = el('input', {type:'file',accept:'image/*,.pdf,.txt,.md,.csv,.json',multiple:true,style:'display:none'});
  fileInput.addEventListener('change', function() {
    Array.from(fileInput.files).forEach(function(f) {
      var r = new FileReader();
      r.onload = function(e) { pendingAttachments.push({name:f.name,type:f.type,dataUrl:e.target.result,base64:e.target.result.split(',')[1],size:f.size}); renderPreviews(); };
      r.readAsDataURL(f);
    });
    fileInput.value = '';
  });

  // Camera input (hidden) — capture="environment" opens rear camera on mobile
  var cameraInput = el('input', {type:'file',accept:'image/*',capture:'environment',style:'display:none'});
  cameraInput.addEventListener('change', function() {
    if (cameraInput.files && cameraInput.files[0]) {
      var f = cameraInput.files[0];
      var r = new FileReader();
      r.onload = function(e) { pendingAttachments.push({name:'photo_'+Date.now()+'.jpg',type:f.type,dataUrl:e.target.result,base64:e.target.result.split(',')[1],size:f.size}); renderPreviews(); };
      r.readAsDataURL(f);
    }
    cameraInput.value = '';
  });

  // ChatGPT-style pill input box
  var inputBox = el('div', {className: 'chat-input-box'});
  var attachBtn = el('button', {className: 'chat-input-btn attach', title: 'Attach file'});
  attachBtn.appendChild(document.createTextNode('+'));
  attachBtn.addEventListener('click', function() { fileInput.click(); });
  var cameraBtn = el('button', {className: 'chat-input-btn attach', title: 'Take photo', style: 'font-size:16px'});
  cameraBtn.appendChild(document.createTextNode('\uD83D\uDCF7'));
  cameraBtn.addEventListener('click', function() { cameraInput.click(); });

  var textarea = el('textarea', {rows: 1, placeholder: 'Message... (Shift+Enter for newline)'});
  // Auto-resize textarea
  textarea.addEventListener('input', function() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });

  var sendBtn = el('button', {className: 'chat-input-btn send', title: 'Send'});
  sendBtn.appendChild(document.createTextNode('\u2191'));
  var stopBtn = el('button', {className: 'chat-input-btn send', title: 'Stop', style: 'background:var(--red);display:none'});
  stopBtn.appendChild(document.createTextNode('\u25A0'));
  var currentAbort = null;

  inputBox.appendChild(attachBtn);
  inputBox.appendChild(cameraBtn);
  inputBox.appendChild(textarea);
  inputBox.appendChild(sendBtn);
  inputBox.appendChild(stopBtn);
  inputWrap.appendChild(inputBox);
  inputWrap.appendChild(cameraInput);
  inputArea.appendChild(inputWrap);
  container.appendChild(inputArea);

  // Paste image
  textarea.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i=0;i<items.length;i++) {
      if (items[i].type.indexOf('image')!==-1) {
        var file = items[i].getAsFile();
        var r = new FileReader();
        r.onload = function(ev) { pendingAttachments.push({name:'pasted.png',type:file.type,dataUrl:ev.target.result,base64:ev.target.result.split(',')[1],size:file.size}); renderPreviews(); };
        r.readAsDataURL(file);
      }
    }
  });

  // Send
  async function sendMessage() {
    var text = textarea.value.trim();
    var attachments = pendingAttachments.slice();
    if ((!text && !attachments.length) || chatState.streaming) return;
    textarea.value = ''; textarea.style.height = 'auto';
    pendingAttachments = []; renderPreviews();
    chatState.streaming = true;
    sendBtn.style.display = 'none'; stopBtn.style.display = 'flex';
    currentAbort = new AbortController();

    // Clear welcome
    if (!chatState.conversationId) { while (messagesInner.firstChild) messagesInner.removeChild(messagesInner.firstChild); }

    appendUserMsg(messagesInner, text, attachments);
    messagesArea.scrollTop = messagesArea.scrollHeight;

    // Assistant streaming container
    var row = el('div', {className: 'chat-msg-row assistant'});
    var bubble = el('div', {className: 'chat-bubble'});
    var metaDiv = el('div', {className: 'chat-meta'});
    var contentDiv = el('div', {className: 'md-body'});
    bubble.appendChild(metaDiv);
    bubble.appendChild(contentDiv);
    row.appendChild(bubble);
    messagesInner.appendChild(row);

    // Metrics tracking
    var metrics = {startTime: Date.now(), ttft: null, toolsUsed: [], model: null, stepCount: 0, complexity: null, tokIn: 0, tokOut: 0, costUsd: 0};

    if (chatState.directMode && getChatApiKey()) {
      await sendDirectMode(text, metaDiv, contentDiv, messagesInner, row, attachments, metrics, currentAbort.signal);
    } else {
      await sendEdgeFnMode(text, edgeFnUrl, metaDiv, contentDiv, messagesInner, row, attachments, metrics, currentAbort.signal);
    }

    // Save execution metrics
    var totalTime = Date.now() - metrics.startTime;
    sb.from('execution_metrics').insert({
      source: 'ai_chat', time_to_first_token_ms: metrics.ttft, total_time_ms: totalTime,
      model: metrics.model, reasoning_effort: chatState.reasoningEffort,
      routing_complexity: metrics.complexity,
      tools_used: metrics.toolsUsed.length ? metrics.toolsUsed : null,
      tool_count: metrics.toolsUsed.length, step_count: metrics.stepCount,
      tokens_input: metrics.tokIn, tokens_output: metrics.tokOut, cost_usd: metrics.costUsd || null,
      conversation_id: chatState.conversationId, prompt_summary: text.substring(0, 100),
      company_id: chatState.companyId
    }).then(function() {});

    // Show timing in meta
    metaDiv.textContent = (metaDiv.textContent || '') + ' \u00B7 TTFT:' + (metrics.ttft || '?') + 'ms \u00B7 Total:' + (totalTime/1000).toFixed(1) + 's';

    chatState.streaming = false;
    sendBtn.style.display = 'flex'; stopBtn.style.display = 'none';
    currentAbort = null;
    if (onConvUpdate) onConvUpdate();
  }

  async function sendDirectMode(text, metaDiv, contentDiv, msgContainer, assistantRow, attachments, metrics, signal) {
    var apiKey = getChatApiKey();
    var model = chatState.model === 'auto' ? 'gpt-5-nano' : chatState.model;
    metrics.model = model;
    metaDiv.textContent = 'Direct \u00B7 ' + model;

    // Build personalized system prompt for Direct Mode
    var sysPrompt = 'You are the user\'s personal AI assistant. You know them deeply. Respond in their language. Use Markdown.';
    try {
      var usRes = await sb.from('user_settings').select('chat_nickname,chat_occupation,chat_about,chat_style,chat_custom_instructions').limit(1).single();
      if (usRes.data) {
        var u = usRes.data;
        if (u.chat_nickname || u.chat_occupation) sysPrompt += '\n\nAbout the user: ' + [u.chat_nickname ? 'Name: ' + u.chat_nickname : '', u.chat_occupation ? 'Occupation: ' + u.chat_occupation : '', u.chat_about || ''].filter(Boolean).join('. ');
        if (u.chat_custom_instructions) sysPrompt += '\n\nCustom instructions: ' + u.chat_custom_instructions;
      }
      // Load knowledge rules
      var kbRes = await sb.from('knowledge_base').select('rule,category').eq('status','active').gte('confidence',2).order('confidence',{ascending:false}).limit(10);
      if (kbRes.data && kbRes.data.length) sysPrompt += '\n\nKnowledge rules (apply silently):\n' + kbRes.data.map(function(r){return '- ['+r.category+'] '+r.rule;}).join('\n');
      // Load recent diary
      var diaryRes = await sb.from('secretary_notes').select('title,body,note_date').eq('type','diary').order('note_date',{ascending:false}).limit(3);
      if (diaryRes.data && diaryRes.data.length) sysPrompt += '\n\nRecent diary (context only, don\'t mention):\n' + diaryRes.data.map(function(d){return d.note_date+': '+(d.body||'').substring(0,200);}).join('\n');
    } catch(e) { /* skip personalization on error */ }
    var oaiMessages = [{role:'system',content:sysPrompt}];

    if (chatState.conversationId) {
      var histRes = await sb.from('messages').select('role,content').eq('conversation_id', chatState.conversationId).order('created_at',{ascending:true}).limit(20);
      if (histRes.data) histRes.data.forEach(function(m) { if (m.role==='user'||m.role==='assistant') oaiMessages.push({role:m.role,content:m.content||''}); });
    }

    var imageAtts = attachments.filter(function(a){return a.type.startsWith('image/');});
    var fileAtts = attachments.filter(function(a){return !a.type.startsWith('image/');});
    if (imageAtts.length > 0) {
      var parts = [{type:'text',text:text+(fileAtts.length?'\n\n[Files: '+fileAtts.map(function(f){return f.name;}).join(', ')+']':'')}];
      imageAtts.forEach(function(img){parts.push({type:'image_url',image_url:{url:img.dataUrl,detail:'auto'}});});
      oaiMessages.push({role:'user',content:parts});
    } else {
      oaiMessages.push({role:'user',content:text+(fileAtts.length?'\n\n[Files: '+fileAtts.map(function(f){return f.name;}).join(', ')+']':'')});
    }

    if (!chatState.conversationId) {
      var ci = await sb.from('conversations').insert({title:text.substring(0,40),model:model,context_mode:'none'}).select('id').single();
      if (ci.data) { chatState.conversationId = ci.data.id; window.location.hash = 'chat/' + ci.data.id; }
    }
    if (chatState.conversationId) await sb.from('messages').insert({conversation_id:chatState.conversationId,role:'user',content:text,step:0});

    var fullText = '';
    try {
      var re = chatState.reasoningEffort==='auto'?(model==='gpt-5-nano'?'none':model==='gpt-5-mini'?'low':'medium'):chatState.reasoningEffort;
      var body = {model:model,messages:oaiMessages,stream:true,stream_options:{include_usage:true}};
      if (re && re !== 'none') body.reasoning_effort = re;
      var res = await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify(body),signal:signal});
      if (!res.ok) { contentDiv.textContent = 'Error ' + res.status; contentDiv.style.color='var(--red)'; return; }

      var reader = res.body.getReader(), decoder = new TextDecoder(), buf = '', tokIn = 0, tokOut = 0;
      while (true) {
        var chunk = await reader.read(); if (chunk.done) break;
        buf += decoder.decode(chunk.value,{stream:true});
        var lines = buf.split('\n'); buf = lines.pop()||'';
        for (var i=0;i<lines.length;i++) {
          var line = lines[i]; if (!line.startsWith('data: ')||line==='data: [DONE]') continue;
          try { var d = JSON.parse(line.slice(6));
            if (d.usage) { tokIn = d.usage.prompt_tokens||0; tokOut = d.usage.completion_tokens||0; }
            var delta = d.choices&&d.choices[0]&&d.choices[0].delta;
            if (delta&&delta.content) { if (!metrics.ttft) metrics.ttft = Date.now() - metrics.startTime; fullText += delta.content; renderMarkdownSafe(fullText, contentDiv); messagesArea.scrollTop = messagesArea.scrollHeight; }
          } catch(e) {}
        }
      }
      metrics.tokIn = tokIn; metrics.tokOut = tokOut; metrics.stepCount = 1;
      metaDiv.textContent = model + ' \u00B7 ' + (tokIn+tokOut) + ' tok';
      if (chatState.conversationId && fullText) {
        await sb.from('messages').insert({conversation_id:chatState.conversationId,role:'assistant',content:fullText,model:model,tokens_input:tokIn,tokens_output:tokOut,step:1});
        await sb.from('conversations').update({updated_at:new Date().toISOString()}).eq('id',chatState.conversationId);
      }
    } catch(err) { if (err.name !== 'AbortError') { contentDiv.textContent = 'Error: '+err.message; contentDiv.style.color='var(--red)'; } }
  }

  async function sendEdgeFnMode(text, edgeFnUrl, metaDiv, contentDiv, msgContainer, assistantRow, attachments, metrics, signal) {
    var fullText = '';
    var images = (attachments||[]).filter(function(a){return a.type.startsWith('image/');}).map(function(a){return {data_url:a.dataUrl,name:a.name,type:a.type};});
    try {
      // Refresh session to avoid expired JWT → 401 from Supabase gateway
      var refreshed = await sb.auth.refreshSession();
      var session = refreshed.data.session ? refreshed : await sb.auth.getSession();
      var token = session.data.session ? session.data.session.access_token : '';
      var res = await fetch(edgeFnUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,'apikey':SUPABASE_ANON_KEY},
        body:JSON.stringify({conversation_id:chatState.conversationId,message:text,model:chatState.model,context_mode:chatState.contextMode,company_id:chatState.companyId,reasoning_effort:chatState.reasoningEffort,images:images.length?images:undefined,precision_mode:chatState.precisionMode||undefined}),signal:signal});
      if (!res.ok) {
        if (res.status === 401) {
          contentDiv.textContent = 'Edge Function 認証エラー (401): Edge Function の OPENAI_API_KEY が未設定の可能性があります。Settings の Direct Mode に OpenAI API Key を設定してください。';
          chatState.directMode = true;
        } else {
          contentDiv.textContent = 'Edge Function error: HTTP ' + res.status;
        }
        contentDiv.style.color='var(--red)'; return;
      }

      var reader = res.body.getReader(), decoder = new TextDecoder(), buf = '';
      while (true) {
        var chunk = await reader.read(); if (chunk.done) break;
        buf += decoder.decode(chunk.value,{stream:true});
        var lines = buf.split('\n'); buf = lines.pop()||'';
        for (var i=0;i<lines.length;i++) {
          var line = lines[i]; if (!line.startsWith('data: ')) continue;
          try { var evt = JSON.parse(line.slice(6));
            switch (evt.type) {
              case 'conversation': chatState.conversationId = evt.id; window.location.hash = 'chat/' + evt.id; break;
              case 'routing':
                metaDiv.textContent = evt.status==='classifying'?'Routing...':evt.reason+' \u2192 '+evt.model;
                if (evt.model) metrics.model = evt.model;
                if (evt.complexity) metrics.complexity = evt.complexity;
                break;
              case 'context_injection': {
                var parts = [];
                if (evt.knowledge_rules) parts.push(evt.knowledge_rules + ' knowledge rules');
                if (evt.diary_entries) parts.push(evt.diary_entries + ' diary entries');
                if (evt.ceo_insights) parts.push(evt.ceo_insights + ' insights');
                if (evt.personalization_fields && evt.personalization_fields.length) parts.push('profile: ' + evt.personalization_fields.join(', '));
                if (parts.length) {
                  var ctxNote = el('div', {className:'chat-tool-block', style:'opacity:0.6;font-size:11px'});
                  ctxNote.appendChild(el('span',{textContent:'\uD83D\uDD12 '}));
                  ctxNote.appendChild(el('span',{textContent:'Context sent to LLM: ' + parts.join(' \u00B7 ')}));
                  msgContainer.insertBefore(el('div',{className:'chat-msg-row assistant'},[ctxNote]), assistantRow);
                }
                break;
              }
              case 'step_start':
                metaDiv.textContent = 'Step '+evt.step+'/'+evt.maxSteps+' \u00B7 '+evt.model+(evt.reasoning?' \u00B7 '+evt.reasoning:'');
                metrics.stepCount = evt.step;
                break;
              case 'delta':
                if (!metrics.ttft) metrics.ttft = Date.now() - metrics.startTime;
                fullText += evt.content; renderMarkdownSafe(fullText, contentDiv); messagesArea.scrollTop = messagesArea.scrollHeight;
                break;
              case 'tool_start':
                metrics.toolsUsed.push({name: evt.tool, start: Date.now(), duration_ms: null, input_summary: JSON.stringify(evt.input).substring(0,80)});
                var tb = el('div', {className:'chat-tool-block'});
                tb.appendChild(el('span',{className:'tool-icon',textContent:'\uD83D\uDD27'}));
                tb.appendChild(el('span',{className:'tool-name',textContent:evt.tool}));
                tb.appendChild(el('span',{className:'tool-summary',textContent:JSON.stringify(evt.input).substring(0,60)}));
                msgContainer.insertBefore(el('div',{className:'chat-msg-row assistant'},[tb]), assistantRow);
                messagesArea.scrollTop = messagesArea.scrollHeight;
                break;
              case 'tool_result':
                var lastTool = metrics.toolsUsed[metrics.toolsUsed.length - 1];
                if (lastTool) lastTool.duration_ms = Date.now() - lastTool.start;
                break;
              case 'done':
                metrics.tokIn = evt.tokensInput; metrics.tokOut = evt.tokensOutput; metrics.costUsd = evt.costUsd;
                metaDiv.textContent = evt.model+' \u00B7 '+(evt.tokensInput+evt.tokensOutput)+' tok \u00B7 $'+(evt.costUsd||0).toFixed(4);
                var cr = await sb.from('conversations').select('id,title,model,company_id,updated_at').eq('archived',false).order('updated_at',{ascending:false}).limit(50);
                chatState.conversations = cr.data||[];
                break;
              case 'error': contentDiv.textContent = 'Error: '+evt.message; contentDiv.style.color='var(--red)'; break;
              case 'max_steps': metaDiv.textContent = 'Max steps ('+evt.step+')'; break;
            }
          } catch(e) {}
        }
      }
    } catch(err) { if (err.name !== 'AbortError') { contentDiv.textContent = 'Error: '+err.message; contentDiv.style.color='var(--red)'; } }
  }

  stopBtn.onclick = function() {
    if (currentAbort) currentAbort.abort();
  };
  sendBtn.onclick = sendMessage;
  textarea.addEventListener('keydown', function(e) {
    if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  textarea.focus();
}

function renderMarkdownSafe(text, target) {
  while (target.firstChild) target.removeChild(target.firstChild);
  if (typeof marked!=='undefined'&&marked.parse) {
    var tpl = document.createElement('template');
    // Note: innerHTML on template is used for markdown rendering; sanitized below
    tpl.innerHTML = marked.parse(text); // eslint-disable-line -- sanitized via DOM below
    var frag = tpl.content;
    frag.querySelectorAll('script,iframe,object,embed,math,svg[onload],form').forEach(function(s){s.remove();});
    // Strip all on* event handler attributes and dangerous href protocols
    frag.querySelectorAll('*').forEach(function(node) {
      Array.from(node.attributes).forEach(function(attr) {
        if (attr.name.startsWith('on')) node.removeAttribute(attr.name);
      });
    });
    frag.querySelectorAll('a').forEach(function(a) {
      var href = (a.getAttribute('href') || '').trim().toLowerCase();
      if (href.startsWith('javascript:') || href.startsWith('data:') || href.startsWith('vbscript:')) { a.removeAttribute('href'); a.textContent = '[link removed]'; }
      a.setAttribute('target','_blank'); a.setAttribute('rel','noopener noreferrer');
    });
    target.appendChild(frag);
  } else { target.textContent = text; }
}

        ].filter(Boolean)),

  // --- MCP Servers ---

      ].filter(Boolean)));

      el('div', {className: 'empty', textContent: 'MCP Server 情報なし'})
    ]));
  }

  // --- Permissions ---
  root.appendChild(el('div', {className: 'gradient-line'}));
  root.appendChild(el('div', {className: 'section-title', textContent: 'Permissions (' + allPermissions.length + ')'}));
  if (allPermissions.length > 0) {
    var permCard = el('div', {className: 'card', style: 'max-height:400px;overflow-y:auto'});
    // Group by type
    var permGroups = {};
    allPermissions.forEach(function(p) {

  // --- Skills/MCP Cross-Company Matrix ---
  if (settings.length > 1) {

    root.appendChild(el('div', {className: 'section-title', textContent: 'Skills / Plugins Matrix (cross-scope)'}));

    // Build matrix data
    var allScopeNames = settings.map(function(s) { return s.scope; });

    settings.forEach(function(s) {
      if (!s.plugins) return;
      Object.keys(s.plugins).forEach(function(p) {

// ============================================================
// Fullscreen Artifact Viewer
// ============================================================
var fsOverlay = null;
var fsCurrentArtifact = null;

function initFullscreenViewer() {
  if (fsOverlay) return;
  fsOverlay = el('div', {className: 'fs-overlay'});

  var closeBtn = el('button', {className: 'btn', style: 'font-size:12px;padding:4px 12px', textContent: '✕ 閉じる'});
  closeBtn.onclick = closeFullscreen;

  var titleEl = el('span', {className: 'fs-title', id: 'fs-title'});
  var metaEl = el('span', {className: 'fs-meta', id: 'fs-meta'});

  var reloadBtn = el('button', {className: 'btn', id: 'fs-reload', style: 'font-size:12px;padding:4px 12px', textContent: '\u21BB 更新'});
  reloadBtn.onclick = async function() {
    if (!fsCurrentArtifact) return;
    reloadBtn.disabled = true;
    reloadBtn.textContent = '更新中...';
    var res = await sb.from('artifacts').select('*').eq('id', fsCurrentArtifact.id).single();
    if (res.data) {
      fsCurrentArtifact = res.data;
      openFullscreen(fsCurrentArtifact);
    }
    reloadBtn.disabled = false;
    reloadBtn.textContent = '\u21BB 更新';
    toast('Artifact を更新しました');
  };
  var toggleBtn = el('button', {className: 'btn', id: 'fs-toggle-comments', style: 'font-size:12px;padding:4px 12px', textContent: '\uD83D\uDCAC コメント'});
  var topbar = el('div', {className: 'fs-topbar'}, [closeBtn, reloadBtn, titleEl, metaEl, toggleBtn]);

  var contentArea = el('div', {className: 'fs-content', id: 'fs-content'});

  var panelCloseBtn = el('button', {className: 'btn', style: 'font-size:11px;padding:2px 8px', textContent: '✕'});
  var fsShowResolved = false;
  var fsToggleResolved = el('label', {style: 'display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);cursor:pointer;margin-left:auto;margin-right:8px'});
  var fsToggleCb = el('input', {type: 'checkbox', style: 'cursor:pointer'});
  fsToggleCb.onchange = function() { fsShowResolved = fsToggleCb.checked; loadFsComments(); };
  fsToggleResolved.appendChild(fsToggleCb);
  fsToggleResolved.appendChild(document.createTextNode('解決済み'));
  var panelHeader = el('div', {className: 'fs-comment-header'}, [el('span', {textContent: 'コメント'}), fsToggleResolved, panelCloseBtn]);
  var commentList = el('div', {className: 'fs-comment-list', id: 'fs-comments'});
  var commentInput = el('textarea', {id: 'fs-comment-input', placeholder: 'コメントを追加...', style: 'width:100%;min-height:60px;resize:vertical;font-size:13px;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-family:var(--font);background:var(--surface2);outline:none'});
  var sendBtn = el('button', {className: 'btn btn-primary', style: 'margin-top:8px;width:100%', textContent: '投稿'});
  var commentForm = el('div', {className: 'fs-comment-form'}, [commentInput, sendBtn]);
  var panel = el('div', {className: 'fs-comment-panel', id: 'fs-panel'}, [panelHeader, commentList, commentForm]);

  var body = el('div', {className: 'fs-body'}, [contentArea, panel]);
  fsOverlay.appendChild(topbar);
  fsOverlay.appendChild(body);
  document.body.appendChild(fsOverlay);

  toggleBtn.onclick = function() { panel.classList.toggle('open'); };
  panelCloseBtn.onclick = function() { panel.classList.remove('open'); };

  sendBtn.onclick = async function() {
    var text = commentInput.value.trim();
    if (!text || !fsCurrentArtifact) return;
    sendBtn.disabled = true;
    sendBtn.textContent = '送信中...';
    await sb.from('artifact_comments').insert({artifact_id: fsCurrentArtifact.id, body: text, source: 'dashboard'});
    commentInput.value = '';
    sendBtn.disabled = false;
    sendBtn.textContent = '投稿';
    loadFsComments();
  };

  // Ctrl+Enter to submit
  commentInput.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      sendBtn.click();
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && fsOverlay.classList.contains('active')) closeFullscreen();
  });
}

function openFullscreen(artifact) {
  initFullscreenViewer();
  fsCurrentArtifact = artifact;
  document.getElementById('fs-title').textContent = artifact.title;
  document.getElementById('fs-meta').textContent = artifact.file_type.toUpperCase() + ' \xB7 ' + (artifact.file_path || '');

  var contentEl = document.getElementById('fs-content');
  while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);

  if (!artifact.content) {
    contentEl.appendChild(el('div', {style: 'padding:40px;text-align:center;color:var(--text3)', textContent: '未同期。次のセッション起動時に自動同期されます。'}));
  } else if (artifact.file_type === 'html') {
    var iframe = el('iframe', {style: 'width:100%;height:100%;border:none;background:#fff'});
    contentEl.appendChild(iframe);
    setTimeout(function() {
      iframe.contentDocument.open();
      iframe.contentDocument.write(artifact.content);
      iframe.contentDocument.close();
    }, 0);
  } else if (artifact.file_type === 'md') {
    var mdIframe = el('iframe', {style: 'width:100%;height:100%;border:none;background:#fff'});
    contentEl.appendChild(mdIframe);
    setTimeout(function() {
      var mdHtml = typeof marked !== 'undefined' ? marked.parse(artifact.content) : '<pre>' + artifact.content.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
      mdIframe.contentDocument.open();
      mdIframe.contentDocument.write('<!DOCTYPE html><html><head><style>body{font-family:-apple-system,sans-serif;padding:24px 32px;font-size:14px;line-height:1.8;color:#1a1d21}pre{background:#f1f3f5;padding:12px;border-radius:8px;overflow:auto}code{font-size:13px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #e2e5e9;padding:8px 12px;text-align:left}th{background:#f1f3f5}</style></head><body>' + mdHtml + '</body></html>');
      mdIframe.contentDocument.close();
    }, 0);
  } else {
    var pre = el('pre', {textContent: artifact.content, style: 'margin:0;padding:24px;font-size:13px;overflow:auto;height:100%'});
    contentEl.appendChild(pre);
  }

  fsOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  loadFsComments();
}

function closeFullscreen() {
  if (fsOverlay) fsOverlay.classList.remove('active');
  document.getElementById('fs-panel').classList.remove('open');
  document.body.style.overflow = '';
  fsCurrentArtifact = null;
}

async function loadFsComments() {
  var list = document.getElementById('fs-comments');
  while (list.firstChild) list.removeChild(list.firstChild);
  if (!fsCurrentArtifact) return;
  var res = await sb.from('artifact_comments').select('*').eq('artifact_id', fsCurrentArtifact.id).order('created_at', {ascending: true});
  var comments = res.data || [];
  if (comments.length === 0) {
    list.appendChild(el('div', {style: 'color:var(--text3);font-size:13px;padding:12px 0;text-align:center', textContent: 'コメントなし'}));
    return;
  }
  var openCount = comments.filter(function(c){return c.status==='open'}).length;
  var resolvedCount = comments.length - openCount;
  document.getElementById('fs-toggle-comments').textContent = '\uD83D\uDCAC コメント' + (openCount > 0 ? ' (' + openCount + ')' : '');
  var filtered = fsShowResolved ? comments : comments.filter(function(c) { return c.status === 'open'; });
  if (!fsShowResolved && resolvedCount > 0 && filtered.length === 0) {
    list.appendChild(el('div', {style: 'color:var(--text3);font-size:12px;padding:12px 0;text-align:center', textContent: resolvedCount + '件の解決済みコメント'}));
    return;
  }
  filtered.forEach(function(c) {
    var time = new Date(c.created_at).toLocaleString('ja-JP');
    var statusColor = c.status === 'open' ? 'var(--amber)' : 'var(--green)';
    var statusBadge = el('span', {style: 'font-size:10px;padding:1px 6px;border-radius:4px;background:' + statusColor + '22;color:' + statusColor + ';font-weight:600', textContent: c.status === 'open' ? 'OPEN' : 'RESOLVED'});
    var timeSpan = el('span', {style: 'font-size:10px;color:var(--text3)', textContent: time});
    var metaLeft = el('div', {style: 'display:flex;gap:6px;align-items:center'}, [statusBadge, timeSpan]);
    var metaRow = el('div', {className: 'fc-meta'}, [metaLeft]);
    var actionBtns = el('div', {style: 'display:flex;gap:4px;align-items:center'});

    // Edit button
    var bodyEl = el('div', {className: 'fc-body', textContent: c.body});
    (function(comment, bodyDiv) {
      var editBtn = el('button', {className: 'btn', style: 'font-size:10px;padding:2px 8px', textContent: '\u270E 編集'});
      editBtn.onclick = function() {
        var editArea = el('textarea', {style: 'width:100%;min-height:50px;resize:vertical;font-size:12px;border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-family:var(--font);background:var(--surface2);outline:none', value: comment.body});
        var saveBtn = el('button', {className: 'btn btn-primary', style: 'font-size:10px;padding:2px 8px;margin-top:4px', textContent: '保存'});
        var cancelBtn = el('button', {className: 'btn', style: 'font-size:10px;padding:2px 8px;margin-top:4px', textContent: 'キャンセル'});
        var editActions = el('div', {style: 'display:flex;gap:4px;margin-top:4px'}, [saveBtn, cancelBtn]);
        bodyDiv.textContent = '';
        bodyDiv.appendChild(editArea);
        bodyDiv.appendChild(editActions);
        editArea.focus();
        saveBtn.onclick = async function() {
          var newBody = editArea.value.trim();
          if (!newBody) return;
          saveBtn.disabled = true; saveBtn.textContent = '保存中...';
          await sb.from('artifact_comments').update({body: newBody}).eq('id', comment.id);
          loadFsComments();
        };
        cancelBtn.onclick = function() { loadFsComments(); };
      };
      actionBtns.appendChild(editBtn);
    })(c, bodyEl);

    // Resolve button (open only)
    if (c.status === 'open') {
      (function(cid) {
        var resolveBtn = el('button', {className: 'btn', style: 'font-size:10px;padding:2px 8px', textContent: '\u2713 解決'});
        resolveBtn.onclick = async function() {
          await sb.from('artifact_comments').update({status: 'resolved', resolved_by: 'manual', resolved_at: new Date().toISOString()}).eq('id', cid);
          loadFsComments();
        };
        actionBtns.appendChild(resolveBtn);
      })(c.id);
    }

    metaRow.appendChild(actionBtns);
    var item = el('div', {className: 'fs-comment-item', style: c.status !== 'open' ? 'opacity:0.6' : ''}, [metaRow, bodyEl]);
    list.appendChild(item);
  });
}

})();
</script>
</body>
</html>
